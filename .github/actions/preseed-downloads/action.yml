name: Pre-seed build downloads
description: >
  Resolve the latest compatible code-server and Copilot Chat versions, restore
  previously downloaded files from the actions/cache, and download them on a
  cache miss.  Files are placed in a pre-downloaded/ subdirectory of the output
  directory so that docker-bake.hcl can pass the parent directory as the
  'downloads' named context and the Dockerfile can bind-mount source=/pre-downloaded.

inputs:
  github_token:
    description: GitHub token used for authenticated GitHub API calls during version resolution.
    required: true
  min_glibc_version:
    description: >
      Minimum GLIBC version that must be satisfied by all native (.node) modules
      in the resolved code-server .deb and Copilot Chat VSIX.  Set this to the
      oldest GLIBC present in any of the target PHP base images.
      Debian 11 (Bullseye) — used by PHP 7.4 and 8.0 — ships GLIBC 2.31.
      Debian 12 (Bookworm) — used by PHP 8.1 and later — ships GLIBC 2.35.
      Defaults to 2.31 so that all currently supported PHP versions are covered.
    required: false
    default: '2.31'

outputs:
  downloads_dir:
    description: >
      Path to the directory whose pre-downloaded/ subdirectory contains the
      pre-seeded artifacts.  Pass as DOWNLOADS_DIR to docker buildx bake.
    value: ${{ steps.set-dir.outputs.downloads_dir }}
  codeserver_version:
    description: Resolved code-server version (e.g. 4.99.4)
    value: ${{ steps.resolve.outputs.codeserver_version }}
  copilot_chat_version:
    description: Resolved Copilot Chat version (e.g. 0.26.7)
    value: ${{ steps.resolve.outputs.copilot_chat_version }}
  codeserver_deb_sha256_amd64:
    description: SHA256 of the code-server amd64 .deb for the resolved version.
    value: ${{ steps.sha256.outputs.codeserver_deb_sha256_amd64 }}
  codeserver_deb_sha256_arm64:
    description: SHA256 of the code-server arm64 .deb for the resolved version.
    value: ${{ steps.sha256.outputs.codeserver_deb_sha256_arm64 }}
  copilot_chat_vsix_sha256:
    description: SHA256 of the Copilot Chat VSIX for the resolved version.
    value: ${{ steps.sha256.outputs.copilot_chat_vsix_sha256 }}

runs:
  using: composite
  steps:
    - name: Set downloads directory
      id: set-dir
      shell: bash
      run: echo "downloads_dir=${{ runner.temp }}/build-downloads" >> "$GITHUB_OUTPUT"

    - name: Resolve artifact versions
      id: resolve
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        MIN_GLIBC: ${{ inputs.min_glibc_version }}
      run: |
        set -euo pipefail

        # ── GLIBC compatibility helpers ──────────────────────────────────────
        # Returns 0 (true) if version string $1 is strictly greater than $2.
        version_gt() {
          [ "$1" != "$2" ] && \
            [ "$(printf '%s\n' "$1" "$2" | sort -V | tail -1)" = "$1" ]
        }

        # Check one ELF .node file: fail (return 1) if its highest required
        # GLIBC symbol version exceeds MIN_GLIBC.
        check_node_file_glibc() {
          local f="$1"
          if ! command -v readelf >/dev/null 2>&1; then
            echo "  WARNING: readelf not available; skipping GLIBC check for $(basename "$f")" >&2
            return 0
          fi
          local max_req
          max_req=$(readelf -V "$f" 2>/dev/null \
            | grep -oE 'GLIBC_[0-9]+\.[0-9]+(\.[0-9]+)?' \
            | sed 's/GLIBC_//' \
            | sort -V | tail -1)
          if [ -n "$max_req" ] && version_gt "$max_req" "$MIN_GLIBC"; then
            echo "  $(basename "$f"): requires GLIBC ${max_req} > ${MIN_GLIBC}" >&2
            return 1
          fi
          return 0
        }

        # Check all *.node files in a directory; return 1 on first incompatible
        # native module, 0 if none found or all are compatible.
        check_dir_node_files_glibc() {
          local dir="$1"
          local result=0
          while IFS= read -r f; do
            check_node_file_glibc "$f" || { result=1; break; }
          done < <(find "$dir" -name "*.node" -type f 2>/dev/null)
          return $result
        }

        # Check all *.node files inside a VSIX (ZIP); return 1 on first
        # incompatible native module, 0 if none found or all are compatible.
        # If extraction fails (malformed archive), logs a warning and returns 0.
        check_vsix_glibc() {
          local vsix="$1"
          local tmp_dir result=0
          tmp_dir=$(mktemp -d)
          if ! unzip -q "$vsix" -d "$tmp_dir" 2>/dev/null; then
            echo "  WARNING: failed to extract VSIX; skipping GLIBC check" >&2
            rm -rf "$tmp_dir"
            return 0
          fi
          check_dir_node_files_glibc "$tmp_dir" || result=1
          rm -rf "$tmp_dir"
          return $result
        }

        # Check all *.node files inside a .deb; return 1 on first incompatible
        # native module, 0 if none found or all are compatible.
        # If extraction fails (malformed archive), logs a warning and returns 0.
        check_deb_glibc() {
          local deb="$1"
          local tmp_dir result=0
          tmp_dir=$(mktemp -d)
          if ! dpkg-deb -x "$deb" "$tmp_dir" 2>/dev/null; then
            echo "  WARNING: failed to extract .deb; skipping GLIBC check" >&2
            rm -rf "$tmp_dir"
            return 0
          fi
          check_dir_node_files_glibc "$tmp_dir" || result=1
          rm -rf "$tmp_dir"
          return $result
        }
        # ────────────────────────────────────────────────────────────────────

        # Fetch the list of stable code-server major-4 releases once and
        # reuse it for both version selection and GLIBC compatibility checks.
        CODESERVER_RELEASES_JSON=$(curl -fsSL --retry 3 --retry-all-errors --connect-timeout 30 \
          -H 'Accept: application/vnd.github+json' \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H 'X-GitHub-Api-Version: 2022-11-28' \
          'https://api.github.com/repos/coder/code-server/releases?per_page=100')

        # Iterate releases from newest to oldest and pick the first version
        # whose amd64 .deb contains no native module requiring GLIBC > MIN_GLIBC.
        # The amd64 prebuild is used as a proxy for all platforms: both amd64
        # and arm64 Debian prebuilds are compiled against the same GLIBC version.
        # Save the pre-downloaded .deb so the download step can reuse it.
        CODESERVER_VERSION=""
        while IFS= read -r candidate; do
          echo "Checking code-server ${candidate} (GLIBC ≤ ${MIN_GLIBC} required)..." >&2
          DEB_URL="https://github.com/coder/code-server/releases/download/v${candidate}/code-server_${candidate}_amd64.deb"
          TMP_DEB=$(mktemp --suffix=.deb)
          if curl -fsSL --retry 3 --retry-all-errors --connect-timeout 30 \
               "${DEB_URL}" -o "$TMP_DEB" 2>/dev/null \
             && check_deb_glibc "$TMP_DEB"; then
            CODESERVER_VERSION="$candidate"
            mv "$TMP_DEB" "$RUNNER_TEMP/code-server-resolved-amd64.deb"
            echo "  ✔ Selected code-server: ${CODESERVER_VERSION}" >&2
            break
          else
            echo "  ✘ code-server ${candidate} requires GLIBC > ${MIN_GLIBC}, trying older release..." >&2
            rm -f "$TMP_DEB"
          fi
        done < <(printf '%s' "$CODESERVER_RELEASES_JSON" | jq -r '
          [.[] |
          select(.draft==false and .prerelease==false) |
          select(.tag_name | test("^v?4\\.[0-9]+\\.[0-9]+([-+].*)?$")) |
          .tag_name | ltrimstr("v")] | .[]')
        [ -n "$CODESERVER_VERSION" ] || { echo "Failed to detect a GLIBC-compatible code-server version" >&2; exit 1; }

        # Derive the VS Code version bundled with this code-server release
        # (code-server 4.X.Y bundles VS Code 1.X.Y, e.g. 4.99.4 → 1.99.4).
        VSCODE_VERSION="$(printf '%s' "$CODESERVER_VERSION" | sed 's/^[0-9][0-9]*\./1./')"

        # Fetch all Copilot Chat versions from the VS Marketplace once.
        # Stable versions have a patch component of at most 9 digits
        # (excludes 10-digit YYYYMMDDNN pre-releases).
        MARKETPLACE_JSON=$(curl -fsSL --retry 3 --retry-all-errors --connect-timeout 30 \
          -X POST \
          -H 'Content-Type: application/json' \
          -H 'Accept: application/json;api-version=3.0-preview.1' \
          -d '{"filters":[{"criteria":[{"filterType":7,"value":"GitHub.copilot-chat"}],"pageSize":100}],"flags":17}' \
          'https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery')

        # Iterate VS Code engine-compatible Copilot Chat versions from newest
        # to oldest and pick the first whose VSIX contains no native module
        # requiring GLIBC > MIN_GLIBC.
        # Save the pre-downloaded VSIX so the download step can reuse it.
        COPILOT_CHAT_VERSION=""
        while IFS= read -r candidate; do
          echo "Checking Copilot Chat ${candidate} (GLIBC ≤ ${MIN_GLIBC} required)..." >&2
          VSIX_URL="https://marketplace.visualstudio.com/_apis/public/gallery/publishers/GitHub/vsextensions/copilot-chat/${candidate}/vspackage"
          TMP_VSIX=$(mktemp --suffix=.vsix)
          if curl -fsSL --compressed --retry 3 --retry-all-errors --connect-timeout 30 \
               "${VSIX_URL}" -o "$TMP_VSIX" 2>/dev/null \
             && check_vsix_glibc "$TMP_VSIX"; then
            COPILOT_CHAT_VERSION="$candidate"
            mv "$TMP_VSIX" "$RUNNER_TEMP/copilot-chat-resolved.vsix"
            echo "  ✔ Selected Copilot Chat: ${COPILOT_CHAT_VERSION}" >&2
            break
          else
            echo "  ✘ Copilot Chat ${candidate} requires GLIBC > ${MIN_GLIBC}, trying older version..." >&2
            rm -f "$TMP_VSIX"
          fi
        done < <(printf '%s' "$MARKETPLACE_JSON" | jq -r \
          --arg vscode "$VSCODE_VERSION" '
            def vparts: split(".") | map(tonumber? // 0);
            [
              .results[0].extensions[0].versions[]? |
              select(.version | test("^[0-9]+\\.[0-9]+\\.[0-9]{1,9}$")) |
              (.properties // [] |
               map(select(.key == "Microsoft.VisualStudio.Code.Engine")) |
               .[0].value // "") as $engine |
              select($engine != "") |
              ($engine | gsub("^[^0-9]+"; "") | split("-")[0]) as $min_vscode |
              select(($vscode | vparts) >= ($min_vscode | vparts)) |
              .version
            ] | sort_by(split(".") | map(tonumber? // 0)) | reverse | .[]
          ')
        [ -n "$COPILOT_CHAT_VERSION" ] || { echo "Failed to detect a GLIBC-compatible Copilot Chat version" >&2; exit 1; }

        echo "codeserver_version=${CODESERVER_VERSION}" >> "$GITHUB_OUTPUT"
        echo "copilot_chat_version=${COPILOT_CHAT_VERSION}" >> "$GITHUB_OUTPUT"
        echo "Resolved: code-server=${CODESERVER_VERSION}  VS Code=${VSCODE_VERSION}  copilot-chat=${COPILOT_CHAT_VERSION}"

    # Cache code-server .deb files and the Copilot Chat VSIX separately so
    # that a version bump in one artifact does not invalidate the other's cache.
    # The key names match those used by the verify-code-server and
    # verify-extension CI jobs. Within the same workflow run, a consumer job
    # must be wired via `needs` to guarantee the cache is fully saved before
    # it tries to restore. Across workflow runs, any job can restore an
    # existing cache entry without any `needs` ordering.
    - name: Cache code-server debs
      id: cache-cs
      uses: actions/cache@v5
      with:
        path: ${{ runner.temp }}/code-server-debs
        key: code-server-debs-${{ steps.resolve.outputs.codeserver_version }}

    - name: Cache Copilot Chat VSIX
      id: cache-cc
      uses: actions/cache@v5
      with:
        path: ${{ runner.temp }}/copilot-chat.vsix
        key: copilot-chat-vsix-${{ steps.resolve.outputs.copilot_chat_version }}

    - name: Download code-server debs (cache miss)
      if: steps.cache-cs.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        CODESERVER_VERSION="${{ steps.resolve.outputs.codeserver_version }}"
        mkdir -p "${{ runner.temp }}/code-server-debs"
        # code-server .deb for both architectures (the bake build targets
        # linux/amd64 and linux/arm64; each arch looks up its own .deb).
        for ARCH in amd64 arm64; do
          DEB="code-server_${CODESERVER_VERSION}_${ARCH}.deb"
          TARGET="${{ runner.temp }}/code-server-debs/${DEB}"
          # Reuse the amd64 .deb already downloaded during the GLIBC compatibility
          # check in the resolve step to avoid a redundant download.
          if [ "$ARCH" = "amd64" ] && [ -f "$RUNNER_TEMP/code-server-resolved-amd64.deb" ]; then
            echo "Reusing ${DEB} from GLIBC compatibility check"
            cp "$RUNNER_TEMP/code-server-resolved-amd64.deb" "$TARGET"
          else
            echo "Downloading ${DEB}"
            curl -fsSL --retry 5 --retry-all-errors --connect-timeout 30 \
              "https://github.com/coder/code-server/releases/download/v${CODESERVER_VERSION}/${DEB}" \
              -o "$TARGET"
            # Validate the file is a proper .deb (ar archive with "!<arch>" magic).
            # This catches cases where the server returned an error body with HTTP 200.
            head -c 8 "$TARGET" | grep -qF '!<arch>' || \
              { echo "ERROR: ${DEB} failed format validation (not a valid .deb archive)" >&2; exit 1; }
          fi
        done

    - name: Download Copilot Chat VSIX (cache miss)
      if: steps.cache-cc.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        COPILOT_CHAT_VERSION="${{ steps.resolve.outputs.copilot_chat_version }}"
        VSIX_URL="https://marketplace.visualstudio.com/_apis/public/gallery/publishers/GitHub/vsextensions/copilot-chat/${COPILOT_CHAT_VERSION}/vspackage"
        TARGET="${{ runner.temp }}/copilot-chat.vsix"
        # Reuse the VSIX already downloaded during the GLIBC compatibility check
        # in the resolve step to avoid a redundant download.
        if [ -f "$RUNNER_TEMP/copilot-chat-resolved.vsix" ]; then
          echo "Reusing copilot-chat-${COPILOT_CHAT_VERSION}.vsix from GLIBC compatibility check"
          cp "$RUNNER_TEMP/copilot-chat-resolved.vsix" "$TARGET"
        else
          echo "Downloading copilot-chat-${COPILOT_CHAT_VERSION}.vsix"
          curl -fsSL --compressed --retry 5 --retry-all-errors --connect-timeout 30 \
            "${VSIX_URL}" -o "$TARGET"
          # Validate the file is a proper ZIP archive (VSIX is a ZIP; magic bytes: PK 0x03 0x04 = 504b0304).
          # This catches rate-limit or error HTML responses returned with HTTP 200.
          od -An -N4 -tx1 "$TARGET" | tr -d ' \n' | grep -q '^504b0304' || \
            { echo "ERROR: Downloaded VSIX failed format validation (not a valid ZIP/VSIX archive)" >&2; exit 1; }
        fi

    - name: Assemble pre-downloaded directory
      id: assemble
      shell: bash
      run: |
        set -euo pipefail
        CODESERVER_VERSION="${{ steps.resolve.outputs.codeserver_version }}"
        COPILOT_CHAT_VERSION="${{ steps.resolve.outputs.copilot_chat_version }}"
        PRE_DOWNLOADED_DIR="${{ steps.set-dir.outputs.downloads_dir }}/pre-downloaded"
        mkdir -p "$PRE_DOWNLOADED_DIR"
        for ARCH in amd64 arm64; do
          cp "${{ runner.temp }}/code-server-debs/code-server_${CODESERVER_VERSION}_${ARCH}.deb" \
             "$PRE_DOWNLOADED_DIR/"
        done
        cp "${{ runner.temp }}/copilot-chat.vsix" \
           "$PRE_DOWNLOADED_DIR/copilot-chat-${COPILOT_CHAT_VERSION}.vsix"

    - name: Compute SHA256 of pre-seeded downloads
      id: sha256
      shell: bash
      run: |
        set -euo pipefail
        CODESERVER_VERSION="${{ steps.resolve.outputs.codeserver_version }}"
        COPILOT_CHAT_VERSION="${{ steps.resolve.outputs.copilot_chat_version }}"
        PRE_DOWNLOADED_DIR="${{ steps.set-dir.outputs.downloads_dir }}/pre-downloaded"

        AMD64_SHA=$(sha256sum "${PRE_DOWNLOADED_DIR}/code-server_${CODESERVER_VERSION}_amd64.deb" | awk '{print $1}')
        ARM64_SHA=$(sha256sum "${PRE_DOWNLOADED_DIR}/code-server_${CODESERVER_VERSION}_arm64.deb" | awk '{print $1}')
        VSIX_SHA=$(sha256sum "${PRE_DOWNLOADED_DIR}/copilot-chat-${COPILOT_CHAT_VERSION}.vsix"    | awk '{print $1}')

        echo "codeserver_deb_sha256_amd64=${AMD64_SHA}" >> "$GITHUB_OUTPUT"
        echo "codeserver_deb_sha256_arm64=${ARM64_SHA}" >> "$GITHUB_OUTPUT"
        echo "copilot_chat_vsix_sha256=${VSIX_SHA}"     >> "$GITHUB_OUTPUT"
        echo "SHA256: code-server amd64=${AMD64_SHA}  arm64=${ARM64_SHA}  copilot-chat=${VSIX_SHA}"

