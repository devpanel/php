name: Pre-seed build downloads
description: >
  Detect which Debian codename each PHP version runs on, resolve the latest
  compatible code-server and Copilot Chat versions for each detected codename,
  restore previously downloaded files from the actions/cache, and download
  them on a cache miss.  Produces a JSON bake-override file that maps each
  phpX_Y-downloader target to the correct versions and SHA256 digests for
  its Debian tier.

  Files are placed in a pre-downloaded/ subdirectory of the output directory
  so that docker-bake.hcl can pass the parent directory as the 'downloads'
  named context and the Dockerfile can bind-mount source=/pre-downloaded.

  Debian tiers are detected automatically by pulling each PHP version's base
  image (php:<version>-apache) and reading its VERSION_CODENAME from
  /etc/os-release.  Versions sharing a codename are grouped together and
  tested against the actual PHP image for that group — no hardcoded version
  lists or image names.

inputs:
  github_token:
    description: >
      GitHub token used for authenticated GitHub API calls during version resolution and for
      best-effort GHCR authentication before the mirror pull.  The token must have at least
      `packages: read` permission for the mirror pull to succeed; the mirror pull falls back
      silently to Docker Hub if login or the pull fails.
    required: true
  versions:
    description: >
      Space-separated list of PHP versions being built (e.g. "7.4 8.0 8.1 8.2 8.3").
      Used to pull the actual php:<version>-apache images and detect which Debian
      codename each version runs on, so compatibility tests use the real target image.
    required: true
  ghcr_token:
    description: >
      Optional classic Personal Access Token with the read:packages scope (or
      write:packages if this action should also be able to pull private images).
      When provided, this token is used instead of github_token for the best-effort
      GHCR login before the mirror pull.  Required when the organisation's Actions
      token policy restricts GITHUB_TOKEN from reading packages.
    default: ''
  ghcr_user:
    description: >
      Username associated with ghcr_token when using a Personal Access Token.
      Pass the username value as this input, typically from the calling
      workflow's GHCR_USER repository variable (vars.GHCR_USER).
    default: ''
  refresh_cache:
    description: >
      When "true", always download fresh artifacts even when a cache entry
      already exists.  Cache entries are keyed from the resolved Debian
      codename and code-server / Copilot Chat versions, so a new cache entry
      is created automatically when any of those resolved values changes.
      If the resolved codename and versions are unchanged, the cache key is
      also unchanged and the existing cache entry remains current.  Use this
      when triggering a manual dispatch with no_cache=true to force rebuilding
      cached artifacts rather than reusing existing ones.
    default: 'false'

outputs:
  downloads_dir:
    description: >
      Path to the directory whose pre-downloaded/ subdirectory contains the
      pre-seeded artifacts.  Pass as DOWNLOADS_DIR to docker buildx bake.
    value: ${{ steps.set-dir.outputs.downloads_dir }}
  bake_overrides_file:
    description: >
      Path to a JSON bake-override file that maps each phpX_Y-downloader target
      to the code-server and Copilot Chat versions and SHA256 digests resolved
      for its Debian tier.  Pass to docker buildx bake as an additional --file.
    value: ${{ steps.assemble.outputs.bake_overrides_file }}

runs:
  using: composite
  steps:
    - name: Set downloads directory
      id: set-dir
      shell: bash
      run: echo "downloads_dir=${{ runner.temp }}/build-downloads" >> "$GITHUB_OUTPUT"

    # ── Codenames cache ────────────────────────────────────────────────────────
    # Caches the (PHP version → Debian codename) mapping across runs so that
    # docker pull is skipped when the codename for that version is known.
    # Keyed by PHP version, not image digest, so the cache survives upstream
    # image rebuilds (the Debian release for a PHP version never changes
    # mid-lifecycle).  The key ends with "-" so GHA's built-in prefix matching
    # finds the most-recently created entry whose key starts with that prefix.
    - name: Restore codenames cache
      id: codenames-cache
      uses: actions/cache/restore@v5
      with:
        path: ${{ runner.temp }}/php-codenames-cache.json
        key: php-codenames-

    # Best-effort GHCR login so the mirror pull below can reach private packages.
    # Falls back to the PAT (ghcr_token/ghcr_user) when configured, mirroring the
    # same credential-selection logic used by build-php-images and merge-manifests.
    # continue-on-error keeps the silent-fallback behaviour when login fails.

    # Emit a non-fatal warning when a PAT is provided without the required username
    # so the misconfiguration is visible rather than silently falling back to
    # GITHUB_TOKEN (which may not have read access to the private mirror).
    - name: Warn on incomplete GHCR PAT configuration
      if: inputs.ghcr_token != '' && inputs.ghcr_user == ''
      shell: bash
      run: |
        echo "::warning::ghcr_token is set but ghcr_user is not provided. GHCR login will fall back to GITHUB_TOKEN. Set ghcr_user (typically vars.GHCR_USER) if PAT auth is required for the private mirror pull."

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      continue-on-error: true
      with:
        registry: ghcr.io
        username: ${{ inputs.ghcr_token && inputs.ghcr_user || github.actor }}
        password: ${{ inputs.ghcr_user && inputs.ghcr_token || inputs.github_token }}

    - name: Detect Debian codenames and resolve artifact versions
      id: detect-and-resolve
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        set -euo pipefail
        VERSIONS="${{ inputs.versions }}"
        RESOLVE_ENV="$RUNNER_TEMP/preseed-resolve.env"

        # ── Step 1: Detect Debian codename for each PHP version ───────────────
        declare -A CODENAME_FOR   # PHP version → Debian codename
        declare -A IMAGE_FOR      # Debian codename → representative php:<ver>-apache image
        declare -A VERSIONS_FOR   # Debian codename → space-separated PHP versions

        # ── Load codenames cache ──────────────────────────────────────────────
        # The cache maps PHP version → Debian codename.  A cache hit avoids
        # docker pull entirely; a cache miss pulls and updates the cache.
        # Keyed by PHP version (not image digest) so the cache survives upstream
        # image rebuilds — the Debian release never changes within a PHP version's
        # lifecycle (e.g. PHP 8.2 is always bookworm).
        CODENAMES_CACHE_FILE="${RUNNER_TEMP}/php-codenames-cache.json"
        [[ -f "${CODENAMES_CACHE_FILE}" ]] || echo '{}' > "${CODENAMES_CACHE_FILE}"

        # Obtain an anonymous Docker Hub token for library/php to look up
        # image manifests without using the authenticated pull quota.
        ANON_PHP_TOKEN=""
        ANON_PHP_TOKEN="$(curl -sf --connect-timeout 5 --max-time 15 \
          "https://auth.docker.io/token?service=registry.docker.io&scope=repository:library/php:pull" \
          2>/dev/null | jq -r '.token // ""')" || ANON_PHP_TOKEN=""
        if [[ -n "${ANON_PHP_TOKEN}" ]]; then
          echo "  Obtained anonymous Docker Hub token for library/php." >&2
        else
          echo "  Could not obtain anonymous token; will use docker pull for all versions." >&2
        fi

        for ver in $VERSIONS; do
          image="php:${ver}-apache"

          # ── Check codenames cache by PHP version ──────────────────────────
          # The Debian release for a PHP version never changes mid-lifecycle,
          # so the version string is a stable cache key (unlike the image
          # digest, which changes on every upstream rebuild).
          codename="$(jq -r --arg v "${ver}" '.[$v] // ""' \
            "${CODENAMES_CACHE_FILE}" 2>/dev/null)" || codename=""

          if [[ -n "${codename}" ]]; then
            echo "  ${image} → ${codename} (cached for version ${ver})" >&2
          else
            # ── Cache miss: pull the image and detect codename ─────────────
            # Attempt flow (GHCR mirror first, then unauthenticated Docker Hub):
            #   1. Best-effort anonymous registry API probe to check manifest
            #      reachability and capture the digest for logging only
            #      (no docker pull, no account pull quota consumed). Probe
            #      failures are diagnostic and do not skip the pull steps.
            #   2. GHCR mirror pull (avoids Docker Hub pull quota entirely).
            #   3. Unauthenticated Docker Hub pull (IP-based anonymous quota).
            #      Fails visibly if rate-limited; no authenticated fallback —
            #      Docker Hub credentials are scoped to pushing our own images
            #      (devpanel/php) only.
            if [[ -n "${ANON_PHP_TOKEN}" ]]; then
              _head_tmp="$(mktemp)"
              _curl_ok=false
              curl -sf --connect-timeout 5 --max-time 15 \
                --head \
                -H "Authorization: Bearer ${ANON_PHP_TOKEN}" \
                -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.v2+json" \
                -D "${_head_tmp}" \
                "https://registry-1.docker.io/v2/library/php/manifests/${ver}-apache" \
                2>/dev/null && _curl_ok=true || true
              if [[ "${_curl_ok}" == "true" ]]; then
                _image_digest="$(grep -i '^docker-content-digest:' "${_head_tmp}" 2>/dev/null \
                  | awk '{print $2}' | tr -d '\r\n')" || _image_digest=""
                [[ -n "${_image_digest}" ]] \
                  && echo "  ${image} digest: ${_image_digest} (manifest reachable)" >&2
              else
                echo "  Anonymous manifest HEAD failed for ${image}." >&2
              fi
              rm -f "${_head_tmp}"
            fi
            _GHCR_MIRROR="ghcr.io/$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')/php-base-mirror"
            _GHCR_MIRROR_IMAGE="${_GHCR_MIRROR}/library/php:${ver}-apache"
            if docker pull --quiet "${_GHCR_MIRROR_IMAGE}" >/dev/null 2>&1; then
              echo "  Pulled from GHCR mirror (${_GHCR_MIRROR_IMAGE}); skipping Docker Hub pull." >&2
              image="${_GHCR_MIRROR_IMAGE}"
            else
              # Pull without Docker Hub credentials: Docker Hub credentials are
              # scoped to pushing our own images (devpanel/php), not pulling
              # public base images.  Use IP-based anonymous quota; if
              # rate-limited the error is visible in the log.
              echo "Pulling ${image} to detect Debian codename (unauthenticated)..." >&2
              docker pull --quiet "$image" >&2
            fi
            codename=$(docker run --rm "$image" sh -c \
              '. /etc/os-release && printf "%s" "${VERSION_CODENAME:-}"')
            # Cache the codename by PHP version (stable key, never changes mid-lifecycle).
            if [[ -n "${codename}" ]]; then
              _updated="$(jq --arg v "${ver}" --arg c "${codename}" \
                '. + {($v): $c}' "${CODENAMES_CACHE_FILE}" 2>/dev/null)" || _updated=""
              [[ -n "${_updated}" ]] && printf '%s\n' "${_updated}" > "${CODENAMES_CACHE_FILE}"
            fi
          fi
          # Validate: Debian codenames are purely lowercase ASCII letters.
          if [ -z "$codename" ] || ! printf '%s' "$codename" | grep -qE '^[a-z]+$'; then
            echo "ERROR: unexpected VERSION_CODENAME '${codename}' from ${image}" >&2
            echo "       Expected a lowercase-only string like 'bookworm' or 'bullseye'." >&2
            exit 1
          fi
          echo "  php:${ver}-apache → ${codename}" >&2
          CODENAME_FOR[$ver]="$codename"
          if [ -z "${VERSIONS_FOR[$codename]+x}" ]; then
            VERSIONS_FOR[$codename]="$ver"
            IMAGE_FOR[$codename]="$image"
          else
            VERSIONS_FOR[$codename]="${VERSIONS_FOR[$codename]} $ver"
          fi
        done

        echo "Detected codename groups:" >&2
        for cn in "${!VERSIONS_FOR[@]}"; do
          echo "  ${cn}: PHP ${VERSIONS_FOR[$cn]} (test image: ${IMAGE_FOR[$cn]})" >&2
        done

        # The primary (most-capable) codename: codename of the LAST PHP version
        # in the input list, assumed to correspond to the newest Debian release.
        PRIMARY_CODENAME=""
        for ver in $VERSIONS; do
          PRIMARY_CODENAME="${CODENAME_FOR[$ver]}"
        done
        [ -n "$PRIMARY_CODENAME" ] || {
          echo "ERROR: no PHP versions were processed; 'versions' input may be empty" >&2
          exit 1
        }
        [ "${#VERSIONS_FOR[@]}" -gt 0 ] || {
          echo "ERROR: no Debian codenames were detected; 'versions' input may be empty" >&2
          exit 1
        }
        PRIMARY_IMAGE="${IMAGE_FOR[$PRIMARY_CODENAME]}"
        echo "Primary codename: ${PRIMARY_CODENAME} (representative image: ${PRIMARY_IMAGE})" >&2

        # ── Step 2: Fetch upstream release data once ──────────────────────────
        # Save to temp files so the cache-miss download step can reuse them
        # without re-fetching from the network.
        CODESERVER_RELEASES_JSON=$(curl -fsSL --retry 3 --retry-all-errors --connect-timeout 30 \
          -H 'Accept: application/vnd.github+json' \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H 'X-GitHub-Api-Version: 2022-11-28' \
          'https://api.github.com/repos/coder/code-server/releases?per_page=100')
        printf '%s' "$CODESERVER_RELEASES_JSON" > "$RUNNER_TEMP/cs-releases.json"

        MARKETPLACE_JSON=$(curl -fsSL --retry 3 --retry-all-errors --connect-timeout 30 \
          -X POST \
          -H 'Content-Type: application/json' \
          -H 'Accept: application/json;api-version=3.0-preview.1' \
          -d '{"filters":[{"criteria":[{"filterType":7,"value":"GitHub.copilot-chat"}],"pageSize":100}],"flags":17}' \
          'https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery')
        printf '%s' "$MARKETPLACE_JSON" > "$RUNNER_TEMP/marketplace.json"

        # Emits stable Copilot Chat versions compatible with the given VS Code
        # version, sorted newest-first.
        copilot_candidates_for_vscode() {
          local vscode="$1"
          printf '%s' "$MARKETPLACE_JSON" | jq -r \
            --arg vscode "$vscode" '
              def vparts: split(".") | map(tonumber? // 0);
              [
                .results[0].extensions[0].versions[]? |
                select(.version | test("^[0-9]+\\.[0-9]+\\.[0-9]{1,9}$")) |
                (.properties // [] |
                 map(select(.key == "Microsoft.VisualStudio.Code.Engine")) |
                 .[0].value // "") as $engine |
                select($engine != "") |
                ($engine | gsub("^[^0-9]+"; "") | split("-")[0]) as $min_vscode |
                select(($vscode | vparts) >= ($min_vscode | vparts)) |
                .version
              ] | sort_by(split(".") | map(tonumber? // 0)) | reverse | .[]
            '
        }

        # ── Step 3: Resolve code-server for the primary codename ──────────────
        CS_VERSION_PRIMARY=$(printf '%s' "$CODESERVER_RELEASES_JSON" | jq -r '
          first(
            .[] |
            select(.draft==false and .prerelease==false) |
            select(.tag_name | test("^v?4\\.[0-9]+\\.[0-9]+([-+].*)?$")) |
            .tag_name | ltrimstr("v")
          ) // ""
        ')
        [ -n "$CS_VERSION_PRIMARY" ] || {
          echo "ERROR: failed to detect latest stable code-server version" >&2; exit 1
        }
        echo "Primary (${PRIMARY_CODENAME}) code-server: ${CS_VERSION_PRIMARY}" >&2

        # ── Step 4: Resolve Copilot Chat for the primary codename ─────────────
        VSCODE_PRIMARY="$(printf '%s' "$CS_VERSION_PRIMARY" | sed 's/^[0-9][0-9]*\./1./')"
        CC_VERSION_PRIMARY=$(copilot_candidates_for_vscode "$VSCODE_PRIMARY" | head -1)
        [ -n "$CC_VERSION_PRIMARY" ] || {
          echo "ERROR: failed to detect Copilot Chat version for ${PRIMARY_CODENAME}" >&2; exit 1
        }
        echo "Primary (${PRIMARY_CODENAME}) Copilot Chat: ${CC_VERSION_PRIMARY}" >&2

        # ── Step 5: Set tentative versions for all codenames ──────────────────
        # Non-primary codenames are initially assigned the primary versions.
        # The actual compatibility testing (which requires downloading artifacts)
        # is deferred to the cache-miss download step so that cache hits skip
        # all artifact downloads.  The cache is invalidated whenever the primary
        # version changes, which also triggers re-verification for all codenames.
        declare -A CS_VERSION_FOR   # codename → resolved code-server version
        declare -A CC_VERSION_FOR   # codename → resolved Copilot Chat version
        for codename in "${!VERSIONS_FOR[@]}"; do
          CS_VERSION_FOR[$codename]="$CS_VERSION_PRIMARY"
          CC_VERSION_FOR[$codename]="$CC_VERSION_PRIMARY"
        done

        # ── Step 6: Write resolve.env and compute cache key ───────────────────
        # The env file is sourced by subsequent steps to access codename mappings
        # and resolved versions without re-running docker or API calls.
        # Variable names use the codename as a suffix (e.g. CS_VERSION_bookworm);
        # Debian codenames consist solely of lowercase ASCII letters, so they are
        # always valid bash identifier suffixes.
        {
          printf 'PRIMARY_CODENAME=%s\n' "$PRIMARY_CODENAME"
          # Space-separated sorted unique codenames — quoted so sourcing is safe.
          printf 'UNIQUE_CODENAMES="%s"\n' \
            "$(echo "${!VERSIONS_FOR[@]}" | tr ' ' '\n' | sort | tr '\n' ' ' | xargs)"
          # Per-PHP-version codename mapping.
          for ver in $VERSIONS; do
            key="$(echo "$ver" | tr '.' '_')"
            printf 'CODENAME_%s=%s\n' "$key" "${CODENAME_FOR[$ver]}"
          done
          # Per-codename tentative resolved versions (may be updated by download step).
          for cn in "${!VERSIONS_FOR[@]}"; do
            printf 'CS_VERSION_%s=%s\n' "$cn" "${CS_VERSION_FOR[$cn]}"
            printf 'CC_VERSION_%s=%s\n' "$cn" "${CC_VERSION_FOR[$cn]}"
          done
          # Per-codename representative image used by the download step for
          # compatibility testing of non-primary codenames.
          for cn in "${!VERSIONS_FOR[@]}"; do
            printf 'IMAGE_%s=%s\n' "$cn" "${IMAGE_FOR[$cn]}"
          done
        } > "$RESOLVE_ENV"

        # Cache key: SHA256 of the primary-version-based tuples for all codenames.
        # Invalidated whenever the primary code-server or Copilot Chat version
        # changes, triggering a fresh download and compat re-test for all codenames.
        CACHE_KEY=$(
          for cn in $(echo "${!VERSIONS_FOR[@]}" | tr ' ' '\n' | sort); do
            printf '%s=%s,%s;' "$cn" "${CS_VERSION_FOR[$cn]}" "${CC_VERSION_FOR[$cn]}"
          done | sha256sum | awk '{print $1}'
        )

        echo "cache_key=${CACHE_KEY}"       >> "$GITHUB_OUTPUT"
        echo "resolve_env=${RESOLVE_ENV}"   >> "$GITHUB_OUTPUT"

        echo "Tentative versions per Debian codename (verified on cache miss):"
        for cn in $(echo "${!VERSIONS_FOR[@]}" | tr ' ' '\n' | sort); do
          echo "  ${cn}: code-server=${CS_VERSION_FOR[$cn]}  copilot-chat=${CC_VERSION_FOR[$cn]}"
        done

    # ── Save codenames cache ───────────────────────────────────────────────────
    # Persist the (PHP version → Debian codename) map using a content-based key
    # so identical cache files reuse the same entry instead of creating a new
    # one every run.  Runs even if the detection step failed, in case it
    # partially updated the cache file.
    - name: Compute codenames cache key
      if: always()
      id: codenames-cache-key
      shell: bash
      run: |
        cache_file="${{ runner.temp }}/php-codenames-cache.json"
        if [[ -f "$cache_file" ]]; then
          hash="$(sha256sum "$cache_file" | awk '{print $1}')"
          echo "key=php-codenames-${hash}" >> "$GITHUB_OUTPUT"
        else
          echo "key=" >> "$GITHUB_OUTPUT"
        fi

    - name: Save codenames cache
      if: always() && steps.codenames-cache-key.outputs.key != '' && steps.codenames-cache.outputs.cache-matched-key != steps.codenames-cache-key.outputs.key
      uses: actions/cache/save@v5
      with:
        path: ${{ runner.temp }}/php-codenames-cache.json
        key: ${{ steps.codenames-cache-key.outputs.key }}

    # ── Cache step ────────────────────────────────────────────────────────────
    # A single cache entry covers all detected Debian tiers.  The key is a
    # hash of every (codename, cs_version, cc_version) tuple, so the cache is
    # invalidated when any resolved version changes for any tier.  The key is
    # stable across runs as long as the content hash does not change; there is
    # at most one cache entry per hash.
    - name: Restore preseed artifacts cache
      id: cache
      uses: actions/cache/restore@v5
      with:
        path: ${{ runner.temp }}/preseed-artifacts
        key: preseed-${{ steps.detect-and-resolve.outputs.cache_key }}

    # ── Download step ─────────────────────────────────────────────────────────
    # Runs on cache miss (cache-matched-key is empty), or unconditionally when
    # refresh_cache is "true" (e.g. in the rebuild-all workflow).  Downloads primary
    # artifacts, runs compatibility tests for non-primary Debian codenames
    # (searching backwards for an older compatible version when the primary does
    # not work), writes a final-versions.env into the cache directory (so
    # subsequent cache-hit runs can recover actual per-codename versions without
    # re-downloading), then downloads all artifacts.
    - name: Download artifacts for all detected Debian tiers (cache miss or refresh)
      if: steps.cache.outputs.cache-matched-key == '' || inputs.refresh_cache == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        set -euo pipefail
        VERSIONS="${{ inputs.versions }}"
        # shellcheck source=/dev/null
        source "${{ steps.detect-and-resolve.outputs.resolve_env }}"

        # ── Compatibility helpers ───────────────────────────────────────────────
        # Returns 0 if the .deb's bundled node binary AND all native .node
        # addons resolve all shared libs on the target image, 1 if extraction
        # fails or any lib is missing.  Checking only the main node binary is
        # insufficient because bundled native addons (e.g. argon2.glibc.node)
        # may require a newer GLIBC than the node binary itself.
        check_deb_on_image() {
          local deb="$1" image="$2"
          local tmp_dir
          tmp_dir=$(mktemp -d)
          if ! dpkg-deb -x "$deb" "$tmp_dir" 2>/dev/null; then
            echo "  WARNING: failed to extract .deb; treating as incompatible" >&2
            rm -rf "$tmp_dir"
            return 1
          fi
          local node_bin
          node_bin=$(find "$tmp_dir" -name "node" ! -name "*.js" -perm /111 -type f | head -1)
          if [ -z "$node_bin" ]; then
            echo "  WARNING: no node binary found in .deb; treating as incompatible" >&2
            rm -rf "$tmp_dir"
            return 1
          fi
          local result=0
          # Check the main node binary.
          docker run --rm \
            -v "${node_bin}:/tmp/node:ro" \
            --entrypoint sh \
            "$image" \
            -c 'missing=$(ldd /tmp/node 2>&1 | grep "not found"); [ -z "$missing" ] || { echo "$missing" >&2; exit 1; }' \
            || result=1
          # Also check all bundled native .node addons: they may require a
          # newer GLIBC than the main node binary (e.g. argon2.glibc.node).
          if [ "$result" -eq 0 ]; then
            while IFS= read -r node_addon; do
              docker run --rm \
                -v "${node_addon}:/tmp/check.node:ro" \
                --entrypoint sh \
                "$image" \
                -c 'missing=$(ldd /tmp/check.node 2>&1 | grep "not found"); [ -z "$missing" ] || { echo "$missing" >&2; exit 1; }' \
                || { result=1; break; }
            done < <(find "$tmp_dir" -name "*.node" -type f 2>/dev/null)
          fi
          rm -rf "$tmp_dir"
          return $result
        }

        # Returns 0 if all .node files in the VSIX resolve all shared libs on
        # the target image, 1 if extraction fails or any lib is missing.
        check_vsix_on_image() {
          local vsix="$1" image="$2"
          local tmp_dir result=0
          tmp_dir=$(mktemp -d)
          if ! unzip -q "$vsix" -d "$tmp_dir" 2>/dev/null; then
            echo "  WARNING: failed to extract VSIX; treating as incompatible" >&2
            rm -rf "$tmp_dir"
            return 1
          fi
          while IFS= read -r node_file; do
            docker run --rm \
              -v "${node_file}:/tmp/check.node:ro" \
              --entrypoint sh \
              "$image" \
              -c 'missing=$(ldd /tmp/check.node 2>&1 | grep "not found"); [ -z "$missing" ] || { echo "$missing" >&2; exit 1; }' \
              || { result=1; break; }
          done < <(find "$tmp_dir" -name "*.node" -type f 2>/dev/null)
          rm -rf "$tmp_dir"
          return $result
        }
        # ──────────────────────────────────────────────────────────────────────

        # ── Load upstream release data saved by detect-and-resolve ────────────
        # Written to RUNNER_TEMP in the detect-and-resolve step; available here
        # since both steps run in the same job on the same runner.
        [ -f "$RUNNER_TEMP/cs-releases.json" ] || {
          echo "ERROR: cs-releases.json not found; detect-and-resolve may have failed" >&2; exit 1
        }
        [ -f "$RUNNER_TEMP/marketplace.json" ] || {
          echo "ERROR: marketplace.json not found; detect-and-resolve may have failed" >&2; exit 1
        }
        CODESERVER_RELEASES_JSON=$(cat "$RUNNER_TEMP/cs-releases.json")
        MARKETPLACE_JSON=$(cat "$RUNNER_TEMP/marketplace.json")

        copilot_candidates_for_vscode() {
          local vscode="$1"
          printf '%s' "$MARKETPLACE_JSON" | jq -r \
            --arg vscode "$vscode" '
              def vparts: split(".") | map(tonumber? // 0);
              [
                .results[0].extensions[0].versions[]? |
                select(.version | test("^[0-9]+\\.[0-9]+\\.[0-9]{1,9}$")) |
                (.properties // [] |
                 map(select(.key == "Microsoft.VisualStudio.Code.Engine")) |
                 .[0].value // "") as $engine |
                select($engine != "") |
                ($engine | gsub("^[^0-9]+"; "") | split("-")[0]) as $min_vscode |
                select(($vscode | vparts) >= ($min_vscode | vparts)) |
                .version
              ] | sort_by(split(".") | map(tonumber? // 0)) | reverse | .[]
            '
        }

        # ── Determine primary versions from resolve.env ────────────────────────
        CS_PRIMARY_VAR="CS_VERSION_${PRIMARY_CODENAME}"
        CS_VERSION_PRIMARY="${!CS_PRIMARY_VAR}"
        CC_PRIMARY_VAR="CC_VERSION_${PRIMARY_CODENAME}"
        CC_VERSION_PRIMARY="${!CC_PRIMARY_VAR}"

        # ── Download primary artifacts for compatibility testing ────────────────
        echo "Downloading primary (${PRIMARY_CODENAME}) code-server ${CS_VERSION_PRIMARY} amd64 .deb..." >&2
        curl -fsSL --retry 3 --retry-all-errors --connect-timeout 30 \
          "https://github.com/coder/code-server/releases/download/v${CS_VERSION_PRIMARY}/code-server_${CS_VERSION_PRIMARY}_amd64.deb" \
          -o "$RUNNER_TEMP/cs-${PRIMARY_CODENAME}-amd64.deb"
        head -c 8 "$RUNNER_TEMP/cs-${PRIMARY_CODENAME}-amd64.deb" | grep -qF '!<arch>' || {
          echo "ERROR: code-server_${CS_VERSION_PRIMARY}_amd64.deb failed format validation" >&2; exit 1
        }

        echo "Downloading primary (${PRIMARY_CODENAME}) Copilot Chat ${CC_VERSION_PRIMARY} VSIX..." >&2
        curl -fsSL --compressed --retry 3 --retry-all-errors --connect-timeout 30 \
          "https://marketplace.visualstudio.com/_apis/public/gallery/publishers/GitHub/vsextensions/copilot-chat/${CC_VERSION_PRIMARY}/vspackage" \
          -o "$RUNNER_TEMP/cc-${PRIMARY_CODENAME}.vsix"
        od -An -N4 -tx1 "$RUNNER_TEMP/cc-${PRIMARY_CODENAME}.vsix" | tr -d ' \n' | grep -q '^504b0304' || {
          echo "ERROR: copilot-chat-${CC_VERSION_PRIMARY}.vsix failed format validation" >&2; exit 1
        }

        # ── Resolve actual versions for non-primary codenames ──────────────────
        declare -A CS_VERSION_FOR
        declare -A CC_VERSION_FOR
        CS_VERSION_FOR[$PRIMARY_CODENAME]="$CS_VERSION_PRIMARY"
        CC_VERSION_FOR[$PRIMARY_CODENAME]="$CC_VERSION_PRIMARY"

        for codename in $UNIQUE_CODENAMES; do
          [ "$codename" = "$PRIMARY_CODENAME" ] && continue
          # IMAGE_bookworm / IMAGE_bullseye etc. are set in resolve.env.
          IMAGE_VAR="IMAGE_${codename}"
          test_image="${!IMAGE_VAR}"
          echo "Resolving artifacts for ${codename} (test image: ${test_image})..." >&2

          # ── code-server ──────────────────────────────────────────────────────
          if check_deb_on_image "$RUNNER_TEMP/cs-${PRIMARY_CODENAME}-amd64.deb" "$test_image"; then
            CS_VERSION_FOR[$codename]="$CS_VERSION_PRIMARY"
            cp "$RUNNER_TEMP/cs-${PRIMARY_CODENAME}-amd64.deb" \
               "$RUNNER_TEMP/cs-${codename}-amd64.deb"
            echo "  ${codename} code-server = ${CS_VERSION_PRIMARY} (primary version works)" >&2
          else
            echo "  Primary code-server ${CS_VERSION_PRIMARY} incompatible with ${test_image}; searching..." >&2
            CS_VERSION_FOR[$codename]=""
            while IFS= read -r candidate; do
              [ "$candidate" = "$CS_VERSION_PRIMARY" ] && continue
              echo "  Checking code-server ${candidate} on ${test_image}..." >&2
              TMP_DEB=$(mktemp --suffix=.deb)
              if curl -fsSL --retry 3 --retry-all-errors --connect-timeout 30 \
                   "https://github.com/coder/code-server/releases/download/v${candidate}/code-server_${candidate}_amd64.deb" \
                   -o "$TMP_DEB" 2>/dev/null \
                 && head -c 8 "$TMP_DEB" | grep -qF '!<arch>' \
                 && check_deb_on_image "$TMP_DEB" "$test_image"; then
                CS_VERSION_FOR[$codename]="$candidate"
                mv "$TMP_DEB" "$RUNNER_TEMP/cs-${codename}-amd64.deb"
                echo "  Selected ${codename} code-server: ${candidate}" >&2
                break
              else
                rm -f "$TMP_DEB"
              fi
            done < <(printf '%s' "$CODESERVER_RELEASES_JSON" | jq -r '
              [.[] |
              select(.draft==false and .prerelease==false) |
              select(.tag_name | test("^v?4\\.[0-9]+\\.[0-9]+([-+].*)?$")) |
              .tag_name | ltrimstr("v")] | .[]')
            [ -n "${CS_VERSION_FOR[$codename]}" ] || {
              echo "ERROR: no compatible code-server version found for ${test_image}" >&2; exit 1
            }
          fi

          # ── Copilot Chat ─────────────────────────────────────────────────────
          if [ "${CS_VERSION_FOR[$codename]}" = "$CS_VERSION_PRIMARY" ] \
             && check_vsix_on_image "$RUNNER_TEMP/cc-${PRIMARY_CODENAME}.vsix" "$test_image"; then
            CC_VERSION_FOR[$codename]="$CC_VERSION_PRIMARY"
            cp "$RUNNER_TEMP/cc-${PRIMARY_CODENAME}.vsix" \
               "$RUNNER_TEMP/cc-${codename}.vsix"
            echo "  ${codename} Copilot Chat = ${CC_VERSION_PRIMARY} (primary VSIX works)" >&2
          else
            VSCODE_THIS="$(printf '%s' "${CS_VERSION_FOR[$codename]}" | sed 's/^[0-9][0-9]*\./1./')"
            CC_VERSION_FOR[$codename]=""
            while IFS= read -r candidate; do
              echo "  Checking Copilot Chat ${candidate} on ${test_image}..." >&2
              TMP_VSIX=$(mktemp --suffix=.vsix)
              if [ "$candidate" = "$CC_VERSION_PRIMARY" ] \
                 && [ -f "$RUNNER_TEMP/cc-${PRIMARY_CODENAME}.vsix" ]; then
                cp "$RUNNER_TEMP/cc-${PRIMARY_CODENAME}.vsix" "$TMP_VSIX"
              else
                curl -fsSL --compressed --retry 3 --retry-all-errors --connect-timeout 30 \
                  "https://marketplace.visualstudio.com/_apis/public/gallery/publishers/GitHub/vsextensions/copilot-chat/${candidate}/vspackage" \
                  -o "$TMP_VSIX" 2>/dev/null || { rm -f "$TMP_VSIX"; continue; }
                od -An -N4 -tx1 "$TMP_VSIX" | tr -d ' \n' | grep -q '^504b0304' \
                  || { rm -f "$TMP_VSIX"; continue; }
              fi
              if check_vsix_on_image "$TMP_VSIX" "$test_image"; then
                CC_VERSION_FOR[$codename]="$candidate"
                mv "$TMP_VSIX" "$RUNNER_TEMP/cc-${codename}.vsix"
                echo "  Selected ${codename} Copilot Chat: ${candidate}" >&2
                break
              else
                rm -f "$TMP_VSIX"
              fi
            done < <(copilot_candidates_for_vscode "$VSCODE_THIS")
            [ -n "${CC_VERSION_FOR[$codename]}" ] || {
              echo "ERROR: no compatible Copilot Chat version found for ${test_image}" >&2; exit 1
            }
          fi
        done

        # ── Write final-versions.env into the preseed-artifacts cache dir ──────
        # Included in the cache so subsequent cache-hit runs recover the actual
        # per-codename versions (which may differ from the tentative primary
        # versions in resolve.env) without re-downloading or re-testing anything.
        mkdir -p "$RUNNER_TEMP/preseed-artifacts"
        FINAL_VERSIONS_ENV="$RUNNER_TEMP/preseed-artifacts/final-versions.env"
        {
          for cn in $(echo "${!CS_VERSION_FOR[@]}" | tr ' ' '\n' | sort); do
            printf 'CS_VERSION_%s=%s\n' "$cn" "${CS_VERSION_FOR[$cn]}"
            printf 'CC_VERSION_%s=%s\n' "$cn" "${CC_VERSION_FOR[$cn]}"
          done
        } > "$FINAL_VERSIONS_ENV"

        echo "Final resolved versions per Debian codename:"
        for cn in $(echo "${!CS_VERSION_FOR[@]}" | tr ' ' '\n' | sort); do
          echo "  ${cn}: code-server=${CS_VERSION_FOR[$cn]}  copilot-chat=${CC_VERSION_FOR[$cn]}"
        done

        # ── Download all artifacts ─────────────────────────────────────────────
        for cn in $UNIQUE_CODENAMES; do
          cs_ver="${CS_VERSION_FOR[$cn]}"
          cc_ver="${CC_VERSION_FOR[$cn]}"
          ARTIFACT_DIR="${{ runner.temp }}/preseed-artifacts/${cn}"
          mkdir -p "$ARTIFACT_DIR"

          # ── code-server .deb files ────────────────────────────────────────────
          for ARCH in amd64 arm64; do
            DEB="code-server_${cs_ver}_${ARCH}.deb"
            TARGET="${ARTIFACT_DIR}/${DEB}"
            # Reuse the amd64 .deb already downloaded for compat testing above.
            COMPAT_DEB="$RUNNER_TEMP/cs-${cn}-amd64.deb"
            if [ "$ARCH" = "amd64" ] && [ -f "$COMPAT_DEB" ]; then
              echo "Reusing ${DEB} from compatibility testing phase (${cn})"
              [ "$COMPAT_DEB" != "$TARGET" ] && cp "$COMPAT_DEB" "$TARGET"
              head -c 8 "$TARGET" | grep -qF '!<arch>' || {
                echo "ERROR: ${DEB} failed format validation" >&2; exit 1
              }
            else
              echo "Downloading ${DEB} (${cn})"
              curl -fsSL --retry 5 --retry-all-errors --connect-timeout 30 \
                "https://github.com/coder/code-server/releases/download/v${cs_ver}/${DEB}" \
                -o "$TARGET"
              head -c 8 "$TARGET" | grep -qF '!<arch>' || {
                echo "ERROR: ${DEB} failed format validation" >&2; exit 1
              }
            fi
          done

          # ── Copilot Chat VSIX ─────────────────────────────────────────────────
          VSIX="copilot-chat-${cc_ver}.vsix"
          TARGET="${ARTIFACT_DIR}/${VSIX}"
          COMPAT_VSIX="$RUNNER_TEMP/cc-${cn}.vsix"
          if [ -f "$COMPAT_VSIX" ]; then
            echo "Reusing ${VSIX} from compatibility testing phase (${cn})"
            [ "$COMPAT_VSIX" != "$TARGET" ] && cp "$COMPAT_VSIX" "$TARGET"
            od -An -N4 -tx1 "$TARGET" | tr -d ' \n' | grep -q '^504b0304' || {
              echo "ERROR: ${VSIX} failed format validation" >&2; exit 1
            }
          else
            echo "Downloading ${VSIX} (${cn})"
            curl -fsSL --compressed --retry 5 --retry-all-errors --connect-timeout 30 \
              "https://marketplace.visualstudio.com/_apis/public/gallery/publishers/GitHub/vsextensions/copilot-chat/${cc_ver}/vspackage" \
              -o "$TARGET"
            od -An -N4 -tx1 "$TARGET" | tr -d ' \n' | grep -q '^504b0304' || {
              echo "ERROR: ${VSIX} failed format validation" >&2; exit 1
            }
          fi
        done

    # ── Save preseed artifacts cache ──────────────────────────────────────────
    # Runs when the restore step did not find this exact key, i.e. the content
    # hash changed or no entry exists yet.  There is at most one cache entry per
    # hash; when the restore already matched our key, the content is unchanged
    # and no new entry is needed.
    - name: Save preseed artifacts cache
      if: steps.cache.outputs.cache-matched-key != format('preseed-{0}', steps.detect-and-resolve.outputs.cache_key)
      uses: actions/cache/save@v5
      with:
        path: ${{ runner.temp }}/preseed-artifacts
        key: preseed-${{ steps.detect-and-resolve.outputs.cache_key }}

    # ── Assemble step ─────────────────────────────────────────────────────────
    # Copies unique artifacts to pre-downloaded/, computes SHA256 digests, and
    # generates the JSON bake-override file that maps each phpX_Y-downloader
    # target to the resolved versions and hashes for its Debian tier.
    - name: Assemble pre-downloaded directory and generate bake overrides
      id: assemble
      shell: bash
      run: |
        set -euo pipefail
        VERSIONS="${{ inputs.versions }}"
        # shellcheck source=/dev/null
        source "${{ steps.detect-and-resolve.outputs.resolve_env }}"
        # On cache hit the download step is skipped, but final-versions.env is
        # restored from cache and contains the actual per-codename versions
        # (which may be older than primary for non-primary codenames).
        # Source it to override the tentative values from resolve.env.
        FINAL_VERSIONS_ENV="${{ runner.temp }}/preseed-artifacts/final-versions.env"
        # shellcheck source=/dev/null
        [ -f "$FINAL_VERSIONS_ENV" ] && source "$FINAL_VERSIONS_ENV"

        PRE_DOWNLOADED_DIR="${{ steps.set-dir.outputs.downloads_dir }}/pre-downloaded"
        BAKE_OVERRIDES_FILE="${{ runner.temp }}/preseed-bake-overrides.json"
        mkdir -p "$PRE_DOWNLOADED_DIR"

        # ── Copy unique artifacts to pre-downloaded/ ───────────────────────────
        # Track already-copied filenames to avoid duplicating files when two
        # codenames resolve to the same code-server or Copilot Chat version.
        declare -A COPIED
        for cn in $UNIQUE_CODENAMES; do
          cs_ver_var="CS_VERSION_${cn}"
          cc_ver_var="CC_VERSION_${cn}"
          cs_ver="${!cs_ver_var}"
          cc_ver="${!cc_ver_var}"
          ARTIFACT_DIR="${{ runner.temp }}/preseed-artifacts/${cn}"

          for ARCH in amd64 arm64; do
            DEB="code-server_${cs_ver}_${ARCH}.deb"
            if [ -z "${COPIED[$DEB]+x}" ]; then
              cp "${ARTIFACT_DIR}/${DEB}" "${PRE_DOWNLOADED_DIR}/"
              COPIED[$DEB]=1
            fi
          done

          VSIX="copilot-chat-${cc_ver}.vsix"
          if [ -z "${COPIED[$VSIX]+x}" ]; then
            cp "${ARTIFACT_DIR}/${VSIX}" "${PRE_DOWNLOADED_DIR}/"
            COPIED[$VSIX]=1
          fi
        done

        # ── Compute SHA256 digests ─────────────────────────────────────────────
        declare -A CS_SHA256_AMD64_FOR
        declare -A CS_SHA256_ARM64_FOR
        declare -A CC_SHA256_FOR

        for cn in $UNIQUE_CODENAMES; do
          cs_ver_var="CS_VERSION_${cn}"
          cc_ver_var="CC_VERSION_${cn}"
          cs_ver="${!cs_ver_var}"
          cc_ver="${!cc_ver_var}"

          CS_SHA256_AMD64_FOR[$cn]=$(sha256sum "${PRE_DOWNLOADED_DIR}/code-server_${cs_ver}_amd64.deb" | awk '{print $1}')
          CS_SHA256_ARM64_FOR[$cn]=$(sha256sum "${PRE_DOWNLOADED_DIR}/code-server_${cs_ver}_arm64.deb" | awk '{print $1}')
          CC_SHA256_FOR[$cn]=$(sha256sum "${PRE_DOWNLOADED_DIR}/copilot-chat-${cc_ver}.vsix" | awk '{print $1}')

          echo "${cn}: code-server-amd64=${CS_SHA256_AMD64_FOR[$cn]}  arm64=${CS_SHA256_ARM64_FOR[$cn]}  copilot-chat=${CC_SHA256_FOR[$cn]}"
        done

        # ── Generate JSON bake override file ───────────────────────────────────
        # One entry per PHP version, each pointing to the resolved versions and
        # SHA256 digests for its detected Debian codename.
        {
          printf '{"target":{'
          first=true
          for ver in $VERSIONS; do
            key="$(echo "$ver" | tr '.' '_')"
            codename_var="CODENAME_${key}"
            cn="${!codename_var}"
            cs_ver_var="CS_VERSION_${cn}"
            cc_ver_var="CC_VERSION_${cn}"
            cs_ver="${!cs_ver_var}"
            cc_ver="${!cc_ver_var}"
            amd64_sha="${CS_SHA256_AMD64_FOR[$cn]}"
            arm64_sha="${CS_SHA256_ARM64_FOR[$cn]}"
            vsix_sha="${CC_SHA256_FOR[$cn]}"
            $first || printf ','
            first=false
            printf '"%s":{"args":{' "php${key}-downloader"
            printf '"CODESERVER_VERSION":"%s",'           "$cs_ver"
            printf '"CODESERVER_DEB_SHA256_AMD64":"%s",'  "$amd64_sha"
            printf '"CODESERVER_DEB_SHA256_ARM64":"%s",'  "$arm64_sha"
            printf '"COPILOT_CHAT_VERSION":"%s",'         "$cc_ver"
            printf '"COPILOT_CHAT_VSIX_SHA256":"%s"'      "$vsix_sha"
            printf '}}'
          done
          printf '}}'
        } > "$BAKE_OVERRIDES_FILE"

        echo "Generated bake overrides:"
        cat "$BAKE_OVERRIDES_FILE"
        echo "bake_overrides_file=${BAKE_OVERRIDES_FILE}" >> "$GITHUB_OUTPUT"
