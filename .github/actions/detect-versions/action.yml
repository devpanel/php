name: Detect PHP versions and build matrix
description: >
  Detects which PHP versions to build and emits a build matrix and merge matrix
  for use in the CI pipeline.

  When before_sha and after_sha are provided, only the PHP versions whose
  source files changed between those two commits are included. Otherwise every
  versioned directory is built.

  The repository must be checked out by the calling job before this action
  is invoked. Pass fetch-depth: 0 when before_sha/after_sha are used so that
  the git history required by detect-versions.sh is available.

inputs:
  before_sha:
    description: >
      Commit SHA before the push. When provided together with after_sha, only
      changed versions are detected. Omit for a full rebuild.
    default: ''
  after_sha:
    description: >
      Commit SHA after the push. When provided together with before_sha, only
      changed versions are detected. Omit for a full rebuild.
    default: ''
  platforms_filter:
    description: >
      Comma-separated list of platforms to build
      (e.g. "linux/amd64,linux/arm64").
    required: true
  github_token:
    description: >
      GITHUB_TOKEN for the GHCR write-access pre-flight check.  Pass
      secrets.GITHUB_TOKEN from the calling workflow.  The check outcome
      determines whether GHCR or GHA is used as the primary layer cache
      by downstream build jobs.
    required: true
  ghcr_token:
    description: >
      Optional classic Personal Access Token with the write:packages scope.
      When provided, this token is used instead of github_token for the GHCR
      write-access check.  Required when the organisation's Actions token
      policy restricts GITHUB_TOKEN from writing to packages.
    default: ''

outputs:
  versions:
    description: Space-separated list of PHP versions to build.
    value: ${{ steps.detect.outputs.versions }}
  versions_base:
    description: Space-separated list of versions where the base stage changed.
    value: ${{ steps.detect.outputs.versions_base }}
  versions_secure:
    description: Space-separated list of versions where the secure stage changed.
    value: ${{ steps.detect.outputs.versions_secure }}
  latest_php_version:
    description: The highest PHP version present in the repository.
    value: ${{ steps.detect.outputs.latest_php_version }}
  total_platforms:
    description: Total number of distinct build platforms.
    value: ${{ steps.detect.outputs.total_platforms }}
  merge_matrix:
    description: >
      JSON array of {version, stage} objects — one entry per Docker Hub image
      that needs a manifest merge.
    value: ${{ steps.detect.outputs.merge_matrix }}
  build_matrix:
    description: >
      JSON array of {version, platform, versions_base, versions_secure} objects
      — one entry per PHP-version x platform combination.
    value: ${{ steps.detect.outputs.build_matrix }}
  build_matrix_length:
    description: >
      Total number of entries in the build matrix (versions × platforms).
      Equals the number of parallel build jobs that may each need one
      authenticated Docker Hub pull for the base PHP image.
    value: ${{ steps.detect.outputs.build_matrix_length }}
  ghcr_writable:
    description: >
      "true" if the GHCR write-access pre-flight check passed, "false"
      otherwise.  Consumed by build jobs to select whether GHCR is primary
      (when writable) or GHA is primary (when not writable) for layer caches.
    value: ${{ steps.check-ghcr.outputs.writable }}
  all_versions:
    description: >
      Space-separated list of ALL PHP versions present in the repository,
      regardless of the before_sha / after_sha filter.  Used to run preseed
      with the full version set so the newest Debian codename is always
      treated as primary and older codenames receive proper GLIBC
      compatibility testing.
    value: ${{ steps.detect.outputs.all_versions }}
  all_versions_count:
    description: >
      Total number of PHP versions present in the repository (word count of
      all_versions).  Used together with build_matrix_length to compute the
      worst-case Docker Hub pull count passed to wait-pull-quota: the
      pre-seed action may need one authenticated pull per version when the
      codenames cache is cold.
    value: ${{ steps.detect.outputs.all_versions_count }}

runs:
  using: composite
  steps:
    - name: Check GHCR write access
      id: check-ghcr
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.ghcr_token || inputs.github_token }}
        USING_GHCR_TOKEN: ${{ inputs.ghcr_token != '' }}
        REPO: ${{ github.repository }}
        ACTOR: ${{ github.actor }}
      run: |
        set -uo pipefail
        REPO_LC=$(echo "${REPO}" | tr '[:upper:]' '[:lower:]')
        ORG=$(echo "${REPO}" | cut -d'/' -f1)

        # Determine which credential is in use for accurate diagnostics.
        # GHA expressions produce the string 'true'/'false', not bash booleans,
        # so a string comparison is required here.
        if [[ "${USING_GHCR_TOKEN}" == "true" ]]; then
          AUTH_CRED_NAME="GHCR_TOKEN"
        else
          AUTH_CRED_NAME="GITHUB_TOKEN"
        fi

        NOTE="When GHCR is not writable, build jobs will use GHA as the primary layer cache instead."

        # Use a temp netrc file so credentials are not exposed as command-line arguments.
        # umask 0177 ensures the file is created with 0600 from the start (no race window).
        NETRC=$(umask 0177 && mktemp)
        # Ensure the netrc temp file is removed when this step's shell exits,
        # regardless of which code path is taken.
        trap 'rm -f "${NETRC}"' EXIT
        printf 'machine ghcr.io login %s password %s\n' "${ACTOR}" "${GH_TOKEN}" > "${NETRC}"

        # Capture both body and HTTP status from the token endpoint so failures are specific.
        TOKEN_RESP=$(umask 0177 && mktemp)
        TOKEN_HTTP=$(curl -s -o "${TOKEN_RESP}" -w "%{http_code}" --netrc-file "${NETRC}" \
          "https://ghcr.io/token?service=ghcr.io&scope=repository:${REPO_LC}:push" \
          2>/dev/null || echo "000")
        AUTH_JSON=$(cat "${TOKEN_RESP}" 2>/dev/null || true)
        rm -f "${TOKEN_RESP}"

        REG_TOKEN=$(printf '%s' "${AUTH_JSON}" | jq -r '.token // empty' 2>/dev/null || true)

        if [[ -z "${REG_TOKEN}" ]]; then
          case "${TOKEN_HTTP}" in
            401)
              REASON="${AUTH_CRED_NAME} was rejected by the GHCR token endpoint (HTTP 401): the token lacks the required write permissions."
              echo "::warning title=GHCR cache write likely to fail::${REASON} ${NOTE}"
              echo "writable=false" >> "$GITHUB_OUTPUT"
              cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
        ### ❌ GHCR cache write pre-check: failed

        **Diagnosis:** ${AUTH_CRED_NAME} was rejected by the GHCR token endpoint (HTTP 401). The token lacks the required write permissions.

        SUMMARY_EOF
              if [[ "${USING_GHCR_TOKEN}" == "true" ]]; then
                cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
        **Fix:** Ensure the `GHCR_TOKEN` secret contains a valid [classic PAT](https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens#creating-a-personal-access-token-classic) with the `write:packages` scope. Classic PATs are required because [fine-grained tokens do not support GitHub Packages](https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry#authenticating-to-the-container-registry). If the token has expired, regenerate it at <https://github.com/settings/tokens> and update the `GHCR_TOKEN` secret.
        SUMMARY_EOF
              else
                cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
        **Fix:** Ensure the calling workflow job declares the following permission:

        ```yaml
        permissions:
          packages: write
        ```
        SUMMARY_EOF
              fi
              echo "> ℹ️ ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
              ;;
            403)
              # Probe read-only access: if a pull token succeeds, the credential is valid
              # but write access is blocked by organisation policy; otherwise the token
              # itself cannot reach the package at all.
              PULL_HTTP=$(curl -s -o /dev/null -w "%{http_code}" --netrc-file "${NETRC}" \
                "https://ghcr.io/token?service=ghcr.io&scope=repository:${REPO_LC}:pull" \
                2>/dev/null || echo "000")
              if [[ "${PULL_HTTP}" == "200" ]]; then
                REASON="${AUTH_CRED_NAME} can read from GHCR but a push token was denied (HTTP 403). The organisation's Actions token policy likely restricts package writes."
                echo "::warning title=GHCR cache write likely to fail::${REASON} ${NOTE}"
                echo "writable=false" >> "$GITHUB_OUTPUT"
                cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
        ### ❌ GHCR cache write pre-check: failed

        **Diagnosis:** ${AUTH_CRED_NAME} can read from GHCR (pull-scoped token succeeded) but a push-scoped token was denied (HTTP 403). This strongly indicates the **organisation's Actions token policy** restricts ${AUTH_CRED_NAME} from writing to packages.

        **Option 1 — Organisation owner: allow workflow write permissions**
        SUMMARY_EOF
                cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
        1. Open <https://github.com/organizations/${ORG}/settings/actions>
        2. Scroll to **Workflow permissions**
        3. Select **"Read and write permissions"** and save

        See the GitHub docs: [Setting the permissions of the GITHUB\_TOKEN for your organisation](https://docs.github.com/en/organizations/managing-organization-settings/disabling-or-limiting-github-actions-for-your-organization#setting-the-permissions-of-the-github_token-for-your-organization)

        **Option 2 — Repository admin: use a Personal Access Token (no org-owner access needed)**
        SUMMARY_EOF
                cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
        > **Note:** A classic token is required because [fine-grained tokens do not support GitHub Packages](https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry#authenticating-to-the-container-registry).

        1. Create a [Personal Access Token (classic)](https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens#creating-a-personal-access-token-classic) with the `write:packages` scope at <https://github.com/settings/tokens>
        2. In this repository, go to **Settings → Secrets and variables → Actions**
        3. Add or update the repository secret named **`GHCR_TOKEN`** and paste the PAT as the value
        4. Re-run the workflow
        SUMMARY_EOF
                echo "> ℹ️ ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
              else
                REASON="${AUTH_CRED_NAME} was denied for both push (HTTP 403) and pull (HTTP ${PULL_HTTP}) scopes. The package ghcr.io/${REPO_LC} may not yet exist, may be private, or the organisation blocks all Actions token access to packages."
                echo "::warning title=GHCR cache write likely to fail::${REASON} ${NOTE}"
                echo "writable=false" >> "$GITHUB_OUTPUT"
                cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
        ### ❌ GHCR cache write pre-check: failed

        **Diagnosis:** ${AUTH_CRED_NAME} was denied for both push-scoped (HTTP 403) and pull-scoped tokens. The package may not yet exist, may be private, or the organisation's token policy blocks all access.

        **Steps to investigate:**
        SUMMARY_EOF
                cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
        1. Check whether the package exists: <https://github.com/orgs/${ORG}/packages>
        2. If the package does not yet exist, it will be created on first push — but write access must be granted first (see options below).
        3. Check the organisation's Actions settings: <https://github.com/organizations/${ORG}/settings/actions> → **Workflow permissions**

        See the GitHub docs: [Setting the permissions of the GITHUB\_Token for your organisation](https://docs.github.com/en/organizations/managing-organization-settings/disabling-or-limiting-github-actions-for-your-organization#setting-the-permissions-of-the-github_token-for-your-organization)

        **To unblock the build — Repository admin: use a Personal Access Token (no org-owner access needed)**

        > **Note:** A classic token is required because [fine-grained tokens do not support GitHub Packages](https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry#authenticating-to-the-container-registry).

        1. Create a [Personal Access Token (classic)](https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens#creating-a-personal-access-token-classic) with the \`write:packages\` scope at <https://github.com/settings/tokens>
        2. In this repository, go to **Settings → Secrets and variables → Actions**
        3. Add or update the repository secret named **\`GHCR_TOKEN\`** and paste the PAT as the value
        4. Re-run the workflow
        SUMMARY_EOF
                echo "> ℹ️ ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
              fi
              ;;
            *)
              REASON="Could not obtain a GHCR push token for ghcr.io/${REPO_LC} (token endpoint returned HTTP ${TOKEN_HTTP})."
              echo "::warning title=GHCR cache write likely to fail::${REASON} ${NOTE}"
              echo "writable=false" >> "$GITHUB_OUTPUT"
              echo "❌ **GHCR cache write pre-check:** failed — ${REASON} ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
              ;;
          esac
          exit 0
        fi

        # Probe write permission: initiate (and immediately abandon) a blob upload.
        # Use a temp curl config file so the bearer token is not a command-line argument.
        CFG=$(umask 0177 && mktemp)
        CURL_ERR_FILE=$(mktemp)
        printf 'header = "Authorization: Bearer %s"\n' "${REG_TOKEN}" > "${CFG}"
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
          -K "${CFG}" \
          "https://ghcr.io/v2/${REPO_LC}/blobs/uploads/" 2>"${CURL_ERR_FILE}") \
          || HTTP_STATUS="000"
        CURL_ERR=$(cat "${CURL_ERR_FILE}")
        rm -f "${CFG}" "${CURL_ERR_FILE}"
        # Ensure HTTP_STATUS is never empty (e.g. if curl produced no output).
        HTTP_STATUS="${HTTP_STATUS:-000}"

        if [[ "${HTTP_STATUS}" == "202" || "${HTTP_STATUS}" == "201" ]]; then
          echo "GHCR write access confirmed for ghcr.io/${REPO_LC}."
          echo "writable=true" >> "$GITHUB_OUTPUT"
          echo "✅ **GHCR cache write pre-check:** passed — layer caches will be written to ghcr.io/${REPO_LC} (GHCR is primary)." >> "$GITHUB_STEP_SUMMARY"
        else
          case "${HTTP_STATUS}" in
            401)
              REASON="${AUTH_CRED_NAME} was rejected when initiating a GHCR blob upload (HTTP 401): the token lacks the required write permissions."
              echo "::warning title=GHCR cache write likely to fail::${REASON} ${NOTE}"
              echo "writable=false" >> "$GITHUB_OUTPUT"
              cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
        ### ❌ GHCR cache write pre-check: failed

        **Diagnosis:** ${AUTH_CRED_NAME} was rejected when initiating a GHCR blob upload (HTTP 401). The token lacks the required write permissions.

        SUMMARY_EOF
              if [[ "${USING_GHCR_TOKEN}" == "true" ]]; then
                cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
        **Fix:** Ensure the `GHCR_TOKEN` secret contains a valid [classic PAT](https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens#creating-a-personal-access-token-classic) with the `write:packages` scope. Classic PATs are required because [fine-grained tokens do not support GitHub Packages](https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry#authenticating-to-the-container-registry). If the token has expired, regenerate it at <https://github.com/settings/tokens> and update the `GHCR_TOKEN` secret.
        SUMMARY_EOF
              else
                cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
        **Fix:** Ensure the calling workflow job declares the following permission:

        ```yaml
        permissions:
          packages: write
        ```
        SUMMARY_EOF
              fi
              echo "> ℹ️ ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
              ;;
            403)
              REASON="${AUTH_CRED_NAME} was forbidden from writing to ghcr.io/${REPO_LC} (HTTP 403). The organisation's Actions token policy or the package's own access settings may block this token."
              echo "::warning title=GHCR cache write likely to fail::${REASON} ${NOTE}"
              echo "writable=false" >> "$GITHUB_OUTPUT"
              cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
        ### ❌ GHCR cache write pre-check: failed

        **Diagnosis:** ${AUTH_CRED_NAME} obtained a push-scoped token but the blob upload was still denied (HTTP 403). This can be caused by the **organisation's Actions token policy** or **package-level access restrictions**.

        **Option 1 — Organisation owner: check workflow permissions and package access**
        SUMMARY_EOF
              cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
        1. Check workflow permissions: <https://github.com/organizations/${ORG}/settings/actions> → **Workflow permissions** → select **"Read and write permissions"** and save
        2. If the package already exists, check its access settings: navigate to the package at <https://github.com/orgs/${ORG}/packages>, open its **Settings** tab, and ensure this repository has write access under **Actions access**

        See:
        - [Setting the permissions of the GITHUB\_Token for your organisation](https://docs.github.com/en/organizations/managing-organization-settings/disabling-or-limiting-github-actions-for-your-organization#setting-the-permissions-of-the-github_token-for-your-organization)
        - [Configuring a package's access control and visibility](https://docs.github.com/en/packages/learn-github-packages/configuring-a-packages-access-control-and-visibility)

        **Option 2 — Repository admin: use a Personal Access Token (no org-owner access needed)**

        > **Note:** A classic token is required because [fine-grained tokens do not support GitHub Packages](https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry#authenticating-to-the-container-registry).

        1. Create a [Personal Access Token (classic)](https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens#creating-a-personal-access-token-classic) with the \`write:packages\` scope at <https://github.com/settings/tokens>
        2. In this repository, go to **Settings → Secrets and variables → Actions**
        3. Add or update the repository secret named **\`GHCR_TOKEN\`** and paste the PAT as the value
        4. Re-run the workflow
        SUMMARY_EOF
              echo "> ℹ️ ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
              ;;
            *)
              if [[ "${HTTP_STATUS}" == "000" ]]; then
                REASON="curl failed to reach ghcr.io when probing write access (HTTP 000 / network error)."
                CURL_DETAIL="${CURL_ERR:+ curl stderr: ${CURL_ERR}}"
              else
                REASON="${AUTH_CRED_NAME} does not have write access to ghcr.io/${REPO_LC} (HTTP ${HTTP_STATUS})."
                CURL_DETAIL=""
              fi
              echo "::warning title=GHCR cache write likely to fail::${REASON}${CURL_DETAIL} ${NOTE}"
              echo "writable=false" >> "$GITHUB_OUTPUT"
              echo "❌ **GHCR cache write pre-check:** failed — ${REASON}${CURL_DETAIL} ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
              ;;
          esac
        fi

    - name: Detect versions and build matrix
      id: detect
      shell: bash
      env:
        BEFORE_SHA:      ${{ inputs.before_sha }}
        AFTER_SHA:       ${{ inputs.after_sha }}
        PLATFORMS:       ${{ inputs.platforms_filter }}
      run: |
        set -euo pipefail

        LATEST_PHP_VERSION=""
        while IFS= read -r VER; do
          LATEST_PHP_VERSION="$VER"
        done < <(find . -maxdepth 1 -mindepth 1 -type d -name '[0-9]*.[0-9]*' \
                   | sed 's|./||' | sort -V)

        # Always compute all_versions (full repo list, unfiltered) so callers
        # can run preseed with the complete set.  This ensures the newest
        # Debian codename is always treated as primary when running preseed,
        # giving older codenames proper GLIBC compatibility testing even
        # when only a subset of versions changed.
        ALL_VERSIONS_OUT=$(bash tests/detect-versions.sh | tr '\n' ' ' | xargs)

        if [[ -n "${BEFORE_SHA}" && -n "${AFTER_SHA}" ]]; then
          VERSIONS_OUT=$(bash tests/detect-versions.sh \
            --before "${BEFORE_SHA}" --after "${AFTER_SHA}" | tr '\n' ' ' | xargs)
          VERSIONS_BASE_OUT=$(bash tests/detect-versions.sh \
            --before "${BEFORE_SHA}" --after "${AFTER_SHA}" --stage base \
            | tr '\n' ' ' | xargs)
          VERSIONS_SECURE_OUT=$(bash tests/detect-versions.sh \
            --before "${BEFORE_SHA}" --after "${AFTER_SHA}" --stage secure \
            | tr '\n' ' ' | xargs)
        else
          VERSIONS_OUT="$ALL_VERSIONS_OUT"
          VERSIONS_BASE_OUT="$VERSIONS_OUT"
          VERSIONS_SECURE_OUT="$VERSIONS_OUT"
        fi

        echo "latest_php_version=${LATEST_PHP_VERSION}"     >> "$GITHUB_OUTPUT"
        echo "versions=${VERSIONS_OUT}"                     >> "$GITHUB_OUTPUT"
        echo "versions_base=${VERSIONS_BASE_OUT}"           >> "$GITHUB_OUTPUT"
        echo "versions_secure=${VERSIONS_SECURE_OUT}"       >> "$GITHUB_OUTPUT"
        echo "all_versions=${ALL_VERSIONS_OUT}"             >> "$GITHUB_OUTPUT"
        if [[ -n "${ALL_VERSIONS_OUT}" ]]; then
          read -r -a _all_vers_arr <<< "${ALL_VERSIONS_OUT}"
        else
          _all_vers_arr=()
        fi
        echo "all_versions_count=${#_all_vers_arr[@]}"       >> "$GITHUB_OUTPUT"

        # Parse configured platforms into an array, trimming whitespace,
        # normalizing default variants to canonical keys, and removing
        # duplicates (duplicates would inflate TOTAL_PLATFORMS and produce
        # colliding artifact names in the build matrix).
        # Canonical normalization: strip well-known default variants so that
        # artifact names match the seeded state in merge-manifests:
        #   linux/arm64/v8 → linux/arm64  (arm64 default variant is v8)
        #   linux/amd64/v1 → linux/amd64  (amd64 default variant is v1)
        # Non-default variants (linux/arm/v6, linux/arm/v7) are kept as-is.
        readarray -t PLATFORM_LIST < <(
          printf '%s\n' "${PLATFORMS}" | tr ',' '\n' \
            | sed 's/^[[:space:]]*//; s/[[:space:]]*$//; /^$/d' \
            | while IFS= read -r _plat; do
                case "${_plat}" in
                  linux/arm64/v8) echo "linux/arm64" ;;
                  linux/amd64/v1) echo "linux/amd64" ;;
                  *)              echo "${_plat}" ;;
                esac
              done \
            | sort -u
        )
        TOTAL_PLATFORMS="${#PLATFORM_LIST[@]}"

        if [[ "${TOTAL_PLATFORMS}" -eq 0 ]]; then
          echo "::error::No platforms configured. Provide at least one platform (e.g. linux/amd64,linux/arm64)."
          exit 1
        fi

        if [[ -z "${VERSIONS_OUT}" ]]; then
          echo "total_platforms=${TOTAL_PLATFORMS}" >> "$GITHUB_OUTPUT"
          echo "merge_matrix=[]"                    >> "$GITHUB_OUTPUT"
          echo "build_matrix=[]"                    >> "$GITHUB_OUTPUT"
          echo "build_matrix_length=0"              >> "$GITHUB_OUTPUT"
        else
          echo "total_platforms=${TOTAL_PLATFORMS}" >> "$GITHUB_OUTPUT"

          # Build merge matrix: one {version, stage} entry per Docker Hub image
          # to be merged.  base/secure entries are included only for versions
          # that actually changed at that stage.
          MERGE_MATRIX="$(
            {
              for v in ${VERSIONS_OUT}; do
                [[ " ${VERSIONS_BASE_OUT} " == *" ${v} "* ]] \
                  && jq -nc --arg version "${v}" --arg stage "base" \
                       '{"version":$version,"stage":$stage}'
                [[ " ${VERSIONS_SECURE_OUT} " == *" ${v} "* ]] \
                  && jq -nc --arg version "${v}" --arg stage "secure" \
                       '{"version":$version,"stage":$stage}'
                jq -nc --arg version "${v}" --arg stage "advance" \
                  '{"version":$version,"stage":$stage}'
              done
            } | jq -sc '.'
          )"
          echo "merge_matrix=${MERGE_MATRIX}" >> "$GITHUB_OUTPUT"

          # Build build matrix: one {version, platform, versions_base,
          # versions_secure} entry per PHP-version x platform pair so that
          # each job builds exactly one version on one platform and can upload
          # per-image digest artifacts without waiting for other combinations.
          BUILD_MATRIX="$(
            {
              for p in "${PLATFORM_LIST[@]}"; do
                for v in ${VERSIONS_OUT}; do
                  vb=$( [[ " ${VERSIONS_BASE_OUT} " == *" ${v} "* ]] \
                          && echo "${v}" || echo "" )
                  vs=$( [[ " ${VERSIONS_SECURE_OUT} " == *" ${v} "* ]] \
                          && echo "${v}" || echo "" )
                  jq -nc \
                    --arg version "${v}" \
                    --arg platform "${p}" \
                    --arg versions_base "${vb}" \
                    --arg versions_secure "${vs}" \
                    '{"version":$version,"platform":$platform,"versions_base":$versions_base,"versions_secure":$versions_secure}'
                done
              done
            } | jq -sc '.'
          )"
          echo "build_matrix=${BUILD_MATRIX}" >> "$GITHUB_OUTPUT"
          BUILD_MATRIX_LENGTH="$(printf '%s' "${BUILD_MATRIX}" | jq 'length')"
          echo "build_matrix_length=${BUILD_MATRIX_LENGTH}" >> "$GITHUB_OUTPUT"
        fi
