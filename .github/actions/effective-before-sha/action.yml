name: Compute effective before SHA
description: >
  Finds the effective per-platform "before" SHAs for a push or
  pull_request event, emitted as a JSON map (before_shas).

  For pull_request events, all platforms map to the PR base SHA.

  For push events, queries workflow runs for the specified workflow(s)
  and finds the closest reachable ancestor run's head SHA.  All
  requested platforms share that single SHA — a successful run is
  assumed to have built all platforms.  When no prior successful run
  is found, before_shas is emitted as {} triggering a full rebuild.

  When `platforms` is empty, before_shas is emitted as {} (no
  filtering, caller should treat that as "build everything").

  Workflow discovery (push events only): fetches recent successful
  runs via workflow_files (bare filenames or numeric workflow IDs).

  Required GITHUB_TOKEN permissions on the calling job:
    actions:  read   (list workflow runs)
    contents: read   (compare commits via the Repos API)

inputs:
  workflow_files:
    description: >
      Space-separated list of bare workflow filenames (e.g. "test.yml")
      to query for successful runs.  Full github.workflow_ref values are
      not supported; pass only bare filenames or numeric workflow IDs.
    required: false
    default: ''
  current_sha:
    description: The current commit SHA (github.sha).
    required: true
  ref_name:
    description: The branch name (github.ref_name).
    required: true
  repository:
    description: The repository in owner/name format (github.repository).
    required: true
  github_token:
    description: Token used to call the GitHub API (github.token).
    required: true
  event_name:
    description: The triggering event name (github.event_name).
    required: true
  pr_base_sha:
    description: >
      The PR base commit SHA (github.event.pull_request.base.sha).
      Required when event_name is "pull_request".
    required: false
    default: ''
  platforms:
    description: >
      Space-separated platform keys to populate in the output map
      (e.g. "linux-amd64 linux-arm64").  When set, all keys in the
      output map point to the same closest-ancestor SHA.  When empty,
      before_shas is {} (no filtering, full rebuild).
    required: false
    default: ''

outputs:
  before_shas:
    description: >
      JSON map of platform-key to the closest reachable ancestor SHA,
      e.g. {"linux-amd64":"abc123","linux-arm64":"def456"}.
      All entries share the same SHA (the closest ancestor run).
      Emitted as {} when platforms is empty or no candidates are found.
    value: ${{ steps.compute.outputs.before_shas }}

runs:
  using: composite
  steps:
    - name: Compute effective before_sha
      id: compute
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        WORKFLOW_FILES: ${{ inputs.workflow_files }}
        CURRENT_SHA: ${{ inputs.current_sha }}
        REF_NAME: ${{ inputs.ref_name }}
        REPOSITORY: ${{ inputs.repository }}
        EVENT_NAME: ${{ inputs.event_name }}
        PR_BASE_SHA: ${{ inputs.pr_base_sha }}
        PLATFORMS: ${{ inputs.platforms }}
      run: |
        set -euo pipefail

        if [[ "${EVENT_NAME}" == "pull_request" ]]; then
          if [[ -z "${PR_BASE_SHA}" ]]; then
            echo "::error::Input 'pr_base_sha' is required when event_name is 'pull_request'."
            exit 1
          fi
          # For pull_request events, all platforms share the same base SHA.
          # Build a before_shas map with each platform key pointing to it.
          if [[ -n "${PLATFORMS:-}" ]]; then
            read -r -a _pr_pkeys <<< "${PLATFORMS}"
            _pr_shas_json="{}"
            for _k in "${_pr_pkeys[@]}"; do
              _pr_shas_json="$(printf '%s' "${_pr_shas_json}" \
                | jq -c --arg k "${_k}" --arg v "${PR_BASE_SHA}" '. + {($k): $v}')"
            done
            echo "before_shas=${_pr_shas_json}" >> "$GITHUB_OUTPUT"
          else
            echo "before_shas={}" >> "$GITHUB_OUTPUT"
          fi
          exit 0
        fi

        if [[ -z "${PLATFORMS:-}" ]]; then
          echo "before_shas={}" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # For push events, collect head SHAs from prior successful runs via
        # workflow_files.  A successful run is assumed to have built all
        # platforms — no per-platform artifact check is needed.
        RAW_CANDIDATE_SHAS=""
        if [[ -n "${WORKFLOW_FILES:-}" ]]; then
          NORMALIZED_WORKFLOW_FILES=$(printf '%s' "${WORKFLOW_FILES}" | tr '\r\n' '  ')
          read -r -a WF_ARRAY <<< "${NORMALIZED_WORKFLOW_FILES}"
          for wf in "${WF_ARRAY[@]}"; do
            RAW_CANDIDATE_SHAS=$(printf '%s\n%s' "${RAW_CANDIDATE_SHAS}" "$(
              gh api \
                "repos/${REPOSITORY}/actions/workflows/${wf}/runs?branch=${REF_NAME}&status=success&per_page=10" \
                --jq '.workflow_runs[] | .head_sha // empty' || true
            )")
          done
        fi

        # Deduplicate; discard malformed entries.
        readarray -t CANDIDATE_SHAS < <(
          printf '%s' "${RAW_CANDIDATE_SHAS}" \
            | sort -u \
            | grep -E '^[0-9a-f]{40}$' \
            || true
        )

        # Cache for SHA → ahead_by or "unreachable".
        declare -A SHA_AHEAD_CACHE

        # compare_sha <sha>
        # Sets COMPARE_AHEAD to the numeric ahead_by value, or "" when the
        # SHA is not a reachable ancestor of CURRENT_SHA.
        compare_sha() {
          local _sha="$1"
          if [[ -v "SHA_AHEAD_CACHE[${_sha}]" ]]; then
            COMPARE_AHEAD="${SHA_AHEAD_CACHE[${_sha}]}"
            [[ "${COMPARE_AHEAD}" == "unreachable" ]] && COMPARE_AHEAD=""
            return
          fi
          local _compare _status _ahead
          _compare=$(gh api \
            "repos/${REPOSITORY}/compare/${_sha}...${CURRENT_SHA}" \
            --jq '{status: .status, ahead_by: .ahead_by}' 2>/dev/null || true)
          _status=$(printf '%s' "${_compare}" | jq -r '.status // ""')
          _ahead=$(printf '%s' "${_compare}" | jq -r '.ahead_by // empty')
          if [[ "${_status}" == "ahead" || "${_status}" == "identical" ]] \
             && [[ "${_ahead}" =~ ^[0-9]+$ ]]; then
            SHA_AHEAD_CACHE["${_sha}"]="${_ahead}"
            COMPARE_AHEAD="${_ahead}"
          else
            SHA_AHEAD_CACHE["${_sha}"]="unreachable"
            COMPARE_AHEAD=""
          fi
        }

        # Find the closest reachable ancestor run.
        BEST_SHA=""
        BEST_AHEAD=999999999

        for sha in "${CANDIDATE_SHAS[@]+"${CANDIDATE_SHAS[@]}"}"; do
          [[ -z "${sha}" || "${sha}" == "${CURRENT_SHA}" ]] && continue
          compare_sha "${sha}"
          [[ -z "${COMPARE_AHEAD}" ]] && continue
          if [[ "${COMPARE_AHEAD}" -lt "${BEST_AHEAD}" ]]; then
            BEST_SHA="${sha}"
            BEST_AHEAD="${COMPARE_AHEAD}"
          fi
        done

        # Build before_shas: all platforms share the closest ancestor SHA.
        BEFORE_SHAS_JSON="{}"
        if [[ -n "${BEST_SHA}" ]]; then
          read -r -a PLATFORM_KEYS <<< "${PLATFORMS}"
          for pkey in "${PLATFORM_KEYS[@]}"; do
            BEFORE_SHAS_JSON="$(printf '%s' "${BEFORE_SHAS_JSON}" \
              | jq -c --arg k "${pkey}" --arg v "${BEST_SHA}" '. + {($k): $v}')"
          done
        fi
        echo "before_shas=${BEFORE_SHAS_JSON}" >> "$GITHUB_OUTPUT"
