name: Compute effective before SHA
description: >
  Finds the effective "before" SHA for a push or pull_request event.

  For pull_request events, returns the PR base SHA immediately.

  For push events, queries workflow runs for the most recent successful
  run on this branch whose head commit is an ancestor of the current
  commit (smallest ahead_by distance).  When no prior successful run is
  found, returns an empty string (callers should treat that as "build
  everything").

  Workflow discovery (push events only): first fetches recent successful
  runs whose display_title starts with the concurrency_group prefix (so
  only runs from the same concurrency slot are matched), then optionally
  supplements those candidates with runs found via workflow_files.

  Required GITHUB_TOKEN permissions on the calling job:
    actions:  read   (list workflow runs)
    contents: read   (compare commits via the Repos API)

inputs:
  workflow_files:
    description: >
      Space-separated list of bare workflow filenames (e.g. "test.yml")
      to query for successful runs.  Full github.workflow_ref values are
      not supported; pass only bare filenames or numeric workflow IDs.
    required: false
    default: ''
  concurrency_group:
    description: >
      The concurrency group expression used in the calling workflow's
      top-level concurrency.group field, embedded into run-name as a
      prefix (e.g. "docker-build-refs/heads/main").  Workflow runs
      whose display_title starts with this value followed by ": " are
      collected as candidates first, so only runs from the same
      concurrency slot are matched.  Set this to the same expression
      used in the workflow's top-level concurrency.group key and
      embed that value into run-name as the prefix.
    required: true
  current_sha:
    description: The current commit SHA (github.sha).
    required: true
  ref_name:
    description: The branch name (github.ref_name).
    required: true
  repository:
    description: The repository in owner/name format (github.repository).
    required: true
  github_token:
    description: Token used to call the GitHub API (github.token).
    required: true
  event_name:
    description: The triggering event name (github.event_name).
    required: true
  pr_base_sha:
    description: >
      The PR base commit SHA (github.event.pull_request.base.sha).
      Required when event_name is "pull_request".
    required: false
    default: ''

outputs:
  before_sha:
    description: >
      The effective before SHA to use as the diff anchor.  Empty string
      when no prior successful run is found; callers should treat that
      as "build everything".
    value: ${{ steps.compute.outputs.before_sha }}
  needs_history:
    description: >
      "true" if the checkout step should fetch full git history
      (fetch-depth: 0), "false" if a shallow clone (depth: 1) suffices.
    value: ${{ steps.compute.outputs.needs_history }}

runs:
  using: composite
  steps:
    - name: Compute effective before_sha
      id: compute
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        WORKFLOW_FILES: ${{ inputs.workflow_files }}
        CONCURRENCY_GROUP: ${{ inputs.concurrency_group }}
        CURRENT_SHA: ${{ inputs.current_sha }}
        REF_NAME: ${{ inputs.ref_name }}
        REPOSITORY: ${{ inputs.repository }}
        EVENT_NAME: ${{ inputs.event_name }}
        PR_BASE_SHA: ${{ inputs.pr_base_sha }}
      run: |
        set -euo pipefail

        if [[ "${EVENT_NAME}" == "pull_request" ]]; then
          if [[ -z "${PR_BASE_SHA}" ]]; then
            echo "::error::Input 'pr_base_sha' is required when event_name is 'pull_request'."
            exit 1
          fi
          echo "before_sha=${PR_BASE_SHA}" >> "$GITHUB_OUTPUT"
          echo "needs_history=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # For push events, collect head SHAs of prior successful runs that
        # competed for the same concurrency slot as this workflow.

        # Step 1: Search by concurrency group embedded in run-name.
        CANDIDATES=$(
          gh api \
            "repos/${REPOSITORY}/actions/runs?branch=${REF_NAME}&status=success&per_page=100" \
            | jq -r --arg rn "${CONCURRENCY_GROUP}" \
              '.workflow_runs[] | select(.display_title | startswith($rn + ": ")) | .head_sha // empty' \
            || true
        )

        # Step 2: Supplement with workflow_files (catches older runs that
        # pre-date the concurrency group being embedded in run-name).
        # TODO: see TODO.md — remove workflow_files once no longer needed.
        if [[ -n "${WORKFLOW_FILES:-}" ]]; then
          read -ra WF_ARRAY <<< "${WORKFLOW_FILES}"
          for wf in "${WF_ARRAY[@]}"; do
            CANDIDATES=$(printf '%s\n%s' "$CANDIDATES" "$(
              gh api \
                "repos/${REPOSITORY}/actions/workflows/${wf}/runs?branch=${REF_NAME}&status=success&per_page=10" \
                --jq '.workflow_runs[] | .head_sha // empty' || true
            )")
          done
        fi

        # Deduplicate and remove empty lines.  sort -u also ensures that SHAs
        # appearing in both the run-name search and the workflow-file search
        # above are counted only once.
        CANDIDATES=$(printf '%s' "$CANDIDATES" | sort -u | grep . || true)

        # Among all candidates, pick the closest reachable ancestor of the
        # current commit — the one with the smallest ahead_by distance.
        # This is more correct than using timestamps because it is based on
        # the actual git ancestry of the branch rather than wall-clock time.
        LAST_SUCCESS_SHA=""
        BEST_AHEAD=""
        while IFS= read -r SHA; do
          [[ -z "$SHA" || "$SHA" == "${CURRENT_SHA}" ]] && continue
          COMPARE=$(gh api \
            "repos/${REPOSITORY}/compare/${SHA}...${CURRENT_SHA}" \
            --jq '{status: .status, ahead_by: .ahead_by}' 2>/dev/null || true)
          STATUS=$(printf '%s' "$COMPARE" | jq -r '.status // ""')
          AHEAD=$(printf '%s' "$COMPARE" | jq -r '.ahead_by // empty')
          if [[ "$STATUS" == "ahead" || "$STATUS" == "identical" ]] && [[ "$AHEAD" =~ ^[0-9]+$ ]]; then
            if [[ -z "$BEST_AHEAD" || "$AHEAD" -lt "$BEST_AHEAD" ]]; then
              BEST_AHEAD="$AHEAD"
              LAST_SUCCESS_SHA="$SHA"
            fi
          fi
        done <<< "$CANDIDATES"

        if [[ -n "$LAST_SUCCESS_SHA" ]]; then
          echo "before_sha=${LAST_SUCCESS_SHA}" >> "$GITHUB_OUTPUT"
          echo "needs_history=true" >> "$GITHUB_OUTPUT"
        else
          echo "before_sha=" >> "$GITHUB_OUTPUT"
          echo "needs_history=false" >> "$GITHUB_OUTPUT"
        fi
