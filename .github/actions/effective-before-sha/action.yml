name: Compute effective before SHA
description: >
  Finds the effective "before" SHA for a push or pull_request event.

  For pull_request events, returns the PR base SHA immediately.

  For push events, queries workflow runs for the most recent successful
  run on this branch whose head commit is an ancestor of the current
  commit (smallest ahead_by distance).  When no prior successful run is
  found, returns an empty string (callers should treat that as "build
  everything").

  Workflow discovery (push events only): when current_workflow_file is
  provided, the action extracts the concurrency group template from that
  file, then fetches recent successful runs for the branch across ALL
  workflows.  For each unique workflow path in those runs it fetches the
  YAML at the run's own head_sha and checks whether the concurrency group
  template matches.  This correctly handles renamed workflows: the old
  file is read from the commit where it still existed, so prior runs are
  still discovered.

  Alternatively, workflow_files can list filenames explicitly (kept for
  callers such as test.yml whose concurrency group is unique to that
  workflow and the rename case is not a concern).
  At least one of current_workflow_file or workflow_files is required.

  Required GITHUB_TOKEN permissions on the calling job:
    actions:  read   (list workflow runs)
    contents: read   (compare commits via the Repos API)

inputs:
  current_workflow_file:
    description: >
      Filename of the calling workflow (e.g. "docker-build-on-push.yml").
      When provided, the action reads the file from the local checkout
      (.github/workflows/<name>), extracts its concurrency group
      template, fetches recent successful runs across all workflows on
      the branch, and checks each run's workflow YAML (at the run's
      own commit) to see whether it shares the same group.  Handles
      workflow renames automatically.
    required: false
    default: ''
  workflow_files:
    description: >
      Space-separated list of workflow filenames to query for successful
      runs (e.g. "test.yml").  Used only for push events and only when
      current_workflow_file is not provided.
    required: false
    default: ''
  current_sha:
    description: The current commit SHA (github.sha).
    required: true
  ref_name:
    description: The branch name (github.ref_name).
    required: true
  repository:
    description: The repository in owner/name format (github.repository).
    required: true
  github_token:
    description: Token used to call the GitHub API (github.token).
    required: true
  event_name:
    description: The triggering event name (github.event_name).
    required: true
  pr_base_sha:
    description: >
      The PR base commit SHA (github.event.pull_request.base.sha).
      Required when event_name is "pull_request".
    required: false
    default: ''

outputs:
  before_sha:
    description: >
      The effective before SHA to use as the diff anchor.  Empty string
      when no prior successful run is found; callers should treat that
      as "build everything".
    value: ${{ steps.compute.outputs.before_sha }}
  needs_history:
    description: >
      "true" if the checkout step should fetch full git history
      (fetch-depth: 0), "false" if a shallow clone (depth: 1) suffices.
    value: ${{ steps.compute.outputs.needs_history }}

runs:
  using: composite
  steps:
    - name: Compute effective before_sha
      id: compute
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        CURRENT_WORKFLOW_FILE: ${{ inputs.current_workflow_file }}
        WORKFLOW_FILES: ${{ inputs.workflow_files }}
        CURRENT_SHA: ${{ inputs.current_sha }}
        REF_NAME: ${{ inputs.ref_name }}
        REPOSITORY: ${{ inputs.repository }}
        EVENT_NAME: ${{ inputs.event_name }}
        PR_BASE_SHA: ${{ inputs.pr_base_sha }}
      run: |
        set -euo pipefail

        if [[ "${EVENT_NAME}" == "pull_request" ]]; then
          if [[ -z "${PR_BASE_SHA}" ]]; then
            echo "::error::Input 'pr_base_sha' is required when event_name is 'pull_request'."
            exit 1
          fi
          echo "before_sha=${PR_BASE_SHA}" >> "$GITHUB_OUTPUT"
          echo "needs_history=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # For push events, collect head SHAs of prior successful runs that
        # competed for the same concurrency slot as this workflow.
        CANDIDATES=""

        if [[ -n "${CURRENT_WORKFLOW_FILE:-}" ]]; then
          WF_YAML=".github/workflows/${CURRENT_WORKFLOW_FILE}"
          if [[ ! -f "$WF_YAML" ]]; then
            echo "::error::Workflow file '${WF_YAML}' not found in local checkout."
            exit 1
          fi

          # Extract the concurrency group template from the local file.
          # yq returns "null" when the key is absent.
          WF_GROUP=$(yq eval '.concurrency.group' "$WF_YAML" 2>/dev/null || true)
          if [[ "$WF_GROUP" == "null" || -z "$WF_GROUP" ]]; then
            echo "::error::Workflow '${CURRENT_WORKFLOW_FILE}' has no concurrency.group; use workflow_files input instead."
            exit 1
          fi

          # Fetch recent successful runs for this branch across ALL workflows.
          # Each run object includes .path (the workflow file path at that run)
          # and .head_sha.  Querying all workflows (not just the current
          # filename) means runs from a renamed workflow are still found: the
          # old path is fetched from the run's own head_sha where it existed.
          RUNS_JSON=$(gh api \
            "repos/${REPOSITORY}/actions/runs?branch=${REF_NAME}&status=success&per_page=50" \
            --jq '[.workflow_runs[] | {sha: .head_sha, path: .path}]' \
            2>/dev/null || echo "[]")

          # For each unique workflow path in those runs, check whether its
          # concurrency group template matches WF_GROUP.
          #
          # Fast path (active workflow): the file is in the local checkout, so
          # use yq directly — no API call needed.
          #
          # Slow path (renamed/deleted workflow): the file is gone from the
          # checkout; fetch the YAML via the contents API at the run's own
          # head_sha, where the file still existed.  This is only reached for
          # workflows that were renamed or deleted, which is rare (typically
          # 0-1 extra API calls total).
          while IFS= read -r run; do
            run_sha=$(printf '%s' "$run" | jq -r '.sha')
            run_path=$(printf '%s' "$run" | jq -r '.path')

            if [[ -f "$run_path" ]]; then
              run_group=$(yq eval '.concurrency.group' "$run_path" 2>/dev/null || true)
            else
              run_group=$(gh api \
                "repos/${REPOSITORY}/contents/${run_path}?ref=${run_sha}" \
                --jq '.content // empty' 2>/dev/null \
                | base64 -d 2>/dev/null \
                | yq eval '.concurrency.group' - 2>/dev/null \
                || true)
            fi

            if [[ -n "$run_group" && "$run_group" != "null" && "$run_group" == "$WF_GROUP" ]]; then
              # Collect every head_sha from runs with this workflow path.
              while IFS= read -r sha; do
                CANDIDATES+="${sha}"$'\n'
              done < <(printf '%s' "$RUNS_JSON" \
                | jq -r --arg p "$run_path" '.[] | select(.path == $p) | .sha')
            fi
          done < <(printf '%s' "$RUNS_JSON" | jq -c 'unique_by(.path)[]')

        elif [[ -n "${WORKFLOW_FILES:-}" ]]; then
          read -ra WF_ARRAY <<< "${WORKFLOW_FILES}"
          CANDIDATES=$(
            for wf in "${WF_ARRAY[@]}"; do
              gh api \
                "repos/${REPOSITORY}/actions/workflows/${wf}/runs?branch=${REF_NAME}&status=success&per_page=10" \
                --jq '.workflow_runs[].head_sha // empty' || true
            done | (grep . || true)
          )
        else
          echo "::error::Either 'current_workflow_file' or 'workflow_files' input is required."
          exit 1
        fi

        CANDIDATES=$(printf '%s' "$CANDIDATES" | sort -u | (grep . || true))

        # Among all candidates, pick the closest reachable ancestor of the
        # current commit — the one with the smallest ahead_by distance.
        # This is more correct than using timestamps because it is based on
        # the actual git ancestry of the branch rather than wall-clock time.
        LAST_SUCCESS_SHA=""
        BEST_AHEAD=""
        while IFS= read -r SHA; do
          [[ -z "$SHA" || "$SHA" == "${CURRENT_SHA}" ]] && continue
          COMPARE=$(gh api \
            "repos/${REPOSITORY}/compare/${SHA}...${CURRENT_SHA}" \
            --jq '{status: .status, ahead_by: .ahead_by}' 2>/dev/null || true)
          STATUS=$(printf '%s' "$COMPARE" | jq -r '.status // ""')
          AHEAD=$(printf '%s' "$COMPARE" | jq -r '.ahead_by // empty')
          if [[ "$STATUS" == "ahead" || "$STATUS" == "identical" ]] && [[ "$AHEAD" =~ ^[0-9]+$ ]]; then
            if [[ -z "$BEST_AHEAD" || "$AHEAD" -lt "$BEST_AHEAD" ]]; then
              BEST_AHEAD="$AHEAD"
              LAST_SUCCESS_SHA="$SHA"
            fi
          fi
        done <<< "$CANDIDATES"

        if [[ -n "$LAST_SUCCESS_SHA" ]]; then
          echo "before_sha=${LAST_SUCCESS_SHA}" >> "$GITHUB_OUTPUT"
          echo "needs_history=true" >> "$GITHUB_OUTPUT"
        else
          echo "before_sha=" >> "$GITHUB_OUTPUT"
          echo "needs_history=false" >> "$GITHUB_OUTPUT"
        fi
