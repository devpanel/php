name: Build PHP images
description: >
  Builds and pushes Docker images for a single PHP version on a single platform
  to Docker Hub and GHCR, then uploads per-stage digest artifacts.

  The repository must be checked out by the calling job before this action
  is invoked.

inputs:
  version:
    description: PHP version to build (e.g. "8.3").
    required: true
  versions_base:
    description: >
      Pass the version string to push the base image, or empty to skip.
    default: ''
  versions_secure:
    description: >
      Pass the version string to push the secure image, or empty to skip.
    default: ''
  tag_suffix:
    description: >
      Docker image tag suffix (empty for main, "-rc" for develop, "-BRANCH"
      for other branches).
    required: true
  cache_from_enabled:
    description: Whether to read from cache (set to 'false' for a forced full rebuild)
    default: 'true'
  platform:
    description: >
      The single platform to build on (e.g. "linux/amd64").  Each matrix job
      passes exactly one platform here so that per-platform digest artifacts
      can be uploaded and merged independently.
    required: true
  repo:
    description: >
      Docker Hub repository to push images to (e.g. "devpanel/php").
      Must match the repo used by the corresponding merge-manifests call.
    default: 'devpanel/php'
  dockerhub_username:
    description: Docker Hub username for image push authentication.
    required: true
  dockerhub_token:
    description: Docker Hub token for image push authentication.
    required: true
  github_token:
    description: >
      GITHUB_TOKEN for GHCR login and download pre-seeding.
      Use secrets.GITHUB_TOKEN from the calling workflow.
    required: true
  ghcr_token:
    description: >
      Optional classic Personal Access Token with the write:packages scope.
      When provided, this token is used instead of github_token for GHCR
      login.  Required when the organisation's Actions token policy restricts
      GITHUB_TOKEN from writing to packages.
    default: ''
  ghcr_writable:
    description: >
      Whether the GHCR registry is writable ("true"/"false").  Pass the
      ghcr_writable output from the detect-versions action.  When "true",
      GHCR is used as the primary layer cache; when "false", GHA is primary.
      Defaults to "false" so that builds without a detect step are safe.
    default: 'false'
  downloads_dir:
    description: >
      Pre-assembled downloads directory whose pre-downloaded/ subdirectory
      contains the pre-seeded artifacts.  Pass the path where the detect
      job's preseed-pre-downloaded artifact was downloaded.
    required: true
  bake_overrides_file:
    description: >
      Path to a pre-generated bake overrides JSON file that maps each
      phpX_Y-downloader target to the correct code-server / Copilot Chat
      versions and SHA256 digests for its Debian tier.  Pass the path to
      the preseed-bake-overrides artifact downloaded from the detect job.
    required: true

runs:
  using: composite
  steps:
    # ── Build steps ──────────────────────────────────────────────────────────
    - name: Compute GHCR repository (lowercase)
      id: ghcr
      shell: bash
      env:
        REPO: ${{ github.repository }}
      run: echo "repo=ghcr.io/$(echo "${REPO}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.ghcr_token || inputs.github_token }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    # Publish the preseed inputs as step outputs so every downstream step
    # references a single consistent set of variables.
    - name: Resolve preseed paths
      id: preseed-paths
      shell: bash
      run: |
        set -euo pipefail
        echo "downloads_dir=${{ inputs.downloads_dir }}"             >> "$GITHUB_OUTPUT"
        echo "bake_overrides_file=${{ inputs.bake_overrides_file }}" >> "$GITHUB_OUTPUT"

    - name: Validate single-platform input
      id: platform
      shell: bash
      env:
        PLATFORM: ${{ inputs.platform }}
        VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        platform_trimmed="$(printf '%s' "${PLATFORM}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
        if [[ -z "${platform_trimmed}" ]]; then
          echo "::error::No platform was selected for per-platform digest extraction."
          exit 1
        fi
        if [[ "${platform_trimmed}" == *,* ]]; then
          echo "::error::Expected exactly one platform for per-platform digest extraction, but got '${PLATFORM}'. Use separate per-platform builds."
          exit 1
        fi
        if [[ "${platform_trimmed}" =~ [[:space:]] ]]; then
          echo "::error::Platform must not contain whitespace or newlines. Got '${PLATFORM}'."
          exit 1
        fi
        echo "platform=${platform_trimmed}"             >> "$GITHUB_OUTPUT"
        echo "platform_key=${platform_trimmed//\//-}" >> "$GITHUB_OUTPUT"
        echo "version=${VERSION}"                     >> "$GITHUB_OUTPUT"

    # Probe the anonymous Docker Hub quota before attempting the unauthenticated
    # pre-pull below.  When the quota is already at 0 the pre-pull would fail
    # immediately and waste time, so skip it in that case.  The probe itself is
    # non-fatal: a probe failure (empty output) is treated as non-zero remaining
    # so the pre-pull is still attempted.
    - name: Probe anonymous Docker Hub pull quota
      id: quota-probe
      shell: bash
      run: |
        set -euo pipefail
        # shellcheck source=.github/scripts/hub-quota-helpers.sh
        source "${GITHUB_WORKSPACE}/.github/scripts/hub-quota-helpers.sh"
        _anon_rem="$(anon_quota_remaining)"
        if [[ "${_anon_rem}" == "0" ]]; then
          echo "anon_remaining=0" >> "$GITHUB_OUTPUT"
          echo "Anonymous Docker Hub quota exhausted (0 remaining);" \
               "skipping unauthenticated pre-pull."
        else
          echo "anon_remaining=${_anon_rem:-unknown}" >> "$GITHUB_OUTPUT"
          if [[ -n "${_anon_rem}" ]]; then
            echo "Anonymous Docker Hub quota: ${_anon_rem} remaining."
          else
            echo "Anonymous Docker Hub quota: unknown (probe failed);" \
                 "will attempt unauthenticated pre-pull anyway."
          fi
        fi

    # Pull the base PHP image into the active Buildx builder's content store
    # before logging in to Docker Hub so that this pull uses the anonymous
    # (IP-based) pull quota rather than the shared per-account authenticated
    # quota (200 pulls/6 h).  Using "docker buildx build" (rather than plain
    # "docker pull") ensures the layers land in the BuildKit content store of
    # the builder created by docker/setup-buildx-action, which is the same
    # builder used by the bake steps below — they therefore find the base image
    # already cached and do not re-pull it authenticated.  A failure here is
    # non-fatal: bake will re-pull authenticated if the cache miss occurs.
    # Skipped when the anonymous quota probe above confirmed 0 remaining.
    - name: Pre-pull base PHP image (unauthenticated)
      if: steps.quota-probe.outputs.anon_remaining != '0'
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        PLATFORM: ${{ steps.platform.outputs.platform }}
      run: |
        printf 'FROM php:%s-apache\n' "${VERSION}" \
          | docker buildx build --platform "${PLATFORM}" - || true

    # Docker Hub login is required so that the bake steps below can push
    # images by digest.  The base image pull above runs before this login
    # so it uses the anonymous quota rather than the authenticated quota.
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ inputs.dockerhub_username }}
        password: ${{ inputs.dockerhub_token }}

    # ── Build each stage separately ───────────────────────────────────────────────
    # Stages are built sequentially (base → secure → advance).  Each stage's
    # digest artifact is uploaded immediately after that stage's bake completes,
    # so the merge job for each stage can start as soon as its image is ready —
    # without waiting for later stages to finish building.
    # Each bake call reuses the GHA / GHCR layer cache from the previous call.
    # To avoid re-pushing earlier stages, VERSIONS_BASE / VERSIONS_SECURE are
    # set only in the bake step that actually publishes that stage.

    - name: Build base image
      id: bake-base
      if: inputs.versions_base != ''
      uses: docker/bake-action@v7
      env:
        TAG_SUFFIX: ${{ inputs.tag_suffix }}
        VERSIONS: ${{ inputs.version }}
        VERSIONS_BASE: ${{ inputs.versions_base }}
        VERSIONS_SECURE: ''
        PLATFORMS: ${{ steps.platform.outputs.platform }}
        PLATFORM_KEY: ${{ steps.platform.outputs.platform_key }}
        REPO: ${{ inputs.repo }}
        PUSH_BY_DIGEST: 'true'
        CACHE_FROM_ENABLED: ${{ inputs.cache_from_enabled }}
        GHCR_REPO: ${{ steps.ghcr.outputs.repo }}
        GHCR_WRITABLE: ${{ inputs.ghcr_writable }}
        DOWNLOADS_DIR: ${{ steps.preseed-paths.outputs.downloads_dir }}
        BUILDX_BAKE_ENTITLEMENTS_FS: 0
      with:
        source: .
        files: |
          docker-bake.hcl
          ${{ steps.preseed-paths.outputs.bake_overrides_file }}
        targets: php-base

    - name: Extract base digest
      id: base-digest
      if: inputs.versions_base != '' && steps.bake-base.outcome == 'success'
      shell: bash
      env:
        PLATFORM_KEY: ${{ steps.platform.outputs.platform_key }}
        VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        VER_KEY="${VERSION//./_}"
        mkdir -p /tmp/digests/base
        DIGEST=$(jq -r --arg t "php${VER_KEY}-base" '.[$t]["containerimage.digest"] // ""' \
          - <<'__BAKE_METADATA__'
        ${{ steps.bake-base.outputs.metadata }}
        __BAKE_METADATA__
        )
        if [[ -n "${DIGEST}" ]]; then
          jq -n --arg k "${VERSION}-base" --arg d "${DIGEST}" '{($k): $d}' \
            > "/tmp/digests/base/${PLATFORM_KEY}.json"
          echo "  ${VERSION}-base: ${DIGEST}"
          echo "has_base=true" >> "$GITHUB_OUTPUT"
        else
          echo "  ${VERSION}-base: no digest (stage not pushed for this version)"
          echo "has_base=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload base digest artifact
      if: steps.base-digest.outputs.has_base == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: digests-${{ steps.platform.outputs.version }}-base-${{ steps.platform.outputs.platform_key }}
        path: /tmp/digests/base/${{ steps.platform.outputs.platform_key }}.json
        if-no-files-found: error
        retention-days: 1
        overwrite: true

    - name: Build secure image
      id: bake-secure
      if: inputs.versions_secure != ''
      uses: docker/bake-action@v7
      env:
        TAG_SUFFIX: ${{ inputs.tag_suffix }}
        VERSIONS: ${{ inputs.version }}
        VERSIONS_BASE: ''
        VERSIONS_SECURE: ${{ inputs.versions_secure }}
        PLATFORMS: ${{ steps.platform.outputs.platform }}
        PLATFORM_KEY: ${{ steps.platform.outputs.platform_key }}
        REPO: ${{ inputs.repo }}
        PUSH_BY_DIGEST: 'true'
        CACHE_FROM_ENABLED: ${{ inputs.cache_from_enabled }}
        GHCR_REPO: ${{ steps.ghcr.outputs.repo }}
        GHCR_WRITABLE: ${{ inputs.ghcr_writable }}
        DOWNLOADS_DIR: ${{ steps.preseed-paths.outputs.downloads_dir }}
        BUILDX_BAKE_ENTITLEMENTS_FS: 0
      with:
        source: .
        files: |
          docker-bake.hcl
          ${{ steps.preseed-paths.outputs.bake_overrides_file }}
        targets: php-secure

    - name: Extract secure digest
      id: secure-digest
      if: inputs.versions_secure != '' && steps.bake-secure.outcome == 'success'
      shell: bash
      env:
        PLATFORM_KEY: ${{ steps.platform.outputs.platform_key }}
        VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        VER_KEY="${VERSION//./_}"
        mkdir -p /tmp/digests/secure
        DIGEST=$(jq -r --arg t "php${VER_KEY}-secure" '.[$t]["containerimage.digest"] // ""' \
          - <<'__BAKE_METADATA__'
        ${{ steps.bake-secure.outputs.metadata }}
        __BAKE_METADATA__
        )
        if [[ -n "${DIGEST}" ]]; then
          jq -n --arg k "${VERSION}-secure" --arg d "${DIGEST}" '{($k): $d}' \
            > "/tmp/digests/secure/${PLATFORM_KEY}.json"
          echo "  ${VERSION}-secure: ${DIGEST}"
          echo "has_secure=true" >> "$GITHUB_OUTPUT"
        else
          echo "  ${VERSION}-secure: no digest (stage not pushed for this version)"
          echo "has_secure=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload secure digest artifact
      if: steps.secure-digest.outputs.has_secure == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: digests-${{ steps.platform.outputs.version }}-secure-${{ steps.platform.outputs.platform_key }}
        path: /tmp/digests/secure/${{ steps.platform.outputs.platform_key }}.json
        if-no-files-found: error
        retention-days: 1
        overwrite: true

    - name: Build advance image
      id: bake-advance
      uses: docker/bake-action@v7
      env:
        TAG_SUFFIX: ${{ inputs.tag_suffix }}
        VERSIONS: ${{ inputs.version }}
        VERSIONS_BASE: ''
        VERSIONS_SECURE: ''
        PLATFORMS: ${{ steps.platform.outputs.platform }}
        PLATFORM_KEY: ${{ steps.platform.outputs.platform_key }}
        REPO: ${{ inputs.repo }}
        PUSH_BY_DIGEST: 'true'
        CACHE_FROM_ENABLED: ${{ inputs.cache_from_enabled }}
        GHCR_REPO: ${{ steps.ghcr.outputs.repo }}
        GHCR_WRITABLE: ${{ inputs.ghcr_writable }}
        DOWNLOADS_DIR: ${{ steps.preseed-paths.outputs.downloads_dir }}
        BUILDX_BAKE_ENTITLEMENTS_FS: 0
      with:
        source: .
        files: |
          docker-bake.hcl
          ${{ steps.preseed-paths.outputs.bake_overrides_file }}
        targets: php-advance

    - name: Extract advance digest
      id: advance-digest
      if: steps.bake-advance.outcome == 'success'
      shell: bash
      env:
        PLATFORM_KEY: ${{ steps.platform.outputs.platform_key }}
        VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        VER_KEY="${VERSION//./_}"
        mkdir -p /tmp/digests/advance
        DIGEST=$(jq -r --arg t "php${VER_KEY}-advance" '.[$t]["containerimage.digest"] // ""' \
          - <<'__BAKE_METADATA__'
        ${{ steps.bake-advance.outputs.metadata }}
        __BAKE_METADATA__
        )
        if [[ -n "${DIGEST}" ]]; then
          jq -n --arg k "${VERSION}-advance" --arg d "${DIGEST}" '{($k): $d}' \
            > "/tmp/digests/advance/${PLATFORM_KEY}.json"
          echo "  ${VERSION}-advance: ${DIGEST}"
          echo "has_advance=true" >> "$GITHUB_OUTPUT"
        else
          echo "  ${VERSION}-advance: no digest (stage not pushed for this version)"
          echo "has_advance=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload advance digest artifact
      if: steps.advance-digest.outputs.has_advance == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: digests-${{ steps.platform.outputs.version }}-advance-${{ steps.platform.outputs.platform_key }}
        path: /tmp/digests/advance/${{ steps.platform.outputs.platform_key }}.json
        if-no-files-found: error
        retention-days: 1
        overwrite: true

    # ── Build-done marker ──────────────────────────────────────────────────────
    # Uploaded unconditionally (success or failure) so the merge job can detect
    # when all per-platform builds have finished — without querying the jobs API.
    # Named "build-done-{VERSION}-{platform_key}" so each merge job can count
    # how many platform builds are complete for its version.

    # Diagnostic step: when any bake stage failed, probe Docker Hub's pull
    # rate-limit endpoint and emit an actionable error message.
    - name: Check for Docker Hub rate limit errors
      if: failure() && (steps.bake-base.outcome == 'failure' || steps.bake-secure.outcome == 'failure' || steps.bake-advance.outcome == 'failure')
      shell: bash
      env:
        DOCKERHUB_USERNAME: ${{ inputs.dockerhub_username }}
        DOCKERHUB_TOKEN: ${{ inputs.dockerhub_token }}
        VERSION: ${{ inputs.version }}
        PLATFORM: ${{ steps.platform.outputs.platform }}
      run: |
        set -euo pipefail
        # Use the Docker Hub ratelimitpreview endpoint to inspect the current
        # pull rate limit without consuming any quota.  If RateLimit-Remaining
        # is 0 the pull rate limit is exhausted; a base-image pull throttle
        # may have caused the bake failure.  Otherwise report a generic
        # build failure and direct the user to the failed step's output.
        # shellcheck source=.github/scripts/hub-quota-helpers.sh
        source "${GITHUB_WORKSPACE}/.github/scripts/hub-quota-helpers.sh"
        _auth_token_ok=false
        refresh_auth_quota_token && _auth_token_ok=true || true
        rl_remaining="$(auth_quota_remaining)"
        if [[ "${rl_remaining}" == "unlimited" ]]; then
          echo "::error::One or more bake stages failed for PHP ${VERSION} on ${PLATFORM}." \
               "Docker Hub account '${DOCKERHUB_USERNAME}' has no pull rate limit;" \
               "quota exhaustion is not the cause of this failure." \
               "See the failed bake step above for details." \
               "To retry: click 'Re-run failed jobs' on this workflow run's summary page."
        elif [[ "${rl_remaining}" == "0" ]]; then
          echo "::error::Docker Hub pull rate limit exhausted for account '${DOCKERHUB_USERNAME}'." \
               "Wait ~6 hours, then click 'Re-run failed jobs' on this workflow run's summary page."
        elif [[ -n "${rl_remaining}" ]]; then
          echo "::error::One or more bake stages failed for PHP ${VERSION} on ${PLATFORM}." \
               "Docker Hub pull rate limit is not exhausted (${rl_remaining} request(s) remaining)." \
               "See the failed bake step above for details." \
               "To retry: click 'Re-run failed jobs' on this workflow run's summary page."
        elif ${_auth_token_ok}; then
          echo "::error::One or more bake stages failed for PHP ${VERSION} on ${PLATFORM}." \
               "Could not determine Docker Hub pull rate limit status" \
               "(rate-limit probe failed with a non-2xx response or network error); see the failed bake step above." \
               "To retry: click 'Re-run failed jobs' on this workflow run's summary page."
        else
          echo "::error::One or more bake stages failed for PHP ${VERSION} on ${PLATFORM}." \
               "Could not determine Docker Hub pull rate limit status" \
               "(auth token fetch from auth.docker.io failed); see the failed bake step above." \
               "To retry: click 'Re-run failed jobs' on this workflow run's summary page."
        fi

    - name: Prepare build-done marker
      if: always()
      id: build-done-marker
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        PLATFORM_KEY: ${{ steps.platform.outputs.platform_key }}
      run: |
        set -euo pipefail
        # Use the validated/trimmed platform_key from the Validate step.  If
        # that step did not produce a key (e.g. because it failed), skip the
        # marker — the upload step below guards against an empty platform_key.
        [[ -n "${PLATFORM_KEY}" ]] || exit 0
        mkdir -p /tmp/build-done
        printf '%s\n' "${VERSION}" > "/tmp/build-done/${PLATFORM_KEY}.txt"
        echo "platform_key=${PLATFORM_KEY}" >> "$GITHUB_OUTPUT"
        echo "version=${VERSION}"           >> "$GITHUB_OUTPUT"

    - name: Upload build-done artifact
      if: always() && steps.build-done-marker.outputs.platform_key != ''
      uses: actions/upload-artifact@v7
      with:
        name: build-done-${{ steps.build-done-marker.outputs.version }}-${{ steps.build-done-marker.outputs.platform_key }}
        path: /tmp/build-done/${{ steps.build-done-marker.outputs.platform_key }}.txt
        if-no-files-found: error
        retention-days: 1
        overwrite: true
