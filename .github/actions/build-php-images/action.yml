name: Build PHP images
description: >
  Builds and pushes Docker images for a single PHP version on a single platform
  to Docker Hub and GHCR, then uploads per-stage digest artifacts.

  The repository must be checked out by the calling job before this action
  is invoked.

inputs:
  version:
    description: PHP version to build (e.g. "8.3").
    required: true
  versions_base:
    description: >
      Pass the version string to push the base image, or empty to skip.
    default: ''
  versions_secure:
    description: >
      Pass the version string to push the secure image, or empty to skip.
    default: ''
  tag_suffix:
    description: >
      Docker image tag suffix (empty for main, "-rc" for develop, "-BRANCH"
      for other branches).
    required: true
  cache_from_enabled:
    description: Whether to read from cache (set to 'false' for a forced full rebuild)
    default: 'true'
  platform:
    description: >
      The single platform to build on (e.g. "linux/amd64").  Each matrix job
      passes exactly one platform here so that per-platform digest artifacts
      can be uploaded and merged independently.
    required: true
  repo:
    description: >
      Docker Hub repository to push images to (e.g. "devpanel/php").
      Must match the repo used by the corresponding merge-manifests call.
    default: 'devpanel/php'
  dockerhub_username:
    description: Docker Hub username for image push authentication.
    required: true
  dockerhub_token:
    description: Docker Hub token for image push authentication.
    required: true
  github_token:
    description: >
      GITHUB_TOKEN for GHCR login, GHCR write-access check, and download
      pre-seeding.  Use secrets.GITHUB_TOKEN from the calling workflow.
    required: true
  ghcr_token:
    description: >
      Optional classic Personal Access Token with the write:packages scope.
      When provided, this token is used instead of github_token for GHCR
      login and write-access checks.  Required when the organisation's
      Actions token policy restricts GITHUB_TOKEN from writing to packages.
    default: ''

runs:
  using: composite
  steps:
    # ── Build steps ──────────────────────────────────────────────────────────
    - name: Compute GHCR repository (lowercase)
      id: ghcr
      shell: bash
      env:
        REPO: ${{ github.repository }}
      run: echo "repo=ghcr.io/$(echo "${REPO}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.ghcr_token || inputs.github_token }}

    - name: Check GHCR write access
      id: check-ghcr
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.ghcr_token || inputs.github_token }}
        USING_GHCR_TOKEN: ${{ inputs.ghcr_token != '' }}
        REPO: ${{ github.repository }}
        ACTOR: ${{ github.actor }}
      run: |
        set -uo pipefail
        REPO_LC=$(echo "${REPO}" | tr '[:upper:]' '[:lower:]')
        ORG=$(echo "${REPO}" | cut -d'/' -f1)

        # Determine which credential is in use for accurate diagnostics.
        # GHA expressions produce the string 'true'/'false', not bash booleans,
        # so a string comparison is required here.
        if [[ "${USING_GHCR_TOKEN}" == "true" ]]; then
          AUTH_CRED_NAME="GHCR_TOKEN"
        else
          AUTH_CRED_NAME="GITHUB_TOKEN"
        fi

        NOTE="The build will still attempt GHCR cache writes with ignore-error=true; errors will be visible in the bake step log but will not abort the build."

        # Use a temp netrc file so credentials are not exposed as command-line arguments.
        # umask 0177 ensures the file is created with 0600 from the start (no race window).
        NETRC=$(umask 0177 && mktemp)
        # Ensure the netrc temp file is removed when this step's shell exits,
        # regardless of which code path is taken.
        trap 'rm -f "${NETRC}"' EXIT
        printf 'machine ghcr.io login %s password %s\n' "${ACTOR}" "${GH_TOKEN}" > "${NETRC}"

        # Capture both body and HTTP status from the token endpoint so failures are specific.
        TOKEN_RESP=$(umask 0177 && mktemp)
        TOKEN_HTTP=$(curl -s -o "${TOKEN_RESP}" -w "%{http_code}" --netrc-file "${NETRC}" \
          "https://ghcr.io/token?service=ghcr.io&scope=repository:${REPO_LC}:push" \
          2>/dev/null || echo "000")
        AUTH_JSON=$(cat "${TOKEN_RESP}" 2>/dev/null || true)
        rm -f "${TOKEN_RESP}"

        REG_TOKEN=$(printf '%s' "${AUTH_JSON}" | jq -r '.token // empty' 2>/dev/null || true)

        if [[ -z "${REG_TOKEN}" ]]; then
          case "${TOKEN_HTTP}" in
            401)
              REASON="${AUTH_CRED_NAME} was rejected by the GHCR token endpoint (HTTP 401): the token lacks the required write permissions."
              echo "::warning title=GHCR cache write likely to fail::${REASON} ${NOTE}"
              echo "writable=false" >> "$GITHUB_OUTPUT"
              cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
        ### ❌ GHCR cache write pre-check: failed

        **Diagnosis:** ${AUTH_CRED_NAME} was rejected by the GHCR token endpoint (HTTP 401). The token lacks the required write permissions.

        SUMMARY_EOF
              if [[ "${USING_GHCR_TOKEN}" == "true" ]]; then
                cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
        **Fix:** Ensure the `GHCR_TOKEN` secret contains a valid [classic PAT](https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens#creating-a-personal-access-token-classic) with the `write:packages` scope. Classic PATs are required because [fine-grained tokens do not support GitHub Packages](https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry#authenticating-to-the-container-registry). If the token has expired, regenerate it at <https://github.com/settings/tokens> and update the `GHCR_TOKEN` secret.
        SUMMARY_EOF
              else
                cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
        **Fix:** Ensure the calling workflow job declares the following permission:

        ```yaml
        permissions:
          packages: write
        ```
        SUMMARY_EOF
              fi
              echo "> ℹ️ ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
              ;;
            403)
              # Probe read-only access: if a pull token succeeds, the credential is valid
              # but write access is blocked by organisation policy; otherwise the token
              # itself cannot reach the package at all.
              PULL_HTTP=$(curl -s -o /dev/null -w "%{http_code}" --netrc-file "${NETRC}" \
                "https://ghcr.io/token?service=ghcr.io&scope=repository:${REPO_LC}:pull" \
                2>/dev/null || echo "000")
              if [[ "${PULL_HTTP}" == "200" ]]; then
                REASON="${AUTH_CRED_NAME} can read from GHCR but a push token was denied (HTTP 403). The organisation's Actions token policy likely restricts package writes."
                echo "::warning title=GHCR cache write likely to fail::${REASON} ${NOTE}"
                echo "writable=false" >> "$GITHUB_OUTPUT"
                cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
        ### ❌ GHCR cache write pre-check: failed

        **Diagnosis:** ${AUTH_CRED_NAME} can read from GHCR (pull-scoped token succeeded) but a push-scoped token was denied (HTTP 403). This strongly indicates the **organisation's Actions token policy** restricts ${AUTH_CRED_NAME} from writing to packages.

        **Option 1 — Organisation owner: allow workflow write permissions**
        SUMMARY_EOF
                cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
        1. Open <https://github.com/organizations/${ORG}/settings/actions>
        2. Scroll to **Workflow permissions**
        3. Select **"Read and write permissions"** and save

        See the GitHub docs: [Setting the permissions of the GITHUB\_TOKEN for your organisation](https://docs.github.com/en/organizations/managing-organization-settings/disabling-or-limiting-github-actions-for-your-organization#setting-the-permissions-of-the-github_token-for-your-organization)

        **Option 2 — Repository admin: use a Personal Access Token (no org-owner access needed)**
        SUMMARY_EOF
                cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
        > **Note:** A classic token is required because [fine-grained tokens do not support GitHub Packages](https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry#authenticating-to-the-container-registry).

        1. Create a [Personal Access Token (classic)](https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens#creating-a-personal-access-token-classic) with the `write:packages` scope at <https://github.com/settings/tokens>
        2. In this repository, go to **Settings → Secrets and variables → Actions**
        3. Add or update the repository secret named **`GHCR_TOKEN`** and paste the PAT as the value
        4. Re-run the workflow
        SUMMARY_EOF
                echo "> ℹ️ ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
              else
                REASON="${AUTH_CRED_NAME} was denied for both push (HTTP 403) and pull (HTTP ${PULL_HTTP}) scopes. The package ghcr.io/${REPO_LC} may not yet exist, may be private, or the organisation blocks all Actions token access to packages."
                echo "::warning title=GHCR cache write likely to fail::${REASON} ${NOTE}"
                echo "writable=false" >> "$GITHUB_OUTPUT"
                cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
        ### ❌ GHCR cache write pre-check: failed

        **Diagnosis:** ${AUTH_CRED_NAME} was denied for both push-scoped (HTTP 403) and pull-scoped tokens. The package may not yet exist, may be private, or the organisation's token policy blocks all access.

        **Steps to investigate:**
        SUMMARY_EOF
                cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
        1. Check whether the package exists: <https://github.com/orgs/${ORG}/packages>
        2. If the package does not yet exist, it will be created on first push — but write access must be granted first (see options below).
        3. Check the organisation's Actions settings: <https://github.com/organizations/${ORG}/settings/actions> → **Workflow permissions**

        See the GitHub docs: [Setting the permissions of the GITHUB\_TOKEN for your organisation](https://docs.github.com/en/organizations/managing-organization-settings/disabling-or-limiting-github-actions-for-your-organization#setting-the-permissions-of-the-github_token-for-your-organization)

        **To unblock the build — Repository admin: use a Personal Access Token (no org-owner access needed)**

        > **Note:** A classic token is required because [fine-grained tokens do not support GitHub Packages](https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry#authenticating-to-the-container-registry).

        1. Create a [Personal Access Token (classic)](https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens#creating-a-personal-access-token-classic) with the \`write:packages\` scope at <https://github.com/settings/tokens>
        2. In this repository, go to **Settings → Secrets and variables → Actions**
        3. Add or update the repository secret named **\`GHCR_TOKEN\`** and paste the PAT as the value
        4. Re-run the workflow
        SUMMARY_EOF
                echo "> ℹ️ ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
              fi
              ;;
            *)
              REASON="Could not obtain a GHCR push token for ghcr.io/${REPO_LC} (token endpoint returned HTTP ${TOKEN_HTTP})."
              echo "::warning title=GHCR cache write likely to fail::${REASON} ${NOTE}"
              echo "writable=false" >> "$GITHUB_OUTPUT"
              echo "❌ **GHCR cache write pre-check:** failed — ${REASON} ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
              ;;
          esac
          exit 0
        fi

        # Probe write permission: initiate (and immediately abandon) a blob upload.
        # Use a temp curl config file so the bearer token is not a command-line argument.
        CFG=$(umask 0177 && mktemp)
        printf 'header = "Authorization: Bearer %s"\n' "${REG_TOKEN}" > "${CFG}"
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
          -K "${CFG}" \
          "https://ghcr.io/v2/${REPO_LC}/blobs/uploads/")
        rm -f "${CFG}"

        if [[ "${HTTP_STATUS}" == "202" || "${HTTP_STATUS}" == "201" ]]; then
          echo "GHCR write access confirmed for ghcr.io/${REPO_LC}."
          echo "writable=true" >> "$GITHUB_OUTPUT"
          echo "✅ **GHCR cache write pre-check:** passed — intermediate-layer caches will be written to ghcr.io/${REPO_LC}." >> "$GITHUB_STEP_SUMMARY"
        else
          case "${HTTP_STATUS}" in
            401)
              REASON="${AUTH_CRED_NAME} was rejected when initiating a GHCR blob upload (HTTP 401): the token lacks the required write permissions."
              echo "::warning title=GHCR cache write likely to fail::${REASON} ${NOTE}"
              echo "writable=false" >> "$GITHUB_OUTPUT"
              cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
        ### ❌ GHCR cache write pre-check: failed

        **Diagnosis:** ${AUTH_CRED_NAME} was rejected when initiating a GHCR blob upload (HTTP 401). The token lacks the required write permissions.

        SUMMARY_EOF
              if [[ "${USING_GHCR_TOKEN}" == "true" ]]; then
                cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
        **Fix:** Ensure the `GHCR_TOKEN` secret contains a valid [classic PAT](https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens#creating-a-personal-access-token-classic) with the `write:packages` scope. Classic PATs are required because [fine-grained tokens do not support GitHub Packages](https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry#authenticating-to-the-container-registry). If the token has expired, regenerate it at <https://github.com/settings/tokens> and update the `GHCR_TOKEN` secret.
        SUMMARY_EOF
              else
                cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
        **Fix:** Ensure the calling workflow job declares the following permission:

        ```yaml
        permissions:
          packages: write
        ```
        SUMMARY_EOF
              fi
              echo "> ℹ️ ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
              ;;
            403)
              REASON="${AUTH_CRED_NAME} was forbidden from writing to ghcr.io/${REPO_LC} (HTTP 403). The organisation's Actions token policy or the package's own access settings may block this token."
              echo "::warning title=GHCR cache write likely to fail::${REASON} ${NOTE}"
              echo "writable=false" >> "$GITHUB_OUTPUT"
              cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
        ### ❌ GHCR cache write pre-check: failed

        **Diagnosis:** ${AUTH_CRED_NAME} obtained a push-scoped token but the blob upload was still denied (HTTP 403). This can be caused by the **organisation's Actions token policy** or **package-level access restrictions**.

        **Option 1 — Organisation owner: check workflow permissions and package access**
        SUMMARY_EOF
              cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
        1. Check workflow permissions: <https://github.com/organizations/${ORG}/settings/actions> → **Workflow permissions** → select **"Read and write permissions"** and save
        2. If the package already exists, check its access settings: navigate to the package at <https://github.com/orgs/${ORG}/packages>, open its **Settings** tab, and ensure this repository has write access under **Actions access**

        See:
        - [Setting the permissions of the GITHUB\_TOKEN for your organisation](https://docs.github.com/en/organizations/managing-organization-settings/disabling-or-limiting-github-actions-for-your-organization#setting-the-permissions-of-the-github_token-for-your-organization)
        - [Configuring a package's access control and visibility](https://docs.github.com/en/packages/learn-github-packages/configuring-a-packages-access-control-and-visibility)

        **Option 2 — Repository admin: use a Personal Access Token (no org-owner access needed)**

        > **Note:** A classic token is required because [fine-grained tokens do not support GitHub Packages](https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry#authenticating-to-the-container-registry).

        1. Create a [Personal Access Token (classic)](https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens#creating-a-personal-access-token-classic) with the \`write:packages\` scope at <https://github.com/settings/tokens>
        2. In this repository, go to **Settings → Secrets and variables → Actions**
        3. Add or update the repository secret named **\`GHCR_TOKEN\`** and paste the PAT as the value
        4. Re-run the workflow
        SUMMARY_EOF
              echo "> ℹ️ ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
              ;;
            *)
              REASON="${AUTH_CRED_NAME} does not have write access to ghcr.io/${REPO_LC} (HTTP ${HTTP_STATUS})."
              echo "::warning title=GHCR cache write likely to fail::${REASON} ${NOTE}"
              echo "writable=false" >> "$GITHUB_OUTPUT"
              echo "❌ **GHCR cache write pre-check:** failed — ${REASON} ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
              ;;
          esac
        fi

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Pre-seed build downloads
      id: preseed
      uses: ./.github/actions/preseed-downloads
      with:
        github_token: ${{ inputs.github_token }}
        versions:     ${{ inputs.version }}
        dockerhub_username: ${{ inputs.dockerhub_username }}
        dockerhub_token: ${{ inputs.dockerhub_token }}

    # Docker Hub login is intentionally deferred until after pre-seeding so
    # that any docker pull in the preseed step is unauthenticated (anonymous
    # IP-based quota) and does not consume the per-account authenticated-pull
    # quota (200 pulls/6 h) shared across all parallel build jobs.
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ inputs.dockerhub_username }}
        password: ${{ inputs.dockerhub_token }}

    - name: Validate single-platform input
      id: platform
      shell: bash
      env:
        PLATFORM: ${{ inputs.platform }}
        VERSION:  ${{ inputs.version }}
      run: |
        set -euo pipefail
        platform_trimmed="$(printf '%s' "${PLATFORM}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
        if [[ -z "${platform_trimmed}" ]]; then
          echo "::error::No platform was selected for per-platform digest extraction."
          exit 1
        fi
        if [[ "${platform_trimmed}" == *,* ]]; then
          echo "::error::Expected exactly one platform for per-platform digest extraction, but got '${PLATFORM}'. Use separate per-platform builds."
          exit 1
        fi
        if [[ "${platform_trimmed}" =~ [[:space:]] ]]; then
          echo "::error::Platform must not contain whitespace or newlines. Got '${PLATFORM}'."
          exit 1
        fi
        echo "platform_key=${platform_trimmed//\//-}" >> "$GITHUB_OUTPUT"
        echo "version=${VERSION}"                     >> "$GITHUB_OUTPUT"

    # ── Build each stage separately ───────────────────────────────────────────────
    # Stages are built sequentially (base → secure → advance).  Each stage's
    # digest artifact is uploaded immediately after that stage's bake completes,
    # so the merge job for each stage can start as soon as its image is ready —
    # without waiting for later stages to finish building.
    # Each bake call reuses the GHA / GHCR layer cache from the previous call.
    # To avoid re-pushing earlier stages, VERSIONS_BASE / VERSIONS_SECURE are
    # set only in the bake step that actually publishes that stage.

    - name: Build base image
      id: bake-base
      if: inputs.versions_base != ''
      uses: docker/bake-action@v7
      env:
        TAG_SUFFIX:                  ${{ inputs.tag_suffix }}
        VERSIONS:                    ${{ inputs.version }}
        VERSIONS_BASE:               ${{ inputs.versions_base }}
        VERSIONS_SECURE:             ''
        PLATFORMS:                   ${{ inputs.platform }}
        PLATFORM_KEY:                ${{ steps.platform.outputs.platform_key }}
        REPO:                        ${{ inputs.repo }}
        PUSH_BY_DIGEST:              'true'
        CACHE_FROM_ENABLED:          ${{ inputs.cache_from_enabled }}
        GHCR_REPO:                   ${{ steps.ghcr.outputs.repo }}
        GHCR_WRITABLE:               ${{ steps.check-ghcr.outputs.writable }}
        DOWNLOADS_DIR:               ${{ steps.preseed.outputs.downloads_dir }}
        BUILDX_BAKE_ENTITLEMENTS_FS: 0
      with:
        source: .
        files: |
          docker-bake.hcl
          ${{ steps.preseed.outputs.bake_overrides_file }}
        targets:       php-base

    - name: Extract base digest
      id: base-digest
      if: inputs.versions_base != '' && steps.bake-base.outcome == 'success'
      shell: bash
      env:
        PLATFORM_KEY: ${{ steps.platform.outputs.platform_key }}
        VERSION:      ${{ inputs.version }}
      run: |
        set -euo pipefail
        VER_KEY="${VERSION//./_}"
        mkdir -p /tmp/digests/base
        DIGEST=$(jq -r --arg t "php${VER_KEY}-base" '.[$t]["containerimage.digest"] // ""' \
          - <<'__BAKE_METADATA__'
        ${{ steps.bake-base.outputs.metadata }}
        __BAKE_METADATA__
        )
        if [[ -n "${DIGEST}" ]]; then
          jq -n --arg k "${VERSION}-base" --arg d "${DIGEST}" '{($k): $d}' \
            > "/tmp/digests/base/${PLATFORM_KEY}.json"
          echo "  ${VERSION}-base: ${DIGEST}"
          echo "has_base=true" >> "$GITHUB_OUTPUT"
        else
          echo "  ${VERSION}-base: no digest (stage not pushed for this version)"
          echo "has_base=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload base digest artifact
      if: steps.base-digest.outputs.has_base == 'true'
      uses: actions/upload-artifact@v4
      with:
        name:              digests-${{ steps.platform.outputs.version }}-base-${{ steps.platform.outputs.platform_key }}
        path:              /tmp/digests/base/${{ steps.platform.outputs.platform_key }}.json
        if-no-files-found: error
        retention-days:    1
        overwrite: true

    - name: Build secure image
      id: bake-secure
      if: inputs.versions_secure != ''
      uses: docker/bake-action@v7
      env:
        TAG_SUFFIX:                  ${{ inputs.tag_suffix }}
        VERSIONS:                    ${{ inputs.version }}
        VERSIONS_BASE:               ''
        VERSIONS_SECURE:             ${{ inputs.versions_secure }}
        PLATFORMS:                   ${{ inputs.platform }}
        PLATFORM_KEY:                ${{ steps.platform.outputs.platform_key }}
        REPO:                        ${{ inputs.repo }}
        PUSH_BY_DIGEST:              'true'
        CACHE_FROM_ENABLED:          ${{ inputs.cache_from_enabled }}
        GHCR_REPO:                   ${{ steps.ghcr.outputs.repo }}
        GHCR_WRITABLE:               ${{ steps.check-ghcr.outputs.writable }}
        DOWNLOADS_DIR:               ${{ steps.preseed.outputs.downloads_dir }}
        BUILDX_BAKE_ENTITLEMENTS_FS: 0
      with:
        source: .
        files: |
          docker-bake.hcl
          ${{ steps.preseed.outputs.bake_overrides_file }}
        targets:       php-secure

    - name: Extract secure digest
      id: secure-digest
      if: inputs.versions_secure != '' && steps.bake-secure.outcome == 'success'
      shell: bash
      env:
        PLATFORM_KEY: ${{ steps.platform.outputs.platform_key }}
        VERSION:      ${{ inputs.version }}
      run: |
        set -euo pipefail
        VER_KEY="${VERSION//./_}"
        mkdir -p /tmp/digests/secure
        DIGEST=$(jq -r --arg t "php${VER_KEY}-secure" '.[$t]["containerimage.digest"] // ""' \
          - <<'__BAKE_METADATA__'
        ${{ steps.bake-secure.outputs.metadata }}
        __BAKE_METADATA__
        )
        if [[ -n "${DIGEST}" ]]; then
          jq -n --arg k "${VERSION}-secure" --arg d "${DIGEST}" '{($k): $d}' \
            > "/tmp/digests/secure/${PLATFORM_KEY}.json"
          echo "  ${VERSION}-secure: ${DIGEST}"
          echo "has_secure=true" >> "$GITHUB_OUTPUT"
        else
          echo "  ${VERSION}-secure: no digest (stage not pushed for this version)"
          echo "has_secure=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload secure digest artifact
      if: steps.secure-digest.outputs.has_secure == 'true'
      uses: actions/upload-artifact@v4
      with:
        name:              digests-${{ steps.platform.outputs.version }}-secure-${{ steps.platform.outputs.platform_key }}
        path:              /tmp/digests/secure/${{ steps.platform.outputs.platform_key }}.json
        if-no-files-found: error
        retention-days:    1
        overwrite: true

    - name: Build advance image
      id: bake-advance
      uses: docker/bake-action@v7
      env:
        TAG_SUFFIX:                  ${{ inputs.tag_suffix }}
        VERSIONS:                    ${{ inputs.version }}
        VERSIONS_BASE:               ''
        VERSIONS_SECURE:             ''
        PLATFORMS:                   ${{ inputs.platform }}
        PLATFORM_KEY:                ${{ steps.platform.outputs.platform_key }}
        REPO:                        ${{ inputs.repo }}
        PUSH_BY_DIGEST:              'true'
        CACHE_FROM_ENABLED:          ${{ inputs.cache_from_enabled }}
        GHCR_REPO:                   ${{ steps.ghcr.outputs.repo }}
        GHCR_WRITABLE:               ${{ steps.check-ghcr.outputs.writable }}
        DOWNLOADS_DIR:               ${{ steps.preseed.outputs.downloads_dir }}
        BUILDX_BAKE_ENTITLEMENTS_FS: 0
      with:
        source: .
        files: |
          docker-bake.hcl
          ${{ steps.preseed.outputs.bake_overrides_file }}
        targets:       php-advance

    - name: Extract advance digest
      id: advance-digest
      if: steps.bake-advance.outcome == 'success'
      shell: bash
      env:
        PLATFORM_KEY: ${{ steps.platform.outputs.platform_key }}
        VERSION:      ${{ inputs.version }}
      run: |
        set -euo pipefail
        VER_KEY="${VERSION//./_}"
        mkdir -p /tmp/digests/advance
        DIGEST=$(jq -r --arg t "php${VER_KEY}-advance" '.[$t]["containerimage.digest"] // ""' \
          - <<'__BAKE_METADATA__'
        ${{ steps.bake-advance.outputs.metadata }}
        __BAKE_METADATA__
        )
        if [[ -n "${DIGEST}" ]]; then
          jq -n --arg k "${VERSION}-advance" --arg d "${DIGEST}" '{($k): $d}' \
            > "/tmp/digests/advance/${PLATFORM_KEY}.json"
          echo "  ${VERSION}-advance: ${DIGEST}"
          echo "has_advance=true" >> "$GITHUB_OUTPUT"
        else
          echo "  ${VERSION}-advance: no digest (stage not pushed for this version)"
          echo "has_advance=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload advance digest artifact
      if: steps.advance-digest.outputs.has_advance == 'true'
      uses: actions/upload-artifact@v4
      with:
        name:              digests-${{ steps.platform.outputs.version }}-advance-${{ steps.platform.outputs.platform_key }}
        path:              /tmp/digests/advance/${{ steps.platform.outputs.platform_key }}.json
        if-no-files-found: error
        retention-days:    1
        overwrite: true

    # ── Build-done marker ──────────────────────────────────────────────────────
    # Uploaded unconditionally (success or failure) so the merge job can detect
    # when all per-platform builds have finished — without querying the jobs API.
    # Named "build-done-{VERSION}-{platform_key}" so each merge job can count
    # how many platform builds are complete for its version.
    - name: Prepare build-done marker
      if: always()
      id: build-done-marker
      shell: bash
      env:
        VERSION:      ${{ inputs.version }}
        PLATFORM_KEY: ${{ steps.platform.outputs.platform_key }}
      run: |
        set -euo pipefail
        # Use the validated/trimmed platform_key from the Validate step.  If
        # that step did not produce a key (e.g. because it failed), skip the
        # marker — the upload step below guards against an empty platform_key.
        [[ -n "${PLATFORM_KEY}" ]] || exit 0
        mkdir -p /tmp/build-done
        printf '%s\n' "${VERSION}" > "/tmp/build-done/${PLATFORM_KEY}.txt"
        echo "platform_key=${PLATFORM_KEY}" >> "$GITHUB_OUTPUT"
        echo "version=${VERSION}"           >> "$GITHUB_OUTPUT"

    - name: Upload build-done artifact
      if: always() && steps.build-done-marker.outputs.platform_key != ''
      uses: actions/upload-artifact@v4
      with:
        name:              build-done-${{ steps.build-done-marker.outputs.version }}-${{ steps.build-done-marker.outputs.platform_key }}
        path:              /tmp/build-done/${{ steps.build-done-marker.outputs.platform_key }}.txt
        if-no-files-found: error
        retention-days:    1
        overwrite: true
