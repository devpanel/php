name: Merge per-platform digests into multi-arch manifest tags
description: >
  After per-platform builds have pushed their images to Docker Hub by content
  digest (no tags), this action downloads all digest artifacts (named
  digests-*) uploaded during the current workflow run and creates or updates
  the multi-architecture Docker Hub manifest tags using docker buildx
  imagetools create.  If a tag is already published (e.g. by an earlier
  platform build in the same run), any platform digests that are not covered
  by the current run's artifacts are carried forward from the existing manifest
  so that the tag always lists every platform built so far.  One digest
  artifact per platform is expected; to add support for a new platform, add
  an entry to the build matrix — no changes to this action are needed.

inputs:
  versions:
    description: >
      Space-separated list of PHP versions to merge (e.g. "7.4 8.0 8.1 8.2 8.3").
    required: true
  versions_base:
    description: >
      Space-separated list of PHP versions for which base-stage images were
      pushed and should be merged.
    required: true
  versions_secure:
    description: >
      Space-separated list of PHP versions for which secure-stage images were
      pushed and should be merged.
    required: true
  tag_suffix:
    description: >
      Tag suffix that was applied during the build (e.g. "" for main or "-rc"
      for the develop branch).
    required: true
  repo:
    description: Docker Hub repository (e.g. "devpanel/php").
    default: 'devpanel/php'
  dockerhub_username:
    description: Docker Hub username for image push authentication.
    required: true
  dockerhub_token:
    description: Docker Hub token for image push authentication.
    required: true

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ inputs.dockerhub_username }}
        password: ${{ inputs.dockerhub_token }}

    - name: Download all digest artifacts
      uses: actions/download-artifact@v4
      with:
        pattern:        digests-*
        path:           /tmp/digests
        merge-multiple: true

    - name: Create multi-arch manifest tags from per-platform digests
      shell: bash
      env:
        VERSIONS:        ${{ inputs.versions }}
        VERSIONS_BASE:   ${{ inputs.versions_base }}
        VERSIONS_SECURE: ${{ inputs.versions_secure }}
        TAG_SUFFIX:      ${{ inputs.tag_suffix }}
        REPO:            ${{ inputs.repo }}
      run: |
        set -euo pipefail

        # Returns 0 if $1 appears as a whole word in the space-separated list $2.
        in_list() { case " $2 " in *" $1 "*) return 0 ;; *) return 1 ;; esac; }

        for version in $VERSIONS; do
          for stage in base secure advance; do
            # Skip base/secure stages not present in the respective push lists.
            if [[ "$stage" == "base"   ]] && ! in_list "$version" "$VERSIONS_BASE";   then continue; fi
            if [[ "$stage" == "secure" ]] && ! in_list "$version" "$VERSIONS_SECURE"; then continue; fi

            KEY="${version}-${stage}"
            FINAL_TAG="${REPO}:${version}-${stage}${TAG_SUFFIX}"

            # Collect digests from newly-built platform artifact files.
            NEW_SOURCES=()
            NEW_DIGESTS=()
            for digest_file in /tmp/digests/digests-*.json; do
              [[ -f "$digest_file" ]] || continue
              DIGEST=$(jq -r --arg k "${KEY}" '.[$k] // empty' "${digest_file}")
              if [[ -n "$DIGEST" ]]; then
                NEW_SOURCES+=("${REPO}@${DIGEST}")
                NEW_DIGESTS+=("$DIGEST")
              fi
            done

            if [[ ${#NEW_SOURCES[@]} -eq 0 ]]; then
              echo "Skipping ${KEY}: no digests available for any platform."
              continue
            fi

            # Start with the newly-built platform digests.
            SOURCES=("${NEW_SOURCES[@]}")

            # Inspect the existing tag (if published) and carry forward digests
            # for any platforms not covered by this run's artifacts, so that the
            # manifest always lists every platform built so far while the run is
            # still in progress.
            EXISTING_MANIFEST=$(docker buildx imagetools inspect --raw "${FINAL_TAG}" 2>/dev/null || true)
            if [[ -n "$EXISTING_MANIFEST" ]] && \
               printf '%s' "$EXISTING_MANIFEST" | jq -e '.manifests' >/dev/null 2>&1; then
              while IFS= read -r existing_digest; do
                [[ -z "$existing_digest" ]] && continue
                # Skip if this platform's image was rebuilt in the current run.
                already_built=0
                for d in "${NEW_DIGESTS[@]}"; do
                  [[ "$existing_digest" == "$d" ]] && { already_built=1; break; }
                done
                if [[ "$already_built" -eq 0 ]]; then
                  echo "  Carrying forward existing platform digest: ${existing_digest}"
                  SOURCES+=("${REPO}@${existing_digest}")
                fi
              done < <(printf '%s' "$EXISTING_MANIFEST" | jq -r '.manifests[].digest // empty')
            fi

            echo "Creating manifest: ${FINAL_TAG}"
            printf '  source: %s\n' "${SOURCES[@]}"
            docker buildx imagetools create -t "${FINAL_TAG}" "${SOURCES[@]}"
          done
        done
