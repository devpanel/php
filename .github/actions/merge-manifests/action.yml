name: Merge per-platform digests into multi-arch manifest tags
description: >
  After per-platform builds have pushed their images to Docker Hub by content
  digest (no tags), this action creates the final multi-architecture Docker Hub
  manifest tags using docker buildx imagetools create.

  Each build job passes a JSON map of "{version}-{stage}" to digest.  This
  action combines the amd64 and arm64 digests for each version/stage and creates
  the final manifest tag on Docker Hub.

inputs:
  versions:
    description: >
      Space-separated list of PHP versions to merge (e.g. "7.4 8.0 8.1 8.2 8.3").
    required: true
  versions_base:
    description: >
      Space-separated list of PHP versions for which base-stage images were
      pushed and should be merged.
    required: true
  versions_secure:
    description: >
      Space-separated list of PHP versions for which secure-stage images were
      pushed and should be merged.
    required: true
  tag_suffix:
    description: >
      Tag suffix that was applied during the build (e.g. "" for main or "-rc"
      for the develop branch).
    required: true
  amd64_digests:
    description: >
      JSON object mapping "{version}-{stage}" to amd64 image digest, as
      produced by build-php-images with push_by_digest=true.
      Example: {"8.3-base":"sha256:abc...","8.3-secure":"sha256:def..."}.
      Omit (or pass '{}') when the amd64 build has not yet completed.
    default: '{}'
  arm64_digests:
    description: >
      JSON object mapping "{version}-{stage}" to arm64 image digest, as
      produced by build-php-images with push_by_digest=true.
      Example: {"8.3-base":"sha256:uvw...","8.3-secure":"sha256:xyz..."}.
      Omit (or pass '{}') when the arm64 build has not yet completed.
    default: '{}'
  repo:
    description: Docker Hub repository (e.g. "devpanel/php").
    default: 'devpanel/php'
  dockerhub_username:
    description: Docker Hub username for image push authentication.
    required: true
  dockerhub_token:
    description: Docker Hub token for image push authentication.
    required: true

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ inputs.dockerhub_username }}
        password: ${{ inputs.dockerhub_token }}

    - name: Create multi-arch manifest tags from per-platform digests
      shell: bash
      env:
        VERSIONS:        ${{ inputs.versions }}
        VERSIONS_BASE:   ${{ inputs.versions_base }}
        VERSIONS_SECURE: ${{ inputs.versions_secure }}
        TAG_SUFFIX:      ${{ inputs.tag_suffix }}
        AMD64_DIGESTS:   ${{ inputs.amd64_digests }}
        ARM64_DIGESTS:   ${{ inputs.arm64_digests }}
        REPO:            ${{ inputs.repo }}
      run: |
        set -euo pipefail

        # Returns 0 if $1 appears as a whole word in the space-separated list $2.
        in_list() { case " $2 " in *" $1 "*) return 0 ;; *) return 1 ;; esac; }

        # Look up the digest for a given version-stage key from a JSON map.
        # Prints the digest, or empty string if not found.
        get_digest() {
          local json="$1" key="$2"
          printf '%s' "${json}" | jq -r --arg k "${key}" '.[$k] // empty'
        }

        for version in $VERSIONS; do
          for stage in base secure advance; do
            # Skip base/secure stages not present in the respective push lists.
            if [[ "$stage" == "base"   ]] && ! in_list "$version" "$VERSIONS_BASE";   then continue; fi
            if [[ "$stage" == "secure" ]] && ! in_list "$version" "$VERSIONS_SECURE"; then continue; fi

            KEY="${version}-${stage}"
            AMD64=$(get_digest "${AMD64_DIGESTS}" "${KEY}")
            ARM64=$(get_digest "${ARM64_DIGESTS}" "${KEY}")

            if [[ -z "$AMD64" && -z "$ARM64" ]]; then
              echo "Skipping ${KEY}: no digests available for either platform."
              continue
            fi

            FINAL_TAG="${REPO}:${version}-${stage}${TAG_SUFFIX}"
            SOURCES=()
            [[ -n "$AMD64" ]] && SOURCES+=("${REPO}@${AMD64}")
            [[ -n "$ARM64" ]] && SOURCES+=("${REPO}@${ARM64}")

            echo "Creating manifest: ${FINAL_TAG}"
            printf '  source: %s\n' "${SOURCES[@]}"
            docker buildx imagetools create -t "${FINAL_TAG}" "${SOURCES[@]}"
          done
        done
