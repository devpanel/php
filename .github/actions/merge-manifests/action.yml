name: Poll and merge platform manifests for all images
description: >
  Merges per-platform Docker Hub image digests into tagged multi-arch manifests
  for every image in the merge matrix.  Runs as a single job alongside every
  per-platform build job.

  Images with a non-empty cached platform-digest state file (restored from
  a previous run's Actions cache) are marked pre-seeded and require no
  Docker Hub manifest inspection.  For images with no cached state (first
  push or cold cache), the existing manifest is inspected lazily inside the
  polling loop to seed the platform-digest state file.  This captures any
  platforms already published so they are preserved in every subsequent
  imagetools create call.

  On every polling cycle it fetches the full artifact list for the run once and
  uses it for all images:

  1. Digest artifacts ("digests-{VERSION}-{STAGE}-{platform_key}"): for each
     new one, the state file is updated (new digest replaces old for that
     platform key), then a single "docker buildx imagetools create" call pushes
     a manifest list built from every entry in the state file — existing
     platforms plus every newly-built platform.

  2. Build-done markers ("build-done-a{RUN_ATTEMPT}-{VERSION}-{platform_key}"):
     uploaded by every build job when it finishes (success or failure).  The
     encoded run_attempt is compared against GITHUB_RUN_ATTEMPT (which is the
     same for every job in a workflow run) so that stale markers from a
     previous failed attempt are not treated as completion signals when the job
     is re-run.  When the count of verified markers equals total_platforms all
     builds for that version are done and the merge loop can exit for all
     stages of that version.

  Batching multiple completions into one create call per image avoids
  unnecessary intermediate manifest states and reduces Docker Hub API traffic.
  A single job (not a matrix) is used for all images so that concurrent Docker
  Hub API calls are avoided.

  When the platform-digest state files produce a new cache key, that state is
  saved/updated in the Actions cache at the end of the run (including failed
  runs), even if some restored files are still empty placeholders.  On the
  next run, only images whose restored cache file is already non-empty are
  considered pre-seeded and require no Docker Hub manifest inspection at all.

  After seeding, each digest artifact is compared against the seeded state.
  If the platform+digest is already live on Docker Hub (exact match), the
  artifact is marked processed and counted without calling imagetools create.
  This prevents redundant pushes when manifests completed in a previous run
  or attempt are re-encountered.

  For images with no cached state, the existing manifest is seeded via
  docker buildx imagetools inspect.  If inspect fails for a reason other than
  "tag not found", the image remains unseeded and imagetools create is deferred
  until seeding succeeds in a later polling cycle.

inputs:
  merge_matrix:
    description: >
      JSON array of {version, stage} objects — one entry per Docker Hub image
      that needs a manifest merge. Pass needs.detect.outputs.merge_matrix from
      the calling workflow.
      Example: [{"version":"8.3","stage":"base"},{"version":"8.3","stage":"secure"}]
    required: true
  repo:
    description: Docker Hub repository (e.g. devpanel/php)
    default: 'devpanel/php'
  tag_suffix:
    description: Image tag suffix appended to every tag (e.g. '' or '-rc')
    required: true
  total_platforms:
    description: >
      Number of distinct target platforms expected for each image.  The merge
      loop for an image exits as soon as it has successfully merged this many
      platform digests, or as soon as this many "build-done-{VERSION}-*"
      markers have been observed for the version.
    required: true
  poll_interval_seconds:
    description: Seconds to wait between polling cycles.
    default: '60'
  github_token:
    description: >
      Token used for GitHub API calls (list/download artifacts).
      Requires actions:read permission.
    required: true
  run_id:
    description: >
      ID of the current GitHub Actions workflow run.
      Pass github.run_id from the calling workflow.
    required: true
  repository:
    description: >
      Owner/repo slug of the current repository.
      Pass github.repository from the calling workflow.
    required: true
  dockerhub_username:
    description: >
      Docker Hub username for image push authentication.
      Used for docker login before imagetools inspect and imagetools create.
    required: true
  dockerhub_token:
    description: >
      Docker Hub token for image push authentication.
      Used for docker login before imagetools inspect and imagetools create.
    required: true
  run_started_at:
    description: >
      Unix epoch seconds captured at the start of the calling workflow's
      detect job.  Used to measure elapsed run time when enforcing a
      maximum wait limit.  Pass needs.detect.outputs.run_started_at from
      the calling workflow.
    required: true
  ghcr_repo:
    description: >
      GHCR repository for pulling per-platform images pushed by digest (e.g.
      "ghcr.io/devpanel/php").  When ghcr_writable is "true", newly-built
      platform refs are always sourced from GHCR, and seeded/existing
      platform refs whose digests are confirmed present on GHCR (via the
      per-cycle seeding probe) are also sourced from GHCR.
      Has no effect when ghcr_writable is "false".
    default: ''
  ghcr_token:
    description: >
      Token used to authenticate with GHCR before imagetools create when
      ghcr_writable is "true".  Falls back to github_token when not set.
    default: ''
  ghcr_user:
    description: >
      Username associated with ghcr_token when using a Personal Access Token.
      Pass the username value as this input, typically from the calling
      workflow's GHCR_USER repository variable (vars.GHCR_USER).
    default: ''
  ghcr_writable:
    description: >
      Whether GHCR was used as a push target for the per-platform digest
      images ("true"/"false").  When "true", newly-built platform refs
      always use the GHCR digest path; seeded/existing platform refs use
      GHCR when the digest is confirmed present there by the per-cycle
      seeding probe, and fall back to Docker Hub otherwise (e.g. built
      before GHCR dual-push was enabled).  Defaults to "false" (Docker Hub
      only, preserving existing behaviour as a fallback).
    default: 'false'

runs:
  using: composite
  steps:
    - name: Compute digests cache key prefix
      id: cache-key-prefix
      shell: bash
      run: |
        # Sanitize inputs.repo: replace "/" with "-" (GHA cache keys must not
        # contain "/" or other special characters).
        safe_repo="${{ inputs.repo }}"
        safe_repo="${safe_repo//\//-}"
        echo "prefix=merge-manifests-${safe_repo}-${{ inputs.tag_suffix }}-" >> "$GITHUB_OUTPUT"

    - name: Restore digests cache
      id: restore-cache
      uses: actions/cache/restore@v5
      with:
        path: ${{ runner.temp }}/merge-manifests-digests
        # Key ends with "-" so GHA's built-in prefix matching finds the
        # most-recently saved entry for this repo+tag_suffix combination.
        # No restore-keys needed: the trailing dash already enables prefix matching.
        key: ${{ steps.cache-key-prefix.outputs.prefix }}

    # Unauthenticated manifest inspection (anonymous token via curl) is tried
    # first in the polling step to conserve the authenticated-pull quota.
    # Login is performed here so that the authenticated fallback
    # (imagetools inspect) and imagetools create both have valid credentials
    # without requiring the calling workflow to manage docker login separately.
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ inputs.dockerhub_username }}
        password: ${{ inputs.dockerhub_token }}

    # Login to GHCR so imagetools create can pull per-platform digest refs
    # from GHCR (avoiding Docker Hub authenticated pull quota).  Only needed
    # when ghcr_writable is true; skipped otherwise so no unnecessary
    # registry credentials are requested.
    - name: Validate GHCR credentials for PAT auth
      if: inputs.ghcr_writable == 'true' && inputs.ghcr_token != ''
      shell: bash
      env:
        GHCR_USER: ${{ inputs.ghcr_user }}
      run: |
        if [[ -z "${GHCR_USER}" ]]; then
          echo "::error::ghcr_token is set but vars.GHCR_USER is not configured. Set the GHCR_USER repository variable to the username that owns the PAT."
          exit 1
        fi

    - name: Login to GitHub Container Registry
      if: inputs.ghcr_writable == 'true'
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ inputs.ghcr_token && inputs.ghcr_user || github.actor }}
        password: ${{ inputs.ghcr_token || inputs.github_token }}

    - name: Poll and merge manifests
      shell: bash
      env:
        MERGE_MATRIX_JSON:     ${{ inputs.merge_matrix }}
        REPO:                  ${{ inputs.repo }}
        TAG_SUFFIX:            ${{ inputs.tag_suffix }}
        TOTAL_PLATFORMS:       ${{ inputs.total_platforms }}
        POLL_INTERVAL_SECONDS: ${{ inputs.poll_interval_seconds }}
        GH_TOKEN:              ${{ inputs.github_token }}
        RUN_ID:                ${{ inputs.run_id }}
        GITHUB_REPO:           ${{ inputs.repository }}
        DIGESTS_CACHE_DIR:     ${{ runner.temp }}/merge-manifests-digests
        DOCKERHUB_USERNAME: ${{ inputs.dockerhub_username }}
        DOCKERHUB_TOKEN: ${{ inputs.dockerhub_token }}
        RUN_STARTED_AT: ${{ inputs.run_started_at }}
        GHCR_REPO: ${{ inputs.ghcr_repo }}
        GHCR_WRITABLE: ${{ inputs.ghcr_writable }}
        GHCR_TOKEN: ${{ inputs.ghcr_token || inputs.github_token }}
        GHCR_USER: ${{ inputs.ghcr_token && inputs.ghcr_user || github.actor }}
      run: |
        set -euo pipefail

        WORK_DIR="$(mktemp -d)"
        trap 'rm -rf "${WORK_DIR}"' EXIT

        # Stable directory for per-image platform-digest state files.
        # Pre-populated by the cache restore step; persisted by the cache
        # save step that runs after this step (even on failure).
        mkdir -p "${DIGESTS_CACHE_DIR}"

        # ── Parse merge matrix into parallel arrays ────────────────────────
        # VERSIONS_STAGES[i] = "VERSION:STAGE"
        readarray -t VERSIONS_STAGES < <(
          printf '%s' "${MERGE_MATRIX_JSON}" \
            | jq -r '.[] | .version + ":" + .stage'
        )

        if [[ ${#VERSIONS_STAGES[@]} -eq 0 ]]; then
          echo "No images in merge matrix; nothing to do."
          exit 0
        fi

        # Per-image state (keyed by "VERSION:STAGE", colons replaced with _ for
        # filenames).
        declare -A IMG_PROCESSED        # image_key → path to processed-artifacts file
        declare -A IMG_DIGEST_MERGED    # image_key → count of distinct merged platforms
        declare -A IMG_MERGED_PKEYS     # image_key → path to merged-platform-keys set file
        declare -A IMG_DONE             # image_key → "true"/"false"
        declare -A IMG_SEEDED           # image_key → "true" (seeded) / "false" (pending)
        declare -A IMG_PLATFORM_DIGESTS # image_key → path to platform-digest state file
        declare -A IMG_LAST_ERROR       # image_key → last imagetools create error text
        declare -A IMG_GHCR_PROBE_FILE    # image_key → path to GHCR-probe cache file
        #   State file format: one "platform_key<TAB>sha256:digest" per line.
        #   Seeded from the existing manifest during the first polling cycle;
        #   updated after each successful imagetools create.  Provides within-run
        #   preservation without relying on a per-cycle inspect.

        # Per-version build-done state.  A single "build-done-a{N}-{VERSION}-*"
        # marker covers all stages (base/secure/advance) for that version,
        # so we track it per version, not per stage.
        declare -A VER_BUILD_DONE    # version → count of build-done markers seen

        # In-memory set of build-done artifact names already counted this run.
        # Prevents double-counting when the artifact list is re-read each cycle.
        # Only current-attempt markers (name prefix "build-done-a${GITHUB_RUN_ATTEMPT}-")
        # are ever added here; markers from other attempts are ignored by the
        # prefix filter and never reach this set.
        declare -A BUILD_DONE_SEEN   # artifact_name → 1

        echo "Managing manifests for ${#VERSIONS_STAGES[@]} image(s):"
        for vs in "${VERSIONS_STAGES[@]}"; do
          version="${vs%%:*}"
          stage="${vs##*:}"
          key="${version}:${stage}"
          safe_key="${key//:/_}"

          IMG_PROCESSED[$key]="${WORK_DIR}/processed-${safe_key}.txt"
          IMG_MERGED_PKEYS[$key]="${WORK_DIR}/merged-pkeys-${safe_key}.txt"
          IMG_PLATFORM_DIGESTS[$key]="${DIGESTS_CACHE_DIR}/digests-${safe_key}.txt"
          IMG_DIGEST_MERGED[$key]=0
          IMG_DONE[$key]="false"
          IMG_SEEDED[$key]="false"
          IMG_LAST_ERROR[$key]=""
          touch "${IMG_PROCESSED[$key]}"
          touch "${IMG_MERGED_PKEYS[$key]}"
          # Only create the digests file if it wasn't pre-populated by the
          # cache restore step.
          [[ -f "${IMG_PLATFORM_DIGESTS[$key]}" ]] || touch "${IMG_PLATFORM_DIGESTS[$key]}"
          IMG_GHCR_PROBE_FILE[$key]="${DIGESTS_CACHE_DIR}/ghcr-probe-${safe_key}.txt"
          [[ -f "${IMG_GHCR_PROBE_FILE[$key]}" ]] || touch "${IMG_GHCR_PROBE_FILE[$key]}"
          # Sanitize the restored cache file: keep only well-formed
          # "platform_key<TAB>sha256:..." lines so that any truncated,
          # partially-written, or otherwise corrupted entries are stripped
          # before they can reach imagetools create.  Duplicate entries for
          # the same platform_key are collapsed to the last occurrence.
          # The filtered content replaces the file in place; if no valid
          # lines remain the file is left empty and the image falls back to
          # manifest-inspection seeding.  If grep itself fails with an I/O
          # error (exit code ≥2), the invalid file is cleared/recreated as
          # an empty placeholder and the image is forced to re-seed.
          _pdigest_file="${IMG_PLATFORM_DIGESTS[$key]}"
          if [[ -s "${_pdigest_file}" ]]; then
            _grep_status=0
            _clean_content=$(grep -E $'^[^[:space:]]+\tsha256:[[:xdigit:]]{64}$' \
              "${_pdigest_file}" \
              | awk -F'\t' '{ lines[$1]=$0 } END { for (k in lines) print lines[k] }' \
              | sort -t $'\t' -k1,1) \
              || _grep_status=$?
            if [[ ${_grep_status} -eq 0 || ${_grep_status} -eq 1 ]]; then
              if [[ -n "${_clean_content}" ]]; then
                printf '%s\n' "${_clean_content}" > "${_pdigest_file}"
              else
                : > "${_pdigest_file}"
              fi
              _preseed_n=$(wc -l < "${_pdigest_file}")
              if (( _preseed_n > 0 )); then
                echo "  ${REPO}:${version}-${stage}${TAG_SUFFIX}:" \
                     "pre-seeded from cache (${_preseed_n} platform(s))."
                IMG_SEEDED[$key]="true"
              else
                echo "  ${REPO}:${version}-${stage}${TAG_SUFFIX}:" \
                     "discarding invalid cached digest state; re-seeding."
              fi
            else
              : > "${_pdigest_file}"
              : > "${IMG_GHCR_PROBE_FILE[$key]}"
              echo "  WARNING: ${REPO}:${version}-${stage}${TAG_SUFFIX}:" \
                   "failed to sanitize cached digest state;" \
                   "cleared the cached baseline and forcing re-seeding."
              echo "::warning::${REPO}:${version}-${stage}${TAG_SUFFIX}: failed to sanitize cached digest state; cleared the baseline so manifest creation stays deferred until re-seeding succeeds."
            fi
          else
            echo "  ${REPO}:${version}-${stage}${TAG_SUFFIX}"
          fi
          # Prune the GHCR probe cache to only entries whose digest still
          # appears in the (now-sanitized) platform-digest file.  Without
          # this, stale entries appended by previous imagetools-create cycles
          # accumulate in the cached file without bound.  The awk pass reads
          # the digest file first (NR==FNR) to build a set of known digests
          # (column 2), then filters the probe file keeping only lines whose
          # digest (column 1) is in the set.
          if [[ -s "${IMG_GHCR_PROBE_FILE[$key]}" ]]; then
            if [[ -s "${_pdigest_file}" ]]; then
              _pruned_probe=$(awk -F'\t' \
                'NR==FNR{known[$2]=1;next} ($1 in known)' \
                "${_pdigest_file}" "${IMG_GHCR_PROBE_FILE[$key]}")
              if [[ -n "${_pruned_probe}" ]]; then
                printf '%s\n' "${_pruned_probe}" > "${IMG_GHCR_PROBE_FILE[$key]}"
              else
                : > "${IMG_GHCR_PROBE_FILE[$key]}"
              fi
            else
              : > "${IMG_GHCR_PROBE_FILE[$key]}"
            fi
          fi

          if [[ -z "${VER_BUILD_DONE[$version]+set}" ]]; then
            VER_BUILD_DONE[$version]=0
          fi
        done
        echo "(${TOTAL_PLATFORMS} platform(s) expected per image)"

        POLL_CYCLE=0

        # Maximum elapsed time (seconds) before the job fails with a timeout
        # error.  Set to 5h30m to stay below the common 6h GitHub job timeout
        # so cleanup steps always run.
        MAX_WAIT=19800

        # Elapsed-time anchor (seconds since epoch) captured at the start of
        # the detect job and passed in via RUN_STARTED_AT so no GitHub API
        # call is needed here.  Used to enforce MAX_WAIT and guarantee the
        # job exits before GitHub's hard job-timeout so cleanup steps run.
        started_at="${RUN_STARTED_AT}"
        if [[ -z "${started_at}" || ! "${started_at}" =~ ^[0-9]+$ ]]; then
          echo "::error::run_started_at input is missing or not a Unix epoch integer: '${started_at}'" >&2
          exit 1
        fi

        # GHCR Registry API path: GHCR_REPO minus the "ghcr.io/" prefix.
        # Empty when GHCR_REPO is unset; used by get_ghcr_inspect_token and
        # the per-digest GHCR probe block below.
        _ghcr_path="${GHCR_REPO#ghcr.io/}"

        # GHCR Bearer token globals.  Updated directly by get_ghcr_inspect_token
        # in the main shell; reset to empty on failure.
        GHCR_BEARER=""
        GHCR_BEARER_TIME=0
        # Token max age in seconds before re-fetching.
        TOKEN_MAX_AGE=240

        # Helper: refresh the GHCR Bearer token used for per-digest HEAD probes.
        # Obtains a pull-scoped token from the GHCR token endpoint using the
        # GHCR_USER and GHCR_TOKEN environment variables set by the calling step.
        # Returns 0 when a valid token is available, 1 when the fetch failed.
        get_ghcr_inspect_token() {
          local _now
          _now="$(date +%s)"
          if [[ -n "${GHCR_BEARER}" ]] \
              && (( _now - ${GHCR_BEARER_TIME:-0} < TOKEN_MAX_AGE )); then
            return 0
          fi
          local _json _new_token
          _json="$(curl -sf --connect-timeout 5 --max-time 15 \
            -u "${GHCR_USER}:${GHCR_TOKEN}" \
            "https://ghcr.io/token?service=ghcr.io&scope=repository:${_ghcr_path}:pull" \
            2>/dev/null)" || _json=""
          _new_token="$(printf '%s' "${_json}" | jq -r '.token // ""' 2>/dev/null)" \
            || _new_token=""
          if [[ -n "${_new_token}" ]]; then
            GHCR_BEARER="${_new_token}"
            GHCR_BEARER_TIME="$(date +%s)"
            return 0
          else
            GHCR_BEARER=""
            GHCR_BEARER_TIME=0
            return 1
          fi
        }

        # Consecutive artifact-list API failure counter.  After this many
        # back-to-back failures the loop aborts so the job fails instead of
        # hanging forever (e.g. if the token lacks actions:read or the API is
        # rate-limiting).
        MAX_API_FAILURES=5
        API_FAILURE_COUNT=0

        while true; do

          POLL_CYCLE=$(( POLL_CYCLE + 1 ))

          # ── Check if all images are done ───────────────────────────────
          PENDING_COUNT=0
          for vs in "${VERSIONS_STAGES[@]}"; do
            version="${vs%%:*}"
            stage="${vs##*:}"
            key="${version}:${stage}"
            [[ "${IMG_DONE[$key]}" == "true" ]] || (( PENDING_COUNT++ )) || true
          done
          if [[ ${PENDING_COUNT} -eq 0 ]]; then
            echo "All ${#VERSIONS_STAGES[@]} image(s) are complete."
            break
          fi

          # ── Fetch all artifacts for this run in one API call ───────────
          # Retrieve artifact names and ids in a single paginated request to
          # minimise GitHub API traffic; classify them per image below.
          ALL_ARTIFACTS=""
          if ALL_ARTIFACTS="$(gh api --paginate \
            "repos/${GITHUB_REPO}/actions/runs/${RUN_ID}/artifacts?per_page=100" \
            --jq '.artifacts[]
                  | [.name, (.id | tostring)]
                  | join("\t")')"; then
            API_FAILURE_COUNT=0
          else
            API_FAILURE_COUNT=$(( API_FAILURE_COUNT + 1 ))
            echo "::warning::Artifact list API call failed" \
                 "(${API_FAILURE_COUNT}/${MAX_API_FAILURES} consecutive failures)."
            if (( API_FAILURE_COUNT >= MAX_API_FAILURES )); then
              echo "::error::Artifact list API call failed ${MAX_API_FAILURES}" \
                   "times in a row; aborting merge loop." \
                   "To retry: click 'Re-run failed jobs' on this workflow run's summary page."
              exit 1
            fi
            sleep "${POLL_INTERVAL_SECONDS}"
            continue
          fi

          # ── Count new build-done markers (per version, shared across stages) ─
          # Format: "build-done-a{ATTEMPT}-{VERSION}-{platform_key}"
          # Only markers for the current run attempt are considered; the prefix
          # filter "build-done-a${GITHUB_RUN_ATTEMPT}-" ensures markers from
          # any other attempt are never even parsed.  GITHUB_RUN_ATTEMPT is a
          # default GitHub Actions environment variable set automatically on
          # every runner — no API call needed.
          #
          # On a partial re-run ("Re-run failed jobs"), successful jobs from the
          # previous attempt are not re-run and therefore do not upload new
          # current-attempt build-done markers.  In that case
          # VER_BUILD_DONE[$version] will never reach TOTAL_PLATFORMS for the
          # version; the merge still completes because the image's completion
          # check has a second condition: digest_merged >= TOTAL_PLATFORMS.
          # Non-re-run platforms match the already-live fast-path (their
          # existing digest artifacts are matched against the seeded Docker Hub
          # manifest) so they are counted as merged without a new imagetools
          # create, and digest_merged reaches TOTAL_PLATFORMS normally.
          while IFS=$'\t' read -r aname _; do
            [[ -z "${aname}" ]] && continue
            [[ "${aname}" == "build-done-a${GITHUB_RUN_ATTEMPT}-"* ]] || continue
            [[ -n "${BUILD_DONE_SEEN[$aname]+set}" ]] && continue

            # Parse: build-done-a{attempt}-{version}-{platform_key}
            # (attempt already validated by the prefix filter above)
            _bd_verplat="${aname#"build-done-a${GITHUB_RUN_ATTEMPT}-"}"
            [[ -n "${_bd_verplat}" && "${_bd_verplat}" == *"-"* ]] || continue

            for version in "${!VER_BUILD_DONE[@]}"; do
              if [[ "${_bd_verplat}" == "${version}-"* ]]; then
                BUILD_DONE_SEEN[$aname]=1
                VER_BUILD_DONE[$version]=$(( VER_BUILD_DONE[$version] + 1 ))
                echo "  Build-done marker: ${aname}" \
                     "(${VER_BUILD_DONE[$version]}/${TOTAL_PLATFORMS} for v${version})"
                break
              fi
            done
          done <<< "${ALL_ARTIFACTS}"

          # ── Seed unseeded images ──────────────────────────────────────────
          # Images with a non-empty cached state file were already marked
          # pre-seeded during init and will not appear here.  This block only
          # handles images whose cache was empty (first push or cold cache).
          #
          # Use docker buildx imagetools inspect to read the existing manifest
          # and populate the platform-digest state file.
          #
          # If the tag does not exist → empty state (first push).
          # If inspect fails → leave the image unseeded and defer
          # imagetools create until seeding succeeds later.
          _unseeded=()
          for vs in "${VERSIONS_STAGES[@]}"; do
            key="${vs%%:*}:${vs##*:}"
            [[ "${IMG_SEEDED[$key]}" == "false" ]] && _unseeded+=("${vs}")
          done

          if [[ ${#_unseeded[@]} -gt 0 ]]; then
            echo "Seeding platform-digest state from existing manifests..."
            for vs in "${_unseeded[@]}"; do
              version="${vs%%:*}"
              stage="${vs##*:}"
              key="${version}:${stage}"
              IMAGE_SEED="${REPO}:${version}-${stage}${TAG_SUFFIX}"

              _seed_status=""  # "ok" | "not_found" | "error"
              _inspect_out=""

              # ── imagetools inspect ────────────────────────────────────────────
              # A single non-raw imagetools inspect handles both multi-platform
              # manifests (sub-entries with Platform and Digest fields) and
              # single-platform manifests (top-level Platform and Digest fields).
              if [[ -z "${_seed_status}" ]]; then
                seed_stderr="$(mktemp)"
                if _inspect_out="$(docker buildx imagetools inspect \
                                     "${IMAGE_SEED}" 2>"${seed_stderr}")"; then
                  _seed_status="ok"
                  echo "  ${IMAGE_SEED}: fetched manifest (imagetools inspect)."
                else
                  _inspect_out=""
                  if grep -qi \
                       "not found\|manifest unknown\|no such manifest\|does not exist\|404" \
                       "${seed_stderr}"; then
                    _seed_status="not_found"
                  else
                    seed_err="$(cat "${seed_stderr}" 2>/dev/null || true)"
                    echo "::warning::${IMAGE_SEED}: imagetools inspect failed" \
                         "(${seed_err:-unknown error})."
                    _seed_status="error"
                  fi
                fi
                rm -f "${seed_stderr}"
              fi

              # ── Handle inspect result ───────────────────────────────────
              _seeding_succeeded=true
              case "${_seed_status}" in
                ok)
                  # Fresh manifest obtained; rewrite state file from it.
                  # Parse non-raw imagetools inspect text with awk.  A single
                  # non-raw inspect provides Platform and Digest fields for both
                  # multi-platform manifests (as indented sub-manifest entries)
                  # and single-platform manifests (as top-level fields) —
                  # no second inspect call required.
                  > "${IMG_PLATFORM_DIGESTS[$key]}"
                  while IFS=$'\t' read -r _pf_plat _pf_digest; do
                      IFS='/' read -r _p_os _p_arch _p_var <<< "${_pf_plat}"
                      # Skip attestation / unknown-platform entries.
                      [[ "${_p_os}" == "unknown" || "${_p_arch}" == "unknown" ]] && continue
                      # Skip entries with empty digest, os, or architecture.
                      [[ -n "${_pf_digest}" && -n "${_p_os}" && -n "${_p_arch}" ]] || continue
                      # Normalize platform key: strip default variants (arm64/v8,
                      # amd64/v1) so keys match build-job artifact names.
                      _normalized_plat="${_p_os}/${_p_arch}"
                      if [[ -n "${_p_var:-}" ]] && \
                         ! [[ "${_p_arch}" == "arm64" && "${_p_var}" == "v8" ]] && \
                         ! [[ "${_p_arch}" == "amd64" && "${_p_var}" == "v1" ]]; then
                        _normalized_plat="${_p_os}/${_p_arch}/${_p_var}"
                      fi
                      _pf_pkey="${_normalized_plat//\//-}"
                      printf '%s\t%s\n' "${_pf_pkey}" "${_pf_digest}" \
                        >> "${IMG_PLATFORM_DIGESTS[$key]}"
                    done < <(printf '%s' "${_inspect_out}" | awk '
                        # Multi-platform: collect indented Platform + Digest pairs
                        # per sub-manifest.  Digest and Platform may appear in
                        # either order, so each block checks whether the other
                        # field is already set and emits the pair immediately when
                        # both are available.  This avoids buffering all entries.
                        /^[[:space:]]+Name:[[:space:]]+/ {
                          # Start of a new sub-manifest block; emit any pending
                          # partial pair (should not normally occur) and reset.
                          if (entry_digest != "" && entry_platform != "") {
                            print entry_platform "\t" entry_digest
                          }
                          entry_digest = ""
                          entry_platform = ""
                          next
                        }
                        /^[[:space:]]+Digest:[[:space:]]+/ {
                          entry_digest = $2
                          if (entry_platform != "") {
                            print entry_platform "\t" entry_digest
                            entry_digest = ""
                            entry_platform = ""
                          }
                          next
                        }
                        /^[[:space:]]+Platform:[[:space:]]+/ {
                          entry_platform = $2
                          if (entry_digest != "") {
                            print entry_platform "\t" entry_digest
                            entry_digest = ""
                            entry_platform = ""
                          }
                          next
                        }
                        # Single-platform: top-level (non-indented) Digest and
                        # Platform fields.  These patterns are mutually exclusive
                        # with the indented entry_* patterns above, so entry_* and
                        # top_* can never both be non-empty at END.
                        /^Digest:[[:space:]]+/ { top_digest = $2; next }
                        /^Platform:[[:space:]]+/ { top_platform = $2; next }
                        END {
                          if (entry_digest != "" && entry_platform != "") {
                            print entry_platform "\t" entry_digest
                          }
                          if (top_digest != "" && top_platform != "") {
                            print top_platform "\t" top_digest
                          }
                        }
                      ')
                  n=$(wc -l < "${IMG_PLATFORM_DIGESTS[$key]}")
                  if [[ "${n}" -gt 0 ]]; then
                    echo "  ${IMAGE_SEED}: seeded ${n} platform(s) from existing manifest."
                  else
                    echo "::warning::${IMAGE_SEED}: could not extract platform/digest" \
                         "from manifest; starting with empty state."
                  fi
                  # Clear the probe cache so it is rebuilt fresh for the current
                  # manifest digests in this cycle's GHCR probe loop.  This
                  # mirrors how IMG_PLATFORM_DIGESTS is rewritten on every seed.
                  > "${IMG_GHCR_PROBE_FILE[$key]}"
                  ;;
                not_found)
                  # Tag doesn't exist yet — start fresh.
                  > "${IMG_PLATFORM_DIGESTS[$key]}"
                  > "${IMG_GHCR_PROBE_FILE[$key]}"
                  echo "  ${IMAGE_SEED}: no existing manifest (first push)."
                  ;;
                error)
                  # All manifest inspection methods failed; leave the image
                  # unseeded so imagetools create is deferred until seeding
                  # succeeds (or the image is pre-seeded from cache on the
                  # next run).  Setting IMG_SEEDED=true here when there is no
                  # baseline would silently drop previously-published
                  # platforms on a cold-cache run.  (Images with cached state
                  # were already pre-seeded in init and never reach this
                  # path.)
                  echo "::warning::${IMAGE_SEED}: inspect failed;" \
                       "image will remain unseeded this cycle."
                  _seeding_succeeded=false
                  ;;
              esac

              if [[ "${_seed_status}" == "ok" ]] \
                  && [[ ! -s "${IMG_PLATFORM_DIGESTS[$key]}" ]]; then
                echo "::error::${IMAGE_SEED}: manifest inspection succeeded but no baseline could be derived from the fetched manifest; refusing to continue because doing so could publish an incomplete manifest list and drop previously published platforms. Re-run later or investigate the Docker Hub manifest response."
                exit 1
              fi

              if [[ "${_seeding_succeeded}" == "true" ]]; then
                IMG_SEEDED[$key]="true"
              fi
            done
          fi

          # ── Probe GHCR for seeded platform digests ─────────────────────────────
          # For every image that is now seeded (pre-seeded from cache or newly
          # seeded this cycle), issue an authenticated HEAD to the GHCR Registry
          # API for each platform digest not yet definitively probed.
          # Results are stored in a single probe-cache file (ghcr-probe-*.txt),
          # one line per digest in the format "digest<TAB>status" where status
          # is "found" (HTTP 200) or "missing" (HTTP 404).  The cache contains
          # only digests that are currently present in IMG_PLATFORM_DIGESTS;
          # stale entries are pruned at seeding time and at startup.
          # A digest is considered already probed when any line in the cache
          # file starts with that digest (regardless of status), preventing
          # redundant HTTP requests.
          # HTTP 200: writes "digest<TAB>found".  REFS construction uses this to
          #   source the platform ref from GHCR instead of Docker Hub.
          # HTTP 404: writes "digest<TAB>missing" so the digest is not re-probed.
          # Transient errors: leave the digest unrecorded so the probe retries.
          # Only runs when ghcr_writable is "true" and GHCR_REPO is set.
          if [[ "${GHCR_WRITABLE}" == "true" && -n "${_ghcr_path}" ]]; then
            # Accept header for GHCR manifest HEAD requests: covers OCI and
            # Docker manifest list types so multi-arch digests are recognised.
            _ghcr_accept="application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.oci.image.manifest.v1+json,application/vnd.docker.distribution.manifest.v2+json"
            for vs in "${VERSIONS_STAGES[@]}"; do
              version="${vs%%:*}"
              stage="${vs##*:}"
              key="${version}:${stage}"
              [[ "${IMG_SEEDED[$key]}" == "true" ]] || continue
              [[ -s "${IMG_PLATFORM_DIGESTS[$key]}" ]] || continue
              _ghcr_probe_img="${REPO}:${version}-${stage}${TAG_SUFFIX}"
              while IFS=$'\t' read -r _pkey _pdigest; do
                [[ -n "${_pkey}" && -n "${_pdigest}" ]] || continue
                # Skip digests already probed (any status: found or missing).
                { grep -qxF "${_pdigest}"$'\t''found'   "${IMG_GHCR_PROBE_FILE[$key]}" \
                    2>/dev/null || \
                  grep -qxF "${_pdigest}"$'\t''missing' "${IMG_GHCR_PROBE_FILE[$key]}" \
                    2>/dev/null; } && continue
                # Refresh the GHCR Bearer token when expired.
                if ! get_ghcr_inspect_token; then
                  echo "  ${_ghcr_probe_img}: GHCR token unavailable;" \
                       "skipping GHCR probe for ${_pkey//-/\/}."
                  continue
                fi
                _ghcr_http_code="$(curl -sI --connect-timeout 10 --max-time 30 \
                  -H "Authorization: Bearer ${GHCR_BEARER}" \
                  -H "Accept: ${_ghcr_accept}" \
                  -o /dev/null -w "%{http_code}" \
                  "https://ghcr.io/v2/${_ghcr_path}/manifests/${_pdigest}" \
                  2>/dev/null)" || true
                case "${_ghcr_http_code:-000}" in
                  200)
                    printf '%s\tfound\n' "${_pdigest}" >> "${IMG_GHCR_PROBE_FILE[$key]}"
                    echo "  ${_ghcr_probe_img}: ${_pkey//-/\/} confirmed on GHCR."
                    ;;
                  404)
                    printf '%s\tmissing\n' "${_pdigest}" >> "${IMG_GHCR_PROBE_FILE[$key]}"
                    echo "  ${_ghcr_probe_img}: ${_pkey//-/\/} not on GHCR."
                    ;;
                  *)
                    echo "  ${_ghcr_probe_img}: GHCR probe for ${_pkey//-/\/}" \
                         "returned HTTP ${_ghcr_http_code:-000}; will retry."
                    ;;
                esac
              done < "${IMG_PLATFORM_DIGESTS[$key]}"
            done
          fi

          # ── Process each pending image ─────────────────────────────────
          CYCLE_DIR="${WORK_DIR}/cycle"
          rm -rf "${CYCLE_DIR}"
          mkdir -p "${CYCLE_DIR}"

          # Tracks whether any imagetools create was deferred (waiting for
          # seeding) or failed in this cycle so the post-cycle elapsed-time
          # check can warn and enforce MAX_WAIT when progress is blocked.
          _any_create_deferred=false
          # Tracks whether any deferral was specifically because seeding had
          # not yet completed and there was no cached baseline.
          _any_seeding_deferred=false
          # Tracks whether any imagetools create command exited non-zero this
          # cycle.
          _any_create_failed=false

          for vs in "${VERSIONS_STAGES[@]}"; do
            version="${vs%%:*}"
            stage="${vs##*:}"
            key="${version}:${stage}"
            safe_key="${key//:/_}"
            IMAGE="${REPO}:${version}-${stage}${TAG_SUFFIX}"
            ARTIFACT_PREFIX="digests-${version}-${stage}-"
            DIGEST_KEY="${version}-${stage}"

            [[ "${IMG_DONE[$key]}" == "true" ]] && continue

            # Per-image flag: set when imagetools create is skipped
            # (quota exhausted) or fails in this cycle.  Prevents the
            # completion check from marking the image done so that the
            # next cycle can retry the create.
            _img_create_deferred=false

            build_done="${VER_BUILD_DONE[$version]}"
            img_dir="${CYCLE_DIR}/${safe_key}"
            mkdir -p "${img_dir}/platforms"

            # ── Collect newly available platform digests for this image ──
            # "New" means not yet in this image's PROCESSED file.
            # We do NOT add artifacts to PROCESSED here; that happens only
            # after a successful imagetools create so that a failed or
            # rate-limited inspect cycle does not permanently lose the digest.
            # Use parallel arrays to avoid encoding issues (digests contain
            # colons, e.g. "sha256:abc..." which would break :-delimited strings).
            # Processed artifacts are tracked as "name:id" so that a re-uploaded
            # artifact (same name, new id from overwrite:true reruns) is recognised
            # as a new artifact and re-merged rather than silently skipped.
            NEW_PKEYS=()         # platform keys,  e.g. linux-amd64
            NEW_PDIGESTS=()      # full digest refs, e.g. sha256:abc…
            NEW_ARTIFACT_IDS=()  # artifact ids, matching indices with NEW_PKEYS

            while IFS=$'\t' read -r aname aid; do
              [[ -z "${aname}" ]] && continue
              [[ "${aname}" == "${ARTIFACT_PREFIX}"* ]] || continue
              grep -qxF "${aname}:${aid}" "${IMG_PROCESSED[$key]}" 2>/dev/null && continue

              platform_key="${aname#"${ARTIFACT_PREFIX}"}"   # e.g. linux-amd64
              dl_dir="${img_dir}/dl/${aname}"
              mkdir -p "${dl_dir}"

              # Download the artifact zip.  On any failure (network, API rate
              # limit, corrupt zip) log a warning and leave the artifact
              # unprocessed — it will be retried next polling cycle.
              DOWNLOAD_OK=false
              if gh api \
                   "repos/${GITHUB_REPO}/actions/artifacts/${aid}/zip" \
                   > "${dl_dir}/artifact.zip" \
                 && unzip -q "${dl_dir}/artifact.zip" -d "${dl_dir}"
              then
                DOWNLOAD_OK=true
              fi

              if [[ "${DOWNLOAD_OK}" == "true" ]]; then
                digest_file="${dl_dir}/${platform_key}.json"
                if [[ -f "${digest_file}" ]]; then
                  DIGEST="$(jq -r \
                    --arg k "${DIGEST_KEY}" '.[$k] // ""' "${digest_file}")"
                  if [[ -n "${DIGEST}" ]]; then
                    # If seeding is complete and this exact platform+digest is
                    # already live on Docker Hub, count the platform as merged
                    # without pushing again.  This avoids redundant imagetools
                    # create calls (and the associated pull-quota cost) when a
                    # manifest that was fully merged in a previous run or a
                    # previous attempt is re-encountered on re-run.  The cached
                    # state only ever contains digests that were either already
                    # in Docker Hub at seed time or were written by a successful
                    # imagetools create, so a cache-fallback seed is equally
                    # reliable for this check.
                    if [[ "${IMG_SEEDED[$key]}" == "true" ]] && \
                       grep -qxF "${platform_key}"$'\t'"${DIGEST}" \
                         "${IMG_PLATFORM_DIGESTS[$key]}" 2>/dev/null; then
                      echo "  [${IMAGE}] ${platform_key//-/\/}: already live" \
                           "(digest matches existing manifest); skipping."
                      echo "${aname}:${aid}" >> "${IMG_PROCESSED[$key]}"
                      if ! grep -qxF "${platform_key}" \
                             "${IMG_MERGED_PKEYS[$key]}" 2>/dev/null; then
                        echo "${platform_key}" >> "${IMG_MERGED_PKEYS[$key]}"
                        IMG_DIGEST_MERGED[$key]=$(( IMG_DIGEST_MERGED[$key] + 1 ))
                      fi
                    else
                      NEW_PKEYS+=("${platform_key}")
                      NEW_PDIGESTS+=("${DIGEST}")
                      NEW_ARTIFACT_IDS+=("${aid}")
                    fi
                  elif [[ "${build_done}" -ge "${TOTAL_PLATFORMS}" ]]; then
                    echo "::warning::${aname}: key '${DIGEST_KEY}' empty;" \
                         "all builds complete, skipping."
                    echo "${aname}:${aid}" >> "${IMG_PROCESSED[$key]}"
                  else
                    echo "::warning::${aname}: key '${DIGEST_KEY}' empty;" \
                         "will retry next cycle."
                  fi
                elif [[ "${build_done}" -ge "${TOTAL_PLATFORMS}" ]]; then
                  echo "::warning::${aname}: missing ${platform_key}.json;" \
                       "all builds complete, skipping."
                  echo "${aname}:${aid}" >> "${IMG_PROCESSED[$key]}"
                else
                  echo "::warning::${aname}: missing ${platform_key}.json;" \
                       "will retry next cycle."
                fi
              else
                echo "  Download failed for ${aname}; will retry next cycle."
              fi
            done <<< "${ALL_ARTIFACTS}"

            # ── Skip permanently inaccessible artifacts once all builds done ─
            # Only mark an artifact as permanently skipped if it was NOT
            # successfully downloaded this cycle (i.e. its platform_key is not
            # in NEW_PKEYS).  Artifacts that were just downloaded but whose
            # imagetools create has not yet succeeded must not be marked here —
            # they are still in NEW_PKEYS and must remain unprocessed so they
            # can be retried if imagetools create fails (e.g. Docker rate limit).
            if [[ "${build_done}" -ge "${TOTAL_PLATFORMS}" ]]; then
              # Build a set of platform keys downloaded this cycle for O(1) lookup.
              declare -A _new_pkeys_set=()
              for _k in "${NEW_PKEYS[@]+"${NEW_PKEYS[@]}"}"; do
                _new_pkeys_set["${_k}"]=1
              done
              while IFS=$'\t' read -r aname aid; do
                [[ -z "${aname}" ]] && continue
                [[ "${aname}" == "${ARTIFACT_PREFIX}"* ]] || continue
                grep -qxF "${aname}:${aid}" "${IMG_PROCESSED[$key]}" 2>/dev/null && continue
                pkey_skip="${aname#"${ARTIFACT_PREFIX}"}"
                # Skip if already queued for merge this cycle (download succeeded).
                [[ -v _new_pkeys_set["${pkey_skip}"] ]] && continue
                echo "::warning::${aname}: all builds done but cannot be" \
                     "downloaded; skipping."
                echo "${aname}:${aid}" >> "${IMG_PROCESSED[$key]}"
              done <<< "${ALL_ARTIFACTS}"
              unset _new_pkeys_set
            fi

            # ── Merge new platforms into the Docker Hub tag ───────────────
            # Strategy: the IMG_PLATFORM_DIGESTS state file holds every
            # platform digest that was present in the existing manifest at
            # startup (seeded once before the poll loop) plus every platform
            # successfully pushed in this run so far.  For each new batch we:
            #   1. Build a temp map = state file + new digests (new wins on
            #      collision, i.e. when a platform is being rebuilt).
            #   2. Call imagetools create with all refs from the temp map.
            #   3. On success: promote the temp map to the state file and
            #      record the artifacts as processed.
            # No per-cycle inspect is needed — within-run state is always
            # up-to-date and cross-run state was captured at startup.
            if [[ ${#NEW_PKEYS[@]} -gt 0 ]]; then
              # If this image has not yet been seeded from the existing manifest
              # and the state file has no cached baseline, creating the manifest
              # now would publish only the newly built platforms and silently
              # drop any platforms that already exist for this tag.  Defer until
              # seeding has completed or a non-empty cached state is confirmed.
              if [[ "${IMG_SEEDED[$key]}" != "true" ]] && \
                 [[ ! -s "${IMG_PLATFORM_DIGESTS[$key]}" ]]; then
                echo "  [${IMAGE}] Seeding not yet complete and no cached baseline;" \
                     "deferring imagetools create to avoid dropping existing platforms."
                _img_create_deferred=true
                _any_create_deferred=true
                _any_seeding_deferred=true
                continue
              fi
              echo "Merging ${#NEW_PKEYS[@]} new platform(s) into ${IMAGE}..."

              # Build temp map: start from current state, add/replace new digests
              REFS_MAP="${img_dir}/refs_map.txt"
              cp "${IMG_PLATFORM_DIGESTS[$key]}" "${REFS_MAP}"
              for i in "${!NEW_PKEYS[@]}"; do
                pkey="${NEW_PKEYS[$i]}"
                pdigest="${NEW_PDIGESTS[$i]}"
                # Remove stale entry for this platform key (rebuild scenario),
                # using awk for safe fixed-string matching on the key field.
                awk -v k="${pkey}" -F'\t' '$1 != k' "${REFS_MAP}" > "${img_dir}/map_tmp.txt" || true
                printf '%s\t%s\n' "${pkey}" "${pdigest}" >> "${img_dir}/map_tmp.txt"
                mv "${img_dir}/map_tmp.txt" "${REFS_MAP}"
                echo "  [${IMAGE}] ${pkey//-/\/}: ${pdigest}"
              done

              # Collect REFS from every entry in the temp map.
              # - Newly-built platforms (in NEW_PKEYS): use GHCR_REPO when
              #   ghcr_writable is true — those digests were pushed to GHCR by
              #   the build job.
              # - Seeded/existing platforms: use GHCR_REPO when the digest is
              #   confirmed present on GHCR (recorded as "digest<TAB>found" in
              #   IMG_GHCR_PROBE_FILE by the per-cycle seeding probe); fall back
              #   to REPO (Docker Hub) otherwise (e.g. built before GHCR
              #   dual-push was introduced).
              declare -A _new_pkeys_for_refs=()
              for _npk in "${NEW_PKEYS[@]+"${NEW_PKEYS[@]}"}"; do
                _new_pkeys_for_refs["${_npk}"]=1
              done
              REFS=()
              while IFS=$'\t' read -r pkey pdigest; do
                [[ -n "${pkey}" && -n "${pdigest}" ]] || continue
                if [[ "${GHCR_WRITABLE}" == "true" && -n "${GHCR_REPO}" ]] \
                   && { [[ -v "_new_pkeys_for_refs[${pkey}]" ]] || \
                        grep -qxF "${pdigest}"$'\t''found' \
                          "${IMG_GHCR_PROBE_FILE[$key]}" 2>/dev/null; }; then
                  REFS+=("${GHCR_REPO}@${pdigest}")
                else
                  REFS+=("${REPO}@${pdigest}")
                fi
              done < "${REFS_MAP}"
              unset _new_pkeys_for_refs

              if [[ ${#REFS[@]} -gt 0 ]]; then
                _create_err_file="$(mktemp)"
                if docker buildx imagetools create \
                     --tag "${IMAGE}" "${REFS[@]}" 2>"${_create_err_file}"; then
                  rm -f "${_create_err_file}"
                  echo "  Updated ${IMAGE} with ${#REFS[@]} platform ref(s)."
                  # Promote temp map to the persistent state file
                  cp "${REFS_MAP}" "${IMG_PLATFORM_DIGESTS[$key]}"
                  # ── Mark these artifacts as processed ────────────────
                  # Only done here, after a successful create, so that a
                  # failed create in a prior cycle is retried.
                  # Record "name:id" so that if a build is retried and the
                  # artifact is re-uploaded (same name, new id via
                  # overwrite:true), the updated artifact is recognised as
                  # new and its digest is re-merged.
                  for i in "${!NEW_PKEYS[@]}"; do
                    echo "${ARTIFACT_PREFIX}${NEW_PKEYS[$i]}:${NEW_ARTIFACT_IDS[$i]}" \
                      >> "${IMG_PROCESSED[$key]}"
                    # Only increment the merged-platform count if this
                    # platform_key has not been counted before.  A retried
                    # build re-uploads the artifact with the same platform_key
                    # but a new artifact id; without this guard the counter
                    # would exceed TOTAL_PLATFORMS and mark the image done
                    # prematurely.
                    pkey="${NEW_PKEYS[$i]}"
                    if ! grep -qxF "${pkey}" "${IMG_MERGED_PKEYS[$key]}" 2>/dev/null; then
                      echo "${pkey}" >> "${IMG_MERGED_PKEYS[$key]}"
                      IMG_DIGEST_MERGED[$key]=$(( IMG_DIGEST_MERGED[$key] + 1 ))
                    fi
                  done
                  # Record newly-pushed GHCR digests as confirmed so they
                  # are not re-probed on the next run.  The build job pushed
                  # them to GHCR, so we know they are present there; a probe
                  # would only confirm what we already know.
                  if [[ "${GHCR_WRITABLE}" == "true" && -n "${GHCR_REPO}" ]]; then
                    for i in "${!NEW_PKEYS[@]}"; do
                      _np_digest="${NEW_PDIGESTS[$i]}"
                      if ! grep -qxF "${_np_digest}"$'\t''found' \
                           "${IMG_GHCR_PROBE_FILE[$key]}" 2>/dev/null; then
                        printf '%s\tfound\n' "${_np_digest}" \
                          >> "${IMG_GHCR_PROBE_FILE[$key]}"
                      fi
                    done
                  fi
                else
                  _create_err="$(cat "${_create_err_file}" 2>/dev/null || true)"
                  rm -f "${_create_err_file}"
                  IMG_LAST_ERROR[$key]="${_create_err}"
                  _img_create_deferred=true
                  _any_create_failed=true
                  if [[ -n "${_create_err}" ]]; then
                    echo "imagetools create failed for ${IMAGE}: ${_create_err}"
                  else
                    echo "imagetools create failed for ${IMAGE}."
                  fi
                  echo "Will retry next cycle."
                  # State file (IMG_PLATFORM_DIGESTS) is unchanged; the temp
                  # map is discarded.  New artifacts remain unprocessed so they
                  # will be retried on the next cycle.
                fi
              fi
            fi

            # ── Completion checks for this image ──────────────────────────
            digest_merged="${IMG_DIGEST_MERGED[$key]}"

            if [[ "${_img_create_deferred}" == "true" ]]; then
              # imagetools create failed this cycle; propagate flag so the
              # post-cycle elapsed-time check can enforce MAX_WAIT.
              _any_create_deferred=true
            elif [[ "${build_done}" -ge "${TOTAL_PLATFORMS}" ]]; then
              if [[ "${digest_merged}" -lt "${TOTAL_PLATFORMS}" ]]; then
                echo "::warning::Only ${digest_merged}/${TOTAL_PLATFORMS}" \
                     "platform(s) merged for ${IMAGE}; will report at end."
              fi
              IMG_DONE[$key]="true"
              echo "Image ${IMAGE} complete" \
                   "(${digest_merged}/${TOTAL_PLATFORMS} platform(s) merged)."
            elif [[ "${digest_merged}" -ge "${TOTAL_PLATFORMS}" ]]; then
              IMG_DONE[$key]="true"
              echo "All ${TOTAL_PLATFORMS} platform(s) merged for ${IMAGE}."
            fi
          done

          # ── Track create wait and enforce timeout ─────────────────────────
          # When any pending image's imagetools create was deferred (waiting for
          # seeding) or failed this cycle, fail the job when total workflow-run
          # elapsed time since run start exceeds MAX_WAIT so there is always time
          # for cleanup steps before GitHub's hard job-timeout.
          if [[ "${_any_create_deferred}" == "true" ]]; then
            _create_elapsed=$(( $(date +%s) - started_at ))
            if (( _create_elapsed >= MAX_WAIT )); then
              if [[ "${_any_seeding_deferred}" == "true" ]]; then
                echo "::error::imagetools create deferred (waiting for seeding" \
                     "to complete); total workflow-run elapsed time ${_create_elapsed}s" \
                     "exceeds MAX_WAIT. Seeding may be stalled or the" \
                     "existing manifest could not be fetched - re-run the workflow."
              fi
              if [[ "${_any_create_failed}" == "true" ]]; then
                echo "::error::One or more imagetools create operations failed;" \
                     "total workflow-run elapsed time ${_create_elapsed}s exceeds" \
                     "MAX_WAIT." \
                     "Check earlier imagetools create logs for the underlying" \
                     "failure before re-running this workflow."
              fi
              exit 1
            fi
            if [[ "${_any_seeding_deferred}" == "true" ]]; then
              echo "::warning::imagetools create deferred (waiting for seeding" \
                   "to complete; ${_create_elapsed}s elapsed)."
            fi
            if [[ "${_any_create_failed}" == "true" ]]; then
              echo "::warning::One or more imagetools create operations failed" \
                   "(${_create_elapsed}s elapsed)." \
                   "Check earlier imagetools create logs for the underlying failure."
            fi
          fi

          # ── Status summary and sleep ───────────────────────────────────
          DONE_COUNT=0
          for vs in "${VERSIONS_STAGES[@]}"; do
            version="${vs%%:*}"
            stage="${vs##*:}"
            key="${version}:${stage}"
            [[ "${IMG_DONE[$key]}" == "true" ]] && (( DONE_COUNT++ )) || true
          done

          if [[ ${DONE_COUNT} -lt ${#VERSIONS_STAGES[@]} ]]; then
            echo "Cycle ${POLL_CYCLE}:" \
                 "${DONE_COUNT}/${#VERSIONS_STAGES[@]} manifest(s) complete;" \
                 "polling again in ${POLL_INTERVAL_SECONDS}s..."
            sleep "${POLL_INTERVAL_SECONDS}"
          fi
        done

        # ── Final check: fail if any image is missing platform merges ─────────
        # When imagetools create failed, the merge loop exits with some images
        # unpushed.  Exit 1 here so the job reports failure and can be retried.
        INCOMPLETE_KEYS=()
        for vs in "${VERSIONS_STAGES[@]}"; do
          version="${vs%%:*}"
          stage="${vs##*:}"
          key="${version}:${stage}"
          digest_merged="${IMG_DIGEST_MERGED[$key]}"
          if [[ "${digest_merged}" -lt "${TOTAL_PLATFORMS}" ]]; then
            INCOMPLETE_KEYS+=("${key}")
          fi
        done
        if [[ ${#INCOMPLETE_KEYS[@]} -gt 0 ]]; then
          echo "::error::The following images were not fully merged (fewer platforms" \
               "merged than expected — check per-platform build jobs for failures):"
          for key in "${INCOMPLETE_KEYS[@]}"; do
            version="${key%%:*}"
            stage="${key##*:}"
            IMAGE="${REPO}:${version}-${stage}${TAG_SUFFIX}"
            digest_merged="${IMG_DIGEST_MERGED[$key]}"
            echo "::error::  ${IMAGE} (${digest_merged}/${TOTAL_PLATFORMS} platform(s) merged)"
            last_err="${IMG_LAST_ERROR[$key]:-}"
            if [[ -n "${last_err}" ]]; then
              # Sanitize for use in a GHA annotation: collapse newlines to spaces
              # and escape workflow-command reserved characters ('%', '\r', '\n').
              safe_err="$(printf '%s' "${last_err}" \
                | tr '\n\r' '  ' \
                | sed 's/%/%25/g')"
              echo "::error::  Last error: ${safe_err}"
            fi
          done
          echo "::error::To retry: click 'Re-run failed jobs' on this workflow run's summary page."
          exit 1
        fi

    - name: Compute digests cache key
      if: always()
      id: digests-cache-key
      shell: bash
      run: |
        # Hash the content of every state file so the cache key only changes
        # when the platform-digest state actually changes.  This avoids creating
        # a new cache entry on every run when nothing has been updated.
        digests_dir="${{ runner.temp }}/merge-manifests-digests"
        if [[ -d "$digests_dir" ]] && [[ -n "$(ls -A "$digests_dir" 2>/dev/null)" ]]; then
          hash="$(find "$digests_dir" -type f -print0 | sort -z | xargs -0 sha256sum | sha256sum | awk '{print $1}')"
          echo "key=${{ steps.cache-key-prefix.outputs.prefix }}${hash}" >> "$GITHUB_OUTPUT"
        else
          echo "key=" >> "$GITHUB_OUTPUT"
        fi

    - name: Save digests cache
      if: always() && steps.digests-cache-key.outputs.key != '' && steps.restore-cache.outputs.cache-matched-key != steps.digests-cache-key.outputs.key
      uses: actions/cache/save@v5
      with:
        path: ${{ runner.temp }}/merge-manifests-digests
        key: ${{ steps.digests-cache-key.outputs.key }}
