name: Merge per-platform manifests into multi-arch images
description: >
  After per-platform builds have completed, this action combines the amd64
  image (already live on Docker Hub under the final tag) with the arm64 image
  (staged in GHCR) into a single multi-architecture Docker Hub manifest using
  docker buildx imagetools create.

  The amd64 image is read directly from the Docker Hub final tag that the
  amd64 build job pushed.  The arm64 image is read from GHCR where the arm64
  build job staged it under "<version>-<stage><tag_suffix>-arm64-stage" tags.
  The resulting multi-arch manifest overwrites the Docker Hub final tag.

inputs:
  versions:
    description: >
      Space-separated list of PHP versions to merge (e.g. "7.4 8.0 8.1 8.2 8.3").
    required: true
  versions_base:
    description: >
      Space-separated list of PHP versions for which base-stage images were
      pushed and should be merged.
    required: true
  versions_secure:
    description: >
      Space-separated list of PHP versions for which secure-stage images were
      pushed and should be merged.
    required: true
  tag_suffix:
    description: >
      Tag suffix that was applied during the build (e.g. "" for main or "-rc"
      for the develop branch).
    required: true
  repo:
    description: Docker Hub repository (e.g. "devpanel/php").
    default: 'devpanel/php'
  dockerhub_username:
    description: Docker Hub username for image push authentication.
    required: true
  dockerhub_token:
    description: Docker Hub token for image push authentication.
    required: true
  github_token:
    description: >
      GITHUB_TOKEN for GHCR login to read arm64 staging images.
      Use secrets.GITHUB_TOKEN from the calling workflow.
    required: true
  ghcr_token:
    description: >
      Optional classic Personal Access Token with the read:packages scope.
      When provided, this token is used instead of github_token for GHCR
      login.  Required when the organisation's Actions token policy restricts
      GITHUB_TOKEN from reading packages.
    default: ''

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ inputs.dockerhub_username }}
        password: ${{ inputs.dockerhub_token }}

    - name: Compute GHCR repository (lowercase)
      id: ghcr
      shell: bash
      env:
        REPO: ${{ github.repository }}
      run: echo "repo=ghcr.io/$(echo "${REPO}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.ghcr_token || inputs.github_token }}

    - name: Merge per-platform manifests
      shell: bash
      env:
        VERSIONS:        ${{ inputs.versions }}
        VERSIONS_BASE:   ${{ inputs.versions_base }}
        VERSIONS_SECURE: ${{ inputs.versions_secure }}
        TAG_SUFFIX:      ${{ inputs.tag_suffix }}
        REPO:            ${{ inputs.repo }}
        GHCR_REPO:       ${{ steps.ghcr.outputs.repo }}
      run: |
        set -euo pipefail

        # Returns 0 if $1 appears as a whole word in the space-separated list $2.
        in_list() { case " $2 " in *" $1 "*) return 0 ;; *) return 1 ;; esac; }

        for version in $VERSIONS; do
          for stage in base secure advance; do
            # Skip base/secure stages not present in the respective push lists.
            if [[ "$stage" == "base"   ]] && ! in_list "$version" "$VERSIONS_BASE";   then continue; fi
            if [[ "$stage" == "secure" ]] && ! in_list "$version" "$VERSIONS_SECURE"; then continue; fi

            FINAL_TAG="${REPO}:${version}-${stage}${TAG_SUFFIX}"
            ARM64_STAGE="${GHCR_REPO}:${version}-${stage}${TAG_SUFFIX}-arm64-stage"

            echo "Creating multi-arch manifest: ${FINAL_TAG}"
            echo "  amd64 source: ${FINAL_TAG} (existing Docker Hub image)"
            echo "  arm64 source: ${ARM64_STAGE} (GHCR staging image)"
            # Rebuild the final tag as a manifest list combining the existing
            # amd64 image (at the final tag) and the arm64 staging image from
            # GHCR.  imagetools create accepts single-arch sources and creates
            # the manifest list automatically.
            docker buildx imagetools create -t "${FINAL_TAG}" \
              "${FINAL_TAG}" \
              "${ARM64_STAGE}"
          done
        done
