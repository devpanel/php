name: Wait for Docker Hub pull quota
description: >
  Waits until the Docker Hub pull quota has enough remaining capacity for
  all parallel build jobs.  Probes both the anonymous (IP-based, 100/6 h)
  and authenticated (account-based, 200/6 h) quotas each cycle.

  Build jobs first attempt an anonymous pre-pull of the base PHP image;
  only if that fails does the authenticated bake step consume an
  authenticated pull.  This action computes the effective number of
  authenticated pulls needed as max(0, needed_pulls − anonymous_remaining)
  so that waiting is skipped when the anonymous quota can cover all builds,
  and less conservative (and more accurate) waiting is applied when the
  anonymous quota is partially exhausted.

  Polls every 60 seconds.  Gives up after 5h30m (19800 s) to avoid
  being cancelled by the default 6 h GitHub-hosted job timeout.

inputs:
  needed_pulls:
    description: >
      Total number of Docker Hub pulls (anonymous + authenticated combined)
      needed before and by the parallel build jobs.  Pass the sum of
      build_matrix_length (one pull per build job for the base PHP image in
      the worst case where every job misses the GHCR layer cache) and
      all_versions_count (one pull per PHP version that the pre-seed action
      may need in the worst case where the codenames cache is cold).
      The action probes the anonymous (IP-based) quota first; any anonymous
      capacity reduces the effective authenticated quota requirement
      proportionally.
    required: true
  dockerhub_username:
    description: Docker Hub username for authenticating the pull-rate-limit probe.
    required: true
  dockerhub_token:
    description: Docker Hub token for authenticating the pull-rate-limit probe.
    required: true

runs:
  using: composite
  steps:
    - name: Wait for Docker Hub pull quota
      shell: bash
      env:
        DOCKERHUB_USERNAME: ${{ inputs.dockerhub_username }}
        DOCKERHUB_TOKEN: ${{ inputs.dockerhub_token }}
        NEEDED_PULLS: ${{ inputs.needed_pulls }}
      run: |
        set -euo pipefail
        needed_pulls="${NEEDED_PULLS}"
        if [[ ! "${needed_pulls}" =~ ^[0-9]+$ ]]; then
          echo "::error::Invalid value for inputs.needed_pulls: '${needed_pulls}'." \
               "It must be a non-negative integer."
          exit 1
        fi

        # Preflight: verify required tools are available.
        for _cmd in curl jq; do
          if ! command -v "${_cmd}" >/dev/null 2>&1; then
            echo "::error::Required command '${_cmd}' not found in PATH." \
                 "Ensure the runner has '${_cmd}' installed."
            exit 1
          fi
        done

        # Preflight: verify Docker Hub credentials can obtain an auth token.
        # Fail fast here rather than burning 5h30m on unresolvable credential errors.
        # Distinguish credential failures (401/403) from transient network issues.
        echo "Verifying Docker Hub credentials..."
        _pre_creds="$(umask 077; mktemp)"
        _pre_stderr="$(umask 077; mktemp)"
        printf 'machine auth.docker.io login %s password %s\n' \
          "${DOCKERHUB_USERNAME}" "${DOCKERHUB_TOKEN}" > "${_pre_creds}"
        _pre_curl_status=0
        _pre_response="$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
          --netrc-file "${_pre_creds}" \
          --write-out $'\n%{http_code}' \
          "https://auth.docker.io/token?service=registry.docker.io&scope=repository:ratelimitpreview/test:pull" \
          2>"${_pre_stderr}")" || _pre_curl_status=$?
        rm -f "${_pre_creds}"
        _pre_http_code="${_pre_response##*$'\n'}"
        _pre_json="${_pre_response%$'\n'*}"
        _pre_stderr_text="$(cat "${_pre_stderr}")"
        rm -f "${_pre_stderr}"
        _pre_token="$(printf '%s' "${_pre_json}" | jq -r '.token // ""' 2>/dev/null)" \
          || _pre_token=""
        if [[ ${_pre_curl_status} -ne 0 ]]; then
          echo "::error::Could not reach the Docker Hub auth endpoint (curl exit ${_pre_curl_status})." \
               "This may be a transient network, DNS, TLS, or timeout issue rather than invalid secrets." \
               "Details: ${_pre_stderr_text:-none}." \
               "To retry: click 'Re-run failed jobs' on this workflow run's summary page."
          exit 1
        fi
        if [[ "${_pre_http_code}" == "401" || "${_pre_http_code}" == "403" ]]; then
          echo "::error::Docker Hub authentication rejected (HTTP ${_pre_http_code})." \
               "Verify that the DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are set and valid." \
               "To retry after fixing credentials: click 'Re-run failed jobs' on this workflow run's summary page."
          exit 1
        fi
        if [[ -z "${_pre_token}" ]]; then
          echo "::error::Could not parse a Docker Hub auth token from the response (HTTP ${_pre_http_code:-unknown})." \
               "Details: ${_pre_stderr_text:-none}." \
               "To retry: click 'Re-run failed jobs' on this workflow run's summary page."
          exit 1
        fi
        echo "Docker Hub credentials verified."

        echo "Checking Docker Hub pull quota" \
             "(need ${needed_pulls} pull(s) for pre-seed and parallel build jobs)..."
        MAX_WAIT=19800  # 5h30m to stay below common 6h GitHub job timeouts
        POLL_INTERVAL=60
        elapsed=0
        while true; do
          # ── Probe authenticated quota ──────────────────────────────────────
          _creds_file="$(umask 077; mktemp)"
          printf 'machine auth.docker.io login %s password %s\n' \
            "${DOCKERHUB_USERNAME}" "${DOCKERHUB_TOKEN}" > "${_creds_file}"
          _auth_json="$(curl -sf --connect-timeout 10 --max-time 30 \
            --netrc-file "${_creds_file}" \
            "https://auth.docker.io/token?service=registry.docker.io&scope=repository:ratelimitpreview/test:pull" \
            2>/dev/null)" || _auth_json=""
          rm -f "${_creds_file}"
          _token="$(printf '%s' "${_auth_json}" | jq -r '.token // ""' 2>/dev/null)" \
            || _token=""
          _remaining=""
          _rl_http_code=""
          _rl_curl_status=0
          if [[ -n "${_token}" ]]; then
            # Fetch the rate-limit headers; capture the HTTP status code
            # separately so we can distinguish a true 2xx success from
            # 3xx redirects or network/auth failures.  curl -s (no -f)
            # never exits non-zero for HTTP errors, so the exit status
            # only reflects network/TLS failures.
            # Use --head (not -X HEAD) so curl uses proper HEAD semantics
            # and does not wait for a response body.  MITM proxies on
            # GitHub-hosted runners downgrade HTTP/2 to HTTP/1.1; with
            # -X HEAD over HTTP/1.1, curl waits for a body that never
            # arrives and always times out (exit 28), making _rl_http_code
            # unreliable.  With --head -o /dev/null, -D captures the
            # response headers, and -w writes only the HTTP code to stdout.
            _rl_tmpheaders="$(mktemp)"
            _rl_http_code="$(curl -s --connect-timeout 10 --max-time 30 \
              -H "Authorization: Bearer ${_token}" \
              --head -D "${_rl_tmpheaders}" -o /dev/null \
              -w '%{http_code}' \
              "https://registry-1.docker.io/v2/ratelimitpreview/test/manifests/latest" \
              2>/dev/null)" || { _rl_curl_status=$?; _rl_http_code=""; }
            _headers="$(cat "${_rl_tmpheaders}" 2>/dev/null || true)"
            rm -f "${_rl_tmpheaders}"
            if [[ "${_rl_http_code:0:1}" == "2" ]]; then
              # Got a 2xx response — try to parse the rate-limit header.
              _remaining="$(printf '%s' "${_headers}" \
                | grep -i '^ratelimit-remaining:' \
                | grep -oE '[0-9]+' | head -1)" || _remaining=""
              if [[ -z "${_remaining}" ]]; then
                # 2xx but no RateLimit-Remaining header → Docker Hub account
                # has no pull-rate limit (Pro / Team / Business plan).
                echo "No Docker Hub rate-limit header in response;" \
                     "assuming unlimited pull quota. Proceeding."
                break
              fi
            fi
            # If _rl_http_code is empty or non-2xx (network/auth/redirect
            # error), _remaining stays empty and we fall through to the
            # transient-failure retry below.
          fi
          if [[ -z "${_remaining}" ]]; then
            # Build a human-readable reason for the failure so the log is
            # actionable without needing to re-run with extra debug output.
            if [[ -z "${_token}" ]]; then
              _fail_detail="auth token fetch from auth.docker.io failed"
            elif [[ -z "${_rl_http_code}" ]]; then
              _fail_detail="registry-1.docker.io unreachable (curl exit ${_rl_curl_status})"
            else
              _fail_detail="registry-1.docker.io returned HTTP ${_rl_http_code}"
            fi
            if (( elapsed >= MAX_WAIT )); then
              echo "::error::Could not verify Docker Hub pull quota after ${elapsed}s (${_fail_detail})." \
                   "To retry: click 'Re-run failed jobs' on this workflow run's summary page."
              exit 1
            fi
            echo "Could not check Docker Hub pull quota (${_fail_detail})." \
                 "Retrying in ${POLL_INTERVAL}s (${elapsed}/${MAX_WAIT}s elapsed)..."
            sleep "${POLL_INTERVAL}"
            elapsed=$(( elapsed + POLL_INTERVAL ))
            continue
          fi

          # ── Probe anonymous (IP-based) quota ──────────────────────────────
          # The anonymous quota (100/6 h per egress IP, shared by all concurrent
          # runners on the same host/proxy) drives build-job pre-pulls.  If it is
          # exhausted, pre-pulls fail and bake falls back to authenticated pulls.
          # HEAD requests to ratelimitpreview/test are not counted against quota.
          _anon_json="$(curl -sf --connect-timeout 10 --max-time 30 \
            "https://auth.docker.io/token?service=registry.docker.io&scope=repository:ratelimitpreview/test:pull" \
            2>/dev/null)" || _anon_json=""
          _anon_token="$(printf '%s' "${_anon_json}" | jq -r '.token // ""' 2>/dev/null)" \
            || _anon_token=""
          _anon_remaining=""
          if [[ -n "${_anon_token}" ]]; then
            _anon_tmpheaders="$(mktemp)"
            _anon_http_code="$(curl -s --connect-timeout 10 --max-time 30 \
              -H "Authorization: Bearer ${_anon_token}" \
              --head -D "${_anon_tmpheaders}" -o /dev/null \
              -w '%{http_code}' \
              "https://registry-1.docker.io/v2/ratelimitpreview/test/manifests/latest" \
              2>/dev/null)" || _anon_http_code=""
            _anon_headers="$(cat "${_anon_tmpheaders}" 2>/dev/null || true)"
            rm -f "${_anon_tmpheaders}"
            if [[ "${_anon_http_code:0:1}" == "2" ]]; then
              _anon_remaining="$(printf '%s' "${_anon_headers}" \
                | grep -i '^ratelimit-remaining:' \
                | grep -oE '[0-9]+' | head -1)" || _anon_remaining=""
              # Empty _anon_remaining with 2xx means no anonymous rate limit.
            fi
          fi

          # ── Compute effective authenticated pulls needed ───────────────────
          # Build jobs first attempt an anonymous pre-pull; only if that fails
          # (or the anonymous quota is exhausted) does authenticated quota get
          # consumed.  If the anonymous quota covers all builds, no authenticated
          # pulls are needed for the pre-pull step.
          _effective_needed="${needed_pulls}"
          if [[ -n "${_anon_remaining}" ]]; then
            _effective_needed=$(( needed_pulls > _anon_remaining \
              ? needed_pulls - _anon_remaining : 0 ))
          fi
          _anon_display="${_anon_remaining:-unknown}"

          if (( _remaining >= _effective_needed )); then
            echo "Docker Hub pull quota: ${_remaining} authenticated remaining," \
                 "${_anon_display} anonymous remaining;" \
                 "need ${_effective_needed} authenticated (${needed_pulls} total," \
                 "${_anon_display} covered by anonymous quota); proceeding."
            break
          fi
          if (( elapsed >= MAX_WAIT )); then
            echo "::error::Docker Hub pull quota: waited ${elapsed}s but only" \
                 "${_remaining}/${_effective_needed} authenticated pull(s) available" \
                 "(${_anon_display} anonymous remaining," \
                 "${needed_pulls} total needed)." \
                 "To retry: click 'Re-run failed jobs' on this workflow run's summary page."
            exit 1
          fi
          echo "Docker Hub pull quota insufficient" \
               "(${_remaining}/${_effective_needed} authenticated available," \
               "${_anon_display} anonymous available;" \
               "need ${_effective_needed} authenticated, ${needed_pulls} total)." \
               "Waiting ${POLL_INTERVAL}s (${elapsed}/${MAX_WAIT}s elapsed)..."
          sleep "${POLL_INTERVAL}"
          elapsed=$(( elapsed + POLL_INTERVAL ))
        done
