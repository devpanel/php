name: Wait for Docker Hub pull quota
description: >
  Waits until the Docker Hub authenticated-pull quota has at least
  `needed_pulls` remaining requests.  Used by the detect job — before
  the parallel build matrix starts — so that all build jobs can proceed
  without competing for the same pool of available pulls.

  Polls every 60 seconds.  Gives up after 5h30m (19800 s) to avoid
  being cancelled by the default 6 h GitHub-hosted job timeout.

inputs:
  needed_pulls:
    description: >
      Minimum number of authenticated Docker Hub pulls required.
      Typically equal to the number of parallel build matrix jobs (one
      pull per job in the worst case where every job misses the GHCR
      layer cache).
    required: true
  dockerhub_username:
    description: Docker Hub username for authenticating the pull-rate-limit probe.
    required: true
  dockerhub_token:
    description: Docker Hub token for authenticating the pull-rate-limit probe.
    required: true

runs:
  using: composite
  steps:
    - name: Wait for Docker Hub pull quota
      shell: bash
      env:
        DOCKERHUB_USERNAME: ${{ inputs.dockerhub_username }}
        DOCKERHUB_TOKEN: ${{ inputs.dockerhub_token }}
        NEEDED_PULLS: ${{ inputs.needed_pulls }}
      run: |
        set -euo pipefail
        needed_pulls="${NEEDED_PULLS}"
        echo "Checking Docker Hub pull quota" \
             "(need ${needed_pulls} pull(s) for ${needed_pulls} parallel build job(s))..."
        MAX_WAIT=19800  # 5h30m to stay below common 6h GitHub job timeouts
        POLL_INTERVAL=60
        elapsed=0
        while true; do
          _creds_file="$(umask 077; mktemp)"
          printf 'machine auth.docker.io login %s password %s\n' \
            "${DOCKERHUB_USERNAME}" "${DOCKERHUB_TOKEN}" > "${_creds_file}"
          _auth_json="$(curl -sf --netrc-file "${_creds_file}" \
            "https://auth.docker.io/token?service=registry.docker.io&scope=repository:ratelimitpreview/test:pull" \
            2>/dev/null)" || _auth_json=""
          rm -f "${_creds_file}"
          _token="$(printf '%s' "${_auth_json}" | jq -r '.token // ""' 2>/dev/null)" \
            || _token=""
          _remaining=""
          if [[ -n "${_token}" ]]; then
            _remaining="$(curl -sf \
              -H "Authorization: Bearer ${_token}" \
              -I "https://registry-1.docker.io/v2/ratelimitpreview/test/manifests/test" \
              2>/dev/null \
              | grep -i '^ratelimit-remaining:' \
              | grep -oE '[0-9]+' | head -1)" || _remaining=""
          fi
          if [[ -z "${_remaining}" ]]; then
            echo "Could not check Docker Hub pull quota; proceeding."
            break
          fi
          if (( _remaining >= needed_pulls )); then
            echo "Docker Hub pull quota: ${_remaining} remaining" \
                 "(need ${needed_pulls}); proceeding."
            break
          fi
          if (( elapsed >= MAX_WAIT )); then
            echo "::error::Docker Hub pull quota: waited ${elapsed}s but only" \
                 "${_remaining}/${needed_pulls} pull(s) available." \
                 "To retry: click 'Re-run failed jobs' on this workflow run's summary page."
            exit 1
          fi
          echo "Docker Hub pull quota insufficient" \
               "(${_remaining}/${needed_pulls} available)." \
               "Waiting ${POLL_INTERVAL}s (${elapsed}/${MAX_WAIT}s elapsed)..."
          sleep "${POLL_INTERVAL}"
          elapsed=$(( elapsed + POLL_INTERVAL ))
        done
