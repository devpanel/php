name: Wait for Docker Hub pull quota
description: >
  Waits until the Docker Hub pull quota has enough remaining capacity for
  all parallel build jobs and the pre-seed step.

  Anonymous quota is always probed first each poll cycle.  If the anonymous
  (IP-based, 100/6 h) quota covers all needed pulls the action proceeds
  immediately without probing authenticated quota at all.  Only when the
  anonymous quota is insufficient does the action probe the authenticated
  (account-based, 200/6 h) quota.  The real number of authenticated pulls
  needed is computed as max(0, needed_pulls − anonymous_remaining) from the
  live probe value, never from a static guess.

  Polls every 60 seconds.  Gives up after 5h30m (19800 s) to avoid
  being cancelled by the default 6 h GitHub-hosted job timeout.

inputs:
  needed_pulls:
    description: >
      Worst-case total number of Docker Hub pulls (anonymous + authenticated
      combined) needed before and by the parallel build jobs.  Pass the sum
      of build_matrix_length (one pull per build job for the base PHP image
      in the worst case where every job misses the GHCR layer cache) and
      all_versions_count (one pull per PHP version that the pre-seed action
      may need in the worst case where the codenames cache is cold).
      Internally the action splits this total into an anonymous reserve
      (needed_pulls - build_matrix_length, for preseed on this runner) and
      an authenticated reserve (build_matrix_length, for build-job fallbacks
      on separate runners).  Pass inputs.build_matrix_length separately so
      the split is computed correctly.
    required: true
  dockerhub_username:
    description: Docker Hub username for authenticating the pull-rate-limit probe.
    required: true
  dockerhub_token:
    description: Docker Hub token for authenticating the pull-rate-limit probe.
    required: true
  build_matrix_length:
    description: >
      Number of parallel build matrix jobs (versions × platforms).  These jobs
      run on separate runners whose anonymous (IP-based) quota is independent of
      this job's quota, but they share the same authenticated (account-based,
      200/6 h) quota as a fallback when anonymous fails.  Pass
      steps.detect.outputs.build_matrix_length from the calling workflow.
      Defaults to 0 (no auth reservation for build jobs).
    default: '0'

runs:
  using: composite
  steps:
    - name: Wait for Docker Hub pull quota
      shell: bash
      env:
        DOCKERHUB_USERNAME: ${{ inputs.dockerhub_username }}
        DOCKERHUB_TOKEN: ${{ inputs.dockerhub_token }}
        NEEDED_PULLS: ${{ inputs.needed_pulls }}
        BUILD_MATRIX_LENGTH: ${{ inputs.build_matrix_length }}
      run: |
        set -euo pipefail
        needed_pulls="${NEEDED_PULLS}"
        if [[ ! "${needed_pulls}" =~ ^[0-9]+$ ]]; then
          echo "::error::Invalid value for inputs.needed_pulls: '${needed_pulls}'." \
               "It must be a non-negative integer."
          exit 1
        fi
        build_matrix_length="${BUILD_MATRIX_LENGTH:-0}"
        if [[ ! "${build_matrix_length}" =~ ^[0-9]+$ ]]; then
          echo "::error::Invalid value for inputs.build_matrix_length:" \
               "'${build_matrix_length}'. It must be a non-negative integer."
          exit 1
        fi

        # Preflight: verify required tools are available.
        for _cmd in curl jq; do
          if ! command -v "${_cmd}" >/dev/null 2>&1; then
            echo "::error::Required command '${_cmd}' not found in PATH." \
                 "Ensure the runner has '${_cmd}' installed."
            exit 1
          fi
        done

        # Preflight: verify Docker Hub credentials can obtain an auth token.
        # Fail fast here rather than burning 5h30m on unresolvable credential errors.
        # Distinguish credential failures (401/403) from transient network issues.
        echo "Verifying Docker Hub credentials..."
        _pre_creds="$(umask 077; mktemp)"
        _pre_stderr="$(umask 077; mktemp)"
        printf 'machine auth.docker.io login %s password %s\n' \
          "${DOCKERHUB_USERNAME}" "${DOCKERHUB_TOKEN}" > "${_pre_creds}"
        _pre_curl_status=0
        _pre_response="$(curl --silent --show-error --connect-timeout 10 --max-time 30 \
          --netrc-file "${_pre_creds}" \
          --write-out $'\n%{http_code}' \
          "https://auth.docker.io/token?service=registry.docker.io&scope=repository:ratelimitpreview/test:pull" \
          2>"${_pre_stderr}")" || _pre_curl_status=$?
        rm -f "${_pre_creds}"
        _pre_http_code="${_pre_response##*$'\n'}"
        _pre_json="${_pre_response%$'\n'*}"
        _pre_stderr_text="$(cat "${_pre_stderr}")"
        rm -f "${_pre_stderr}"
        _pre_token="$(printf '%s' "${_pre_json}" | jq -r '.token // ""' 2>/dev/null)" \
          || _pre_token=""
        if [[ ${_pre_curl_status} -ne 0 ]]; then
          echo "::error::Could not reach the Docker Hub auth endpoint (curl exit ${_pre_curl_status})." \
               "This may be a transient network, DNS, TLS, or timeout issue rather than invalid secrets." \
               "Details: ${_pre_stderr_text:-none}." \
               "To retry: click 'Re-run failed jobs' on this workflow run's summary page."
          exit 1
        fi
        if [[ "${_pre_http_code}" == "401" || "${_pre_http_code}" == "403" ]]; then
          echo "::error::Docker Hub authentication rejected (HTTP ${_pre_http_code})." \
               "Verify that the DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are set and valid." \
               "To retry after fixing credentials: click 'Re-run failed jobs' on this workflow run's summary page."
          exit 1
        fi
        if [[ -z "${_pre_token}" ]]; then
          echo "::error::Could not parse a Docker Hub auth token from the response (HTTP ${_pre_http_code:-unknown})." \
               "Details: ${_pre_stderr_text:-none}." \
               "To retry: click 'Re-run failed jobs' on this workflow run's summary page."
          exit 1
        fi
        echo "Docker Hub credentials verified."

        echo "Checking Docker Hub pull quota" \
             "(need ${needed_pulls} pull(s) for pre-seed and parallel build jobs)..."
        MAX_WAIT=19800  # 5h30m to stay below common 6h GitHub job timeouts
        POLL_INTERVAL=60
        elapsed=0

        # ── 1. Initialize credentials for authenticated token fetches ─────────
        _auth_creds="$(umask 077; mktemp)"
        printf 'machine auth.docker.io login %s password %s\n' \
          "${DOCKERHUB_USERNAME}" "${DOCKERHUB_TOKEN}" > "${_auth_creds}"
        # shellcheck disable=SC2064
        trap "rm -f ${_auth_creds}" EXIT

        # ── 2. Source shared quota helpers ────────────────────────────────────
        # Defines refresh_hub_token, hub_pull_remaining, and the convenience
        # wrappers refresh_anon_quota_token, refresh_auth_quota_token,
        # anon_quota_remaining, auth_quota_remaining.  Also initialises the
        # internal quota-probe token state and TOKEN_MAX_AGE (240 s default).
        # shellcheck source=.github/scripts/hub-quota-helpers.sh
        source "${GITHUB_WORKSPACE}/.github/scripts/hub-quota-helpers.sh"

        # ── 3. (quota probe functions defined in hub-quota-helpers.sh above) ──

        # ── 4. Calculate the number of anonymous pulls to reserve ─────────────
        # The pre-seeding step runs in THIS job on THIS runner and uses the
        # IP-based anonymous quota (100 pulls/6 h from this runner's IP).
        # Build jobs run on OTHER runners; their anonymous buckets are
        # independent of this runner's IP, so we do NOT reserve anonymous
        # quota for them here.  Reserve only the preseed pulls (= total needed
        # minus the build-job share handled by the auth reserve below).
        _anon_reserve=$(( needed_pulls > build_matrix_length \
                            ? needed_pulls - build_matrix_length \
                            : 0 ))

        # ── 5. Calculate the number of authenticated pulls to reserve ─────────
        # Build jobs share the authenticated (account-based, 200/6 h) quota
        # regardless of which runner they land on.  Each build job may fall
        # back to an authenticated pull when its anonymous pre-pull fails.
        # Reserve one authenticated slot per build job so the auth bucket is
        # not considered "available" until after every build job's potential
        # fallback has been accounted for.
        _auth_reserve=${build_matrix_length}

        while true; do

          # ── 6. Subtract available anonymous quota from the anonymous reserve;
          #       add the remainder to the authenticated pull requirement. ───────
          refresh_anon_quota_token || true
          _anon_rem="$(anon_quota_remaining)"
          if [[ "${_anon_rem}" == "unlimited" ]]; then
            _anon_display="unlimited"
            _anon_covers=${_anon_reserve}
          elif [[ -n "${_anon_rem}" ]]; then
            _anon_display="${_anon_rem}"
            _anon_covers=$(( _anon_rem < _anon_reserve ? _anon_rem : _anon_reserve ))
          else
            _anon_display="unknown"
            _anon_covers=0
          fi
          _auth_needed=$(( _auth_reserve + (_anon_reserve - _anon_covers) ))

          if (( _auth_needed == 0 )); then
            echo "Docker Hub pull quota: ${_anon_display} anonymous remaining" \
                 "covers all ${needed_pulls} needed pull(s); proceeding."
            break
          fi

          refresh_auth_quota_token "${_auth_creds}" || true
          _auth_rem="$(auth_quota_remaining)"

          if [[ "${_auth_rem}" == "unlimited" ]]; then
            echo "Docker Hub pull quota: authenticated quota is unlimited; proceeding."
            break
          fi

          if [[ -n "${_auth_rem}" ]] && (( _auth_rem >= _auth_needed )); then
            echo "Docker Hub pull quota: ${_auth_rem} authenticated remaining," \
                 "${_anon_display} anonymous remaining;" \
                 "need ${_auth_needed} authenticated (${needed_pulls} total," \
                 "${_anon_covers} covered by anonymous quota); proceeding."
            break
          fi

          # ── 7. Authenticated pull quota insufficient — wait for next cycle ───
          if (( elapsed >= MAX_WAIT )); then
            if [[ -z "${_auth_rem}" ]]; then
              echo "::error::Could not verify Docker Hub pull quota after ${elapsed}s." \
                   "To retry: click 'Re-run failed jobs' on this workflow run's summary page."
            else
              echo "::error::Docker Hub pull quota: waited ${elapsed}s but only" \
                   "${_auth_rem}/${_auth_needed} authenticated pull(s) available" \
                   "(${_anon_display} anonymous remaining," \
                   "${needed_pulls} total needed)." \
                   "To retry: click 'Re-run failed jobs' on this workflow run's summary page."
            fi
            exit 1
          fi
          if [[ -z "${_auth_rem}" ]]; then
            echo "Could not check Docker Hub pull quota (authenticated probe failed)." \
                 "Retrying in ${POLL_INTERVAL}s (${elapsed}/${MAX_WAIT}s elapsed)..."
          else
            echo "Docker Hub pull quota insufficient" \
                 "(${_auth_rem}/${_auth_needed} authenticated available," \
                 "${_anon_display} anonymous available;" \
                 "need ${_auth_needed} authenticated, ${needed_pulls} total)." \
                 "Waiting ${POLL_INTERVAL}s (${elapsed}/${MAX_WAIT}s elapsed)..."
          fi
          sleep "${POLL_INTERVAL}"
          elapsed=$(( elapsed + POLL_INTERVAL ))
        done
