name: Mirror PHP base images to GHCR

# Copies the official php:<version>-apache multi-platform manifest and all
# referenced blobs from Docker Hub into GHCR so that builds can pull the
# base image from GHCR instead of Docker Hub, reducing pull quota consumption.
#
# The mirror is stored under the nested path required for Docker BuildKit
# mirror resolution: ghcr.io/<owner>/php-base-mirror/library/php:<version>-apache.
# When a Buildx builder is configured with ghcr.io/<owner>/php-base-mirror as a
# registry mirror, BuildKit resolves docker.io/library/php:<version>-apache
# by looking up that nested path automatically.
#
# If the mirror is absent or stale the build falls back to Docker Hub
# automatically — this workflow is a best-effort quota-reduction measure only.

on:
  schedule:
    - cron: '0 4 * * *'   # daily at 04:00 UTC
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Test whether github.token (GITHUB_TOKEN) can write to the GHCR mirror
      # repository.  The job declares packages:write so this should succeed in
      # most cases.  If it fails (e.g. the package doesn't yet exist or the
      # organisation policy blocks it), fall back to GHCR_TOKEN if configured.
      - name: Check github.token GHCR write access
        id: ghcr-check
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GHCR_TOKEN_SET: ${{ secrets.GHCR_TOKEN != '' }}
          ACTOR: ${{ github.actor }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -uo pipefail
          owner_lc="$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')"
          # Probe the nested package path that is actually pushed to so the
          # write-access check covers the real target repository.
          mirror_repo="${owner_lc}/php-base-mirror/library/php"
          NETRC=$(umask 0177 && mktemp)
          trap 'rm -f "${NETRC}"' EXIT
          printf 'machine ghcr.io login %s password %s\n' "${ACTOR}" "${GH_TOKEN}" > "${NETRC}"
          TOKEN_HTTP=$(curl -s -o /dev/null -w "%{http_code}" --netrc-file "${NETRC}" \
            "https://ghcr.io/token?service=ghcr.io&scope=repository:${mirror_repo}:push" \
            2>/dev/null || echo "000")
          if [[ "${TOKEN_HTTP}" == "200" ]]; then
            echo "use_pat=false" >> "$GITHUB_OUTPUT"
          elif [[ "${GHCR_TOKEN_SET}" == "true" ]]; then
            echo "use_pat=true" >> "$GITHUB_OUTPUT"
          else
            # No PAT available; fall back to github.token (best effort).
            echo "use_pat=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate GHCR credentials for PAT auth
        if: steps.ghcr-check.outputs.use_pat == 'true'
        shell: bash
        env:
          GHCR_USER: ${{ vars.GHCR_USER }}
        run: |
          if [[ -z "${GHCR_USER}" ]]; then
            echo "::error::secrets.GHCR_TOKEN is set and github.token cannot write to GHCR, but vars.GHCR_USER is not configured. Set the GHCR_USER repository variable to the username that owns the PAT."
            exit 1
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ steps.ghcr-check.outputs.use_pat == 'true' && vars.GHCR_USER || github.actor }}
          password: ${{ steps.ghcr-check.outputs.use_pat == 'true' && secrets.GHCR_TOKEN || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute GHCR mirror repository (lowercase)
        id: mirror
        shell: bash
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          owner_lc="$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "repo=ghcr.io/${owner_lc}/php-base-mirror" >> "$GITHUB_OUTPUT"

      - name: Mirror PHP base images
        shell: bash
        env:
          MIRROR_REPO: ${{ steps.mirror.outputs.repo }}
        run: |
          set -euo pipefail
          echo "Mirroring PHP base images to ${MIRROR_REPO}..."
          mapfile -t versions < <(find . -mindepth 1 -maxdepth 1 -type d \
            | sed 's|^\./||' | grep -E '^[0-9]+\.[0-9]+$' | sort -V)
          if [[ "${#versions[@]}" -eq 0 ]]; then
            echo "::warning::No PHP version directories found; nothing to mirror."
            exit 0
          fi
          failed=0
          for ver in "${versions[@]}"; do
            src="docker.io/library/php:${ver}-apache"
            # Store the image under the nested path that BuildKit mirror
            # resolution expects: <mirror>/library/php:<ver>-apache.
            # When a Buildx builder is configured with ${MIRROR_REPO} as a
            # registry mirror, it resolves docker.io/library/php:<ver>-apache
            # by looking up this path automatically.
            mirror_path="${MIRROR_REPO}/library/php:${ver}-apache"
            echo "  ${src} → ${mirror_path}"
            if ! docker buildx imagetools create --tag "${mirror_path}" "${src}"; then
              echo "::warning::Failed to mirror ${src}; skipping."
              failed=$(( failed + 1 ))
            fi
          done
          if [[ "${failed}" -gt 0 ]]; then
            echo "::warning::${failed} image(s) could not be mirrored." \
                 "Builds will fall back to Docker Hub for those versions."
          else
            echo "All PHP base images mirrored successfully."
          fi
