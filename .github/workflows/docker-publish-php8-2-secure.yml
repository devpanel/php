name: Docker build and push PHP8.2-secure

env:
  IMAGE_TAG: ${{ secrets.DOCKERHUB_USERNAME }}/php:8.2-secure-rc

on:
  push:
    paths:
      - "8.2/secure/**"
    branches:
      - develop
  workflow_run:
    workflows: ["Docker build and push PHP8.2-base"]
    types:
      - completed
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Set env to production environment
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main' }}
        run: |
          echo "IMAGE_TAG=${{ secrets.DOCKERHUB_USERNAME }}/php:8.2-secure" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          file: ./8.2/secure/Dockerfile
          context: ./8.2/secure/
          build-args: |
            # Allow overriding upstream base image namespace; defaults to devpanel in Dockerfile
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ github.workflow }}-${{ matrix.platform }}
          cache-to: type=gha,scope=${{ github.workflow }}-${{ matrix.platform }},mode=max
          outputs: type=image,name=${{ secrets.DOCKERHUB_USERNAME }}/php,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        id: export-digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          platform="${{ matrix.platform }}"
          platform_safe="${platform//\//-}"
          echo "platform_safe=$platform_safe" >> $GITHUB_OUTPUT
          echo $digest > ${{ runner.temp }}/digests/$platform_safe.digest

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.export-digest.outputs.platform_safe }}
          path: ${{ runner.temp }}/digests/
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set env to production environment
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main' }}
        run: |
          echo "IMAGE_TAG=${{ secrets.DOCKERHUB_USERNAME }}/php:8.2-secure" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE_TAG }} \
            $(for f in *.digest; do echo "${{ secrets.DOCKERHUB_USERNAME }}/php@$(cat $f)"; done)
