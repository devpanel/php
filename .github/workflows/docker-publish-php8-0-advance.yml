name: Docker build and push PHP8.0-advance

env:
  BASE_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/php:8.0-secure-rc
  IMAGE_TAG: ${{ secrets.DOCKERHUB_USERNAME }}/php:8.0-advance-rc

on:
  push:
    paths:
      - "8.0/advance/**"
    branches:
      - main
      - develop
  workflow_run:
    workflows: ["Docker build and push PHP8.0-secure"]
    types:
      - completed
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Checkout repository
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if upstream paths changed
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              echo "should-run=true" >> $GITHUB_OUTPUT
            else
              CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" -- "8.0/base/" "8.0/secure/" 2>/dev/null || true)
              if [[ -n "$CHANGED" ]]; then
                echo "should-run=false" >> $GITHUB_OUTPUT
              else
                echo "should-run=true" >> $GITHUB_OUTPUT
              fi
            fi
          else
            echo "should-run=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: pre-check
    permissions:
      contents: read
    if: ${{ needs.pre-check.outputs.should-run == 'true' && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Set env to production environment
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main' }}
        run: |
          echo "BASE_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/php:8.0-secure" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          file: ./8.0/advance/Dockerfile
          context: ./8.0/advance/
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ github.workflow }}-${{ matrix.platform }}
          cache-to: type=gha,scope=${{ github.workflow }}-${{ matrix.platform }},mode=max
          outputs: type=image,name=${{ secrets.DOCKERHUB_USERNAME }}/php,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        id: export-digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          platform="${{ matrix.platform }}"
          platform_safe="${platform//\//-}"
          echo "platform_safe=$platform_safe" >> $GITHUB_OUTPUT
          echo $digest > ${{ runner.temp }}/digests/$platform_safe.digest

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.export-digest.outputs.platform_safe }}
          path: ${{ runner.temp }}/digests/
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.result == 'success' }}
    steps:
      - name: Set env to production environment
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main' }}
        run: |
          echo "IMAGE_TAG=${{ secrets.DOCKERHUB_USERNAME }}/php:8.0-advance" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE_TAG }} \
            $(for f in *.digest; do echo "${{ secrets.DOCKERHUB_USERNAME }}/php@$(cat $f)"; done)
