name: Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install yamllint
        run: pip install --quiet yamllint

      - name: Run YAML lint
        run: bash tests/lint-yaml.sh

  lint-shell:
    name: Lint Shell
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck

      - name: Run shell lint
        run: bash tests/lint-shell.sh

  lint-dockerfile:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Run Dockerfile lint
        run: bash tests/lint-dockerfile.sh

  # Detect PHP versions to test, compute the lowercase GHCR repo name, and
  # pre-seed build downloads for ALL detected versions at once.  Running
  # preseed here (rather than in every parallel build job) means:
  #   • The codename-detection cache is saved exactly once, avoiding the
  #     "cache already exists" warnings that occur when N jobs compete.
  #   • ALL versions are visible to preseed, so the newest PHP version's
  #     codename becomes the primary tier and older codenames (e.g. Buster
  #     for PHP 7.4, Bullseye for PHP 8.0) receive proper GLIBC compatibility
  #     checking and get a downgraded code-server when the latest one does not
  #     work on their glibc.  When preseed only sees a single old version it
  #     designates that codename as primary and skips the compatibility check,
  #     causing the GLIBC_2.34 error seen in CI.
  # The bake-overrides JSON is uploaded as a workflow artifact so each
  # parallel build job can download it without re-running preseed.
  detect:
    name: Detect versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      versions:          ${{ steps.versions.outputs.versions }}
      has_versions:      ${{ steps.versions.outputs.has_versions }}
      ghcr_repo:         ${{ steps.ghcr.outputs.repo }}
      preseed_cache_key: ${{ steps.preseed.outputs.preseed_cache_key }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute GHCR repository (lowercase)
        id: ghcr
        env:
          REPO: ${{ github.repository }}
        run: echo "repo=ghcr.io/$(echo "${REPO}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Detect PHP versions for build test
        id: versions
        run: |
          versions_str=$(bash tests/detect-versions.sh | sort -V | tr '\n' ' ' | sed 's/ $//')
          versions_json=$(printf '%s\n' $versions_str | jq -R -s -c '[split("\n")[] | select(length > 0)]')
          echo "versions=${versions_json}" >> "$GITHUB_OUTPUT"
          echo "versions_str=${versions_str}" >> "$GITHUB_OUTPUT"
          if [[ -n "${versions_str}" ]]; then
            echo "has_versions=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_versions=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pre-seed build downloads
        id: preseed
        if: steps.versions.outputs.has_versions == 'true'
        uses: ./.github/actions/preseed-downloads
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          versions: ${{ steps.versions.outputs.versions_str }}

      - name: Upload preseed bake overrides
        if: steps.versions.outputs.has_versions == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: preseed-bake-overrides
          path: ${{ steps.preseed.outputs.bake_overrides_file }}
          retention-days: 1

  # One job per PHP version, all on linux/amd64.  Runs after lints and
  # verification pass and after the detect job has produced the version list.
  build:
    name: Build and test PHP ${{ matrix.version }}
    runs-on: ubuntu-latest
    needs: [lint-yaml, lint-shell, lint-dockerfile, verify-extension, verify-code-server, detect]
    if: needs.detect.outputs.has_versions == 'true'
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.detect.outputs.versions) }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Restore the preseed artifacts cache that the detect job populated.
      # The cache key matches the one written by the preseed-downloads action
      # so the restore always hits when the detect job succeeded.
      - name: Restore preseed artifacts cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/preseed-artifacts
          key: preseed-${{ needs.detect.outputs.preseed_cache_key }}

      # Download the bake-overrides JSON generated by the detect job's preseed
      # run.  It contains the correct code-server / Copilot Chat versions and
      # SHA256 digests for every detected Debian codename, including the
      # downgraded versions needed for older codenames (Buster / Bullseye).
      - name: Download preseed bake overrides
        uses: actions/download-artifact@v4
        with:
          name: preseed-bake-overrides
          path: ${{ runner.temp }}

      # Assemble the flat pre-downloaded/ directory that build-dockerfile.sh
      # passes to Docker as the 'downloads' named context.  The preseed cache
      # contains one subdirectory per Debian codename; copy the unique .deb
      # and .vsix files (deduplicated by filename) to the expected layout.
      - name: Assemble pre-downloaded directory
        id: preseed-dir
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/build-downloads/pre-downloaded"
          if [ -d "$RUNNER_TEMP/preseed-artifacts" ]; then
            while IFS= read -r f; do
              dst="$RUNNER_TEMP/build-downloads/pre-downloaded/$(basename "$f")"
              [ -e "$dst" ] || cp "$f" "$dst"
            done < <(find "$RUNNER_TEMP/preseed-artifacts" \( -name "*.deb" -o -name "*.vsix" \))
          fi
          echo "downloads_dir=$RUNNER_TEMP/build-downloads" >> "$GITHUB_OUTPUT"

      - name: Build PHP images
        env:
          CACHE_FROM_ENABLED:   true
          GHCR_REPO:            ${{ needs.detect.outputs.ghcr_repo }}
          PLATFORMS:            linux/amd64
          DOWNLOADS_DIR:        ${{ steps.preseed-dir.outputs.downloads_dir }}
          BAKE_OVERRIDES_FILE:  ${{ runner.temp }}/preseed-bake-overrides.json
        run: bash tests/build-dockerfile.sh --version ${{ matrix.version }}

      - name: Run PHP functional tests
        run: bash tests/run-dockerfile.sh --version ${{ matrix.version }}

  verify-extension:
    name: Verify Copilot Chat VSIX
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Get pinned Copilot Chat version
        id: copilot-version
        run: |
          echo "version=$(grep -m1 '^ARG COPILOT_CHAT_VERSION=' base/Dockerfile | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Cache Copilot Chat VSIX
        id: cache-vsix
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/copilot-chat.vsix
          key: copilot-chat-vsix-${{ steps.copilot-version.outputs.version }}

      - name: Download Copilot Chat VSIX (cache miss only)
        if: steps.cache-vsix.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ steps.copilot-version.outputs.version }}"
          VSIX_URL="https://marketplace.visualstudio.com/_apis/public/gallery/publishers/GitHub/vsextensions/copilot-chat/${VERSION}/vspackage"
          echo "Downloading GitHub.copilot-chat ${VERSION} from VS Marketplace"
          curl -fsSL --compressed --retry 5 --retry-all-errors --connect-timeout 30 \
            "${VSIX_URL}" -o "$RUNNER_TEMP/copilot-chat.vsix"

      - name: Verify Copilot Chat VSIX
        run: |
          EXPECTED_SHA="$(grep -m1 '^ARG COPILOT_CHAT_VSIX_SHA256=' base/Dockerfile | cut -d= -f2)"
          if ! od -An -tx1 -N4 "$RUNNER_TEMP/copilot-chat.vsix" | tr -d ' \n' | grep -qi '^504b0304'; then
            ACTUAL_MAGIC="$(od -An -tx1 -N8 "$RUNNER_TEMP/copilot-chat.vsix" | tr -d ' \n')"
            echo "Downloaded file is not a valid ZIP (expected magic 504b0304, got: ${ACTUAL_MAGIC})"
            echo "The Marketplace may have returned a rate-limit/error page or gzip-encoded content."
            exit 1
          fi
          ACTUAL_SHA="$(sha256sum "$RUNNER_TEMP/copilot-chat.vsix" | cut -d' ' -f1)"
          echo "Computed SHA256: ${ACTUAL_SHA}"
          if [ -n "${EXPECTED_SHA}" ]; then
            echo "${EXPECTED_SHA}  $RUNNER_TEMP/copilot-chat.vsix" | sha256sum -c -
            echo "SHA256 verified."
          else
            echo "::warning::COPILOT_CHAT_VSIX_SHA256 is not set in base/Dockerfile."
            echo "::warning::Set ARG COPILOT_CHAT_VSIX_SHA256=${ACTUAL_SHA} in base/Dockerfile to enable integrity verification."
          fi

  verify-code-server:
    name: Verify code-server .deb hashes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Get pinned code-server version
        id: cs-version
        run: |
          echo "version=$(grep -m1 '^ARG CODESERVER_VERSION=' base/Dockerfile | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Cache code-server .deb files
        id: cache-debs
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/code-server-debs
          key: code-server-debs-${{ steps.cs-version.outputs.version }}

      - name: Download pinned code-server .deb files (cache miss only)
        if: steps.cache-debs.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$RUNNER_TEMP/code-server-debs"
          VERSION="${{ steps.cs-version.outputs.version }}"
          BASE_URL="https://github.com/coder/code-server/releases/download/v${VERSION}"
          for arch in amd64 arm64; do
            DEB="code-server_${VERSION}_${arch}.deb"
            echo "Downloading ${DEB}"
            curl -fsSL --retry 5 --retry-all-errors --connect-timeout 30 \
              "${BASE_URL}/${DEB}" -o "$RUNNER_TEMP/code-server-debs/${DEB}"
          done

      - name: Verify pinned code-server .deb files
        run: |
          VERSION="${{ steps.cs-version.outputs.version }}"
          SHA256_AMD64="$(grep -m1 '^ARG CODESERVER_DEB_SHA256_AMD64=' base/Dockerfile | cut -d= -f2)"
          SHA256_ARM64="$(grep -m1 '^ARG CODESERVER_DEB_SHA256_ARM64=' base/Dockerfile | cut -d= -f2)"
          for arch in amd64 arm64; do
            DEB="code-server_${VERSION}_${arch}.deb"
            ACTUAL_SHA="$(sha256sum "$RUNNER_TEMP/code-server-debs/${DEB}" | cut -d' ' -f1)"
            echo "${arch} SHA256: ${ACTUAL_SHA}"
            case "${arch}" in
              amd64) EXPECTED_SHA="${SHA256_AMD64}" ;;
              arm64) EXPECTED_SHA="${SHA256_ARM64}" ;;
            esac
            ARCH_UPPER="$(echo "${arch}" | tr '[:lower:]' '[:upper:]')"
            if [ -n "${EXPECTED_SHA}" ]; then
              echo "${EXPECTED_SHA}  $RUNNER_TEMP/code-server-debs/${DEB}" | sha256sum -c -
              echo "${arch} SHA256 verified."
            else
              echo "::warning::CODESERVER_DEB_SHA256_${ARCH_UPPER} is not set in base/Dockerfile."
              echo "::warning::Set ARG CODESERVER_DEB_SHA256_${ARCH_UPPER}=${ACTUAL_SHA} in base/Dockerfile to enable integrity verification."
            fi
          done
