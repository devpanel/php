name: Build and push Docker images

# Reusable workflow: logs in to Docker Hub and GHCR, sets up QEMU + Buildx,
# then runs docker buildx bake with the supplied version/platform inputs.

on:
  workflow_call:
    inputs:
      tag_suffix:
        description: 'Image tag suffix (e.g. "", "-rc", "-my-branch")'
        type: string
        required: true
      latest_php_version:
        description: 'Latest PHP version directory found in the repository'
        type: string
        required: true
      versions:
        description: 'Space-separated list of PHP versions to build'
        type: string
        required: true
      platforms:
        description: 'Comma-separated list of target platforms (e.g. linux/amd64,linux/arm64)'
        type: string
        required: true
      cache_from_enabled:
        description: 'Whether to read from cache (set to false for a forced full rebuild)'
        type: boolean
        default: true
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute GHCR repository (lowercase)
        id: ghcr
        run: echo "repo=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push images
        uses: docker/bake-action@v6
        env:
          TAG_SUFFIX:          ${{ inputs.tag_suffix }}
          LATEST_PHP_VERSION:  ${{ inputs.latest_php_version }}
          VERSIONS:            ${{ inputs.versions }}
          PLATFORMS:           ${{ inputs.platforms }}
          CACHE_FROM_ENABLED:  ${{ inputs.cache_from_enabled }}
          GHCR_REPO:           ${{ steps.ghcr.outputs.repo }}
        with:
          files:  docker-bake.hcl
          source: .
          push:   true
