name: Build and push Docker image

on:
  workflow_call:
    inputs:
      php_version:
        description: PHP version (e.g. 7.4, 8.2)
        required: true
        type: string
      image_type:
        description: "Image type: base, secure, or advance"
        required: true
        type: string
      image_tag:
        description: Full Docker image tag to push (e.g. devpanel/php:8.2-base-rc)
        required: true
        type: string
      base_image:
        description: Base Docker image for dependent builds (required for secure and advance)
        required: false
        type: string
        default: ""
      use_cache:
        description: Whether to use GitHub Actions cache
        required: false
        type: boolean
        default: true
      artifact_prefix:
        description: Unique prefix for artifact names within the workflow run (e.g. php74-base)
        required: true
        type: string
      latest_php_version:
        description: The highest PHP version directory in the repo, passed as LATEST_PHP_VERSION build-arg for base builds
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare build inputs
        id: prep
        run: |
          platform="${{ matrix.platform }}"
          echo "platform_safe=${platform//\//-}" >> $GITHUB_OUTPUT

          # The shared base/Dockerfile is parameterised with ARG PHP_VERSION;
          # secure and advance use their own shared Dockerfiles. Build context
          # always points to the version-specific subdirectory so COPY commands
          # resolve version-specific files (templates, scripts, drush, etc.).
          if [[ "${{ inputs.image_type }}" == "base" ]]; then
            echo "dockerfile=base/Dockerfile" >> $GITHUB_OUTPUT
          else
            echo "dockerfile=${{ inputs.image_type }}/Dockerfile" >> $GITHUB_OUTPUT
          fi

          # Build args differ by type; PHP 7.4 and 8.0 secure builds need an
          # extra flag because Debian 11 ships mod_security 2.9.3 (not 2.9.6).
          {
            echo "build_args<<EOF"
            if [[ "${{ inputs.image_type }}" == "base" ]]; then
              echo "PHP_VERSION=${{ inputs.php_version }}"
              echo "LATEST_PHP_VERSION=${{ inputs.latest_php_version }}"
              # Intentionally empty: Dockerfile resolves latest patch within
              # CODESERVER_MAJOR_VERSION. code-server is mandatory; build fails
              # if version cannot be resolved.
              echo "CODESERVER_VERSION="
            else
              echo "BASE_IMAGE=${{ inputs.base_image }}"
              if [[ "${{ inputs.image_type }}" == "secure" ]] && \
                 [[ "${{ inputs.php_version }}" == "7.4" || "${{ inputs.php_version }}" == "8.0" ]]; then
                echo "REMOVE_MULTIPART_RULE=true"
              fi
            fi
            echo "EOF"
          } >> $GITHUB_OUTPUT

          # Cache coordinates are only emitted when caching is enabled so that
          # the uncached build step receives no cache-from / cache-to values.
          if [[ "${{ inputs.use_cache }}" == "true" ]]; then
            echo "cache_from=type=gha,scope=${{ inputs.artifact_prefix }}-${platform}" >> $GITHUB_OUTPUT
            echo "cache_to=type=gha,scope=${{ inputs.artifact_prefix }}-${platform},mode=max" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest (with cache)
        id: build-cached
        if: ${{ inputs.use_cache }}
        uses: docker/build-push-action@v6
        with:
          file: ${{ steps.prep.outputs.dockerfile }}
          context: ${{ inputs.php_version }}/${{ inputs.image_type }}
          build-args: ${{ steps.prep.outputs.build_args }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          platforms: ${{ matrix.platform }}
          cache-from: ${{ steps.prep.outputs.cache_from }}
          cache-to: ${{ steps.prep.outputs.cache_to }}
          outputs: type=image,name=${{ github.repository }},push-by-digest=true,name-canonical=true,push=true

      - name: Build and push by digest (no cache)
        id: build-uncached
        if: ${{ !inputs.use_cache }}
        uses: docker/build-push-action@v6
        with:
          file: ${{ steps.prep.outputs.dockerfile }}
          context: ${{ inputs.php_version }}/${{ inputs.image_type }}
          build-args: ${{ steps.prep.outputs.build_args }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ github.repository }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build-cached.outputs.digest || steps.build-uncached.outputs.digest }}"
          echo "$digest" > ${{ runner.temp }}/digests/${{ steps.prep.outputs.platform_safe }}.digest

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ inputs.artifact_prefix }}-${{ steps.prep.outputs.platform_safe }}
          path: ${{ runner.temp }}/digests/
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions: {}
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ inputs.artifact_prefix }}-*
          merge-multiple: true

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            -t ${{ inputs.image_tag }} \
            $(for f in *.digest; do echo "${{ github.repository }}@$(cat $f)"; done)
