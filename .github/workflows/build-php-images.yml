name: Detect versions and build PHP images

# Reusable workflow: detects which PHP versions to build (and which platforms
# to target), then builds and pushes the images to Docker Hub and GHCR.
#
# When before_sha and after_sha are provided (used by the on-push workflow),
# only the PHP versions whose source files changed between those two commits
# are built.  Otherwise (used by the workflow_dispatch workflow), every
# versioned directory is built.

on:
  workflow_call:
    inputs:
      before_sha:
        description: 'Commit SHA before the push; when provided with after_sha, only changed versions are built'
        type: string
        default: ''
      after_sha:
        description: 'Commit SHA after the push; when provided with before_sha, only changed versions are built'
        type: string
        default: ''
      cache_from_enabled:
        description: 'Whether to read from cache (set to false for a forced full rebuild)'
        type: boolean
        default: true
      platforms_filter:
        description: >
          Optional comma-separated list of platforms (e.g. "linux/amd64").
          When provided, the build is restricted to platforms that appear in
          both the auto-detected list and this filter.
        type: string
        default: 'linux/amd64,linux/arm64'
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      GHCR_TOKEN:
        description: >
          Optional classic Personal Access Token with the write:packages scope.
          When provided, this token is used instead of GITHUB_TOKEN for GHCR
          login and write-access checks. Required when the organisation's Actions
          token policy restricts GITHUB_TOKEN from writing to packages.
        required: false

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag_suffix:          ${{ steps.detect.outputs.tag_suffix }}
      latest_php_version:  ${{ steps.detect.outputs.latest_php_version }}
      versions:            ${{ steps.detect.outputs.versions }}
      versions_base:       ${{ steps.detect.outputs.versions_base }}
      versions_secure:     ${{ steps.detect.outputs.versions_secure }}
      platforms:           ${{ steps.detect.outputs.platforms }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Full history is needed when before_sha/after_sha are provided so
          # that git diff can compare before_sha..after_sha.
          fetch-depth: ${{ (inputs.before_sha != '' && inputs.after_sha != '') && '0' || '1' }}

      - name: Detect versions and platforms
        id: detect
        run: |
          set -euo pipefail

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAG_SUFFIX=""
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            TAG_SUFFIX="-rc"
          else
            BRANCH="${{ github.ref_name }}"
            TAG_SUFFIX="-${BRANCH//\//-}"
          fi

          # Collect all versioned directories (numeric names), sorted by version.
          LATEST_PHP_VERSION=""
          while IFS= read -r VER; do
            LATEST_PHP_VERSION="$VER"
          done < <(find . -maxdepth 1 -mindepth 1 -type d -name '[0-9]*' \
                     | sed 's|./||' | sort -V)

          if [[ -n "${{ inputs.before_sha }}" && -n "${{ inputs.after_sha }}" ]]; then
            BEFORE="${{ inputs.before_sha }}"
            AFTER="${{ inputs.after_sha }}"

            # On a brand-new branch push the before SHA is all zeros.
            IS_NEW_BRANCH=false
            if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              IS_NEW_BRANCH=true
            fi

            # Returns 1 if any file under the given path changed, else 0.
            path_changed() {
              if $IS_NEW_BRANCH; then echo 1; return; fi
              git diff --name-only "$BEFORE" "$AFTER" -- "$1" 2>/dev/null | wc -l
            }

            # Common-directory changes affect ALL versions.
            BASE_COMMON=$(path_changed "base/")
            SECURE_COMMON=$(path_changed "secure/")
            ADVANCE_COMMON=$(path_changed "advance/")
            BAKE_CHANGED=$(path_changed "docker-bake.hcl")

            # Per-version, per-stage tracking arrays.
            # VERSIONS_BASE_ARR / VERSIONS_SECURE_ARR: versions that need that
            # stage pushed to Docker Hub (cascade: base → secure → advance).
            # VERSIONS_ADV_ARR: union — every version that needs any rebuild.
            VERSIONS_BASE_ARR=()
            VERSIONS_SECURE_ARR=()
            VERSIONS_ADV_ARR=()

            while IFS= read -r VER; do
              NEEDS_BASE=false
              NEEDS_SECURE=false
              NEEDS_ADVANCE=false

              # Common-dir / bake-file changes affect this version first.
              if [[ $BAKE_CHANGED -gt 0 || $BASE_COMMON -gt 0 ]]; then
                NEEDS_BASE=true; NEEDS_SECURE=true; NEEDS_ADVANCE=true
              elif [[ $SECURE_COMMON -gt 0 ]]; then
                NEEDS_SECURE=true; NEEDS_ADVANCE=true
              elif [[ $ADVANCE_COMMON -gt 0 ]]; then
                NEEDS_ADVANCE=true
              fi

              # Per-version changes (only checked when the common-dir check has
              # not already set the highest cascade level for this stage).
              if ! $NEEDS_BASE && [[ $(path_changed "${VER}/base/") -gt 0 ]]; then
                NEEDS_BASE=true; NEEDS_SECURE=true; NEEDS_ADVANCE=true
              fi
              if ! $NEEDS_SECURE && [[ $(path_changed "${VER}/secure/") -gt 0 ]]; then
                NEEDS_SECURE=true; NEEDS_ADVANCE=true
              fi
              if ! $NEEDS_ADVANCE && [[ $(path_changed "${VER}/advance/") -gt 0 ]]; then
                NEEDS_ADVANCE=true
              fi

              if $NEEDS_BASE;    then VERSIONS_BASE_ARR+=("$VER");    fi
              if $NEEDS_SECURE;  then VERSIONS_SECURE_ARR+=("$VER");  fi
              if $NEEDS_ADVANCE; then VERSIONS_ADV_ARR+=("$VER");     fi
            done < <(find . -maxdepth 1 -mindepth 1 -type d -name '[0-9]*' \
                       | sed 's|./||' | sort -V)

            # VERSIONS = union of all changed versions (= versions needing advance,
            # since advance cascades from every upstream change).
            VERSIONS_OUT=$(printf '%s\n' \
                "${VERSIONS_ADV_ARR[@]+"${VERSIONS_ADV_ARR[@]}"}" \
              | awk '!seen[$0]++' | tr '\n' ' ' | xargs)
            VERSIONS_BASE_OUT=$(printf '%s\n' \
                "${VERSIONS_BASE_ARR[@]+"${VERSIONS_BASE_ARR[@]}"}" \
              | awk '!seen[$0]++' | tr '\n' ' ' | xargs)
            VERSIONS_SECURE_OUT=$(printf '%s\n' \
                "${VERSIONS_SECURE_ARR[@]+"${VERSIONS_SECURE_ARR[@]}"}" \
              | awk '!seen[$0]++' | tr '\n' ' ' | xargs)
          else
            VERSIONS_OUT=$(find . -maxdepth 1 -mindepth 1 -type d -name '[0-9]*' \
                            | sed 's|./||' | sort -V | tr '\n' ' ' | xargs)
            # No SHA range — full rebuild: push all stages for all versions.
            VERSIONS_BASE_OUT="$VERSIONS_OUT"
            VERSIONS_SECURE_OUT="$VERSIONS_OUT"
          fi

          echo "tag_suffix=${TAG_SUFFIX}"                     >> "$GITHUB_OUTPUT"
          echo "latest_php_version=${LATEST_PHP_VERSION}"     >> "$GITHUB_OUTPUT"
          echo "versions=${VERSIONS_OUT}"                     >> "$GITHUB_OUTPUT"
          echo "versions_base=${VERSIONS_BASE_OUT}"           >> "$GITHUB_OUTPUT"
          echo "versions_secure=${VERSIONS_SECURE_OUT}"       >> "$GITHUB_OUTPUT"

          # If no versions were selected for build, skip platform detection/filtering.
          # The build job is already guarded on versions being non-empty.
          PLATFORMS_OUT=""
          if [[ -z "$VERSIONS_OUT" ]]; then
            echo "No PHP versions selected for build; skipping platform detection and filtering."
          else
            # Determine build platforms by inspecting every PHP base image
            # manifest and keeping only the platforms supported by all versions.
            PLATFORMS_INTERSECT=""
            while IFS= read -r VER; do
              PHP_MANIFEST=$(docker manifest inspect "php:${VER}-apache" 2>/dev/null || echo "")
              VER_PLATFORMS=""
              if [[ -n "$PHP_MANIFEST" ]]; then
                VER_PLATFORMS=$(echo "$PHP_MANIFEST" \
                  | jq -r '.manifests[].platform | select(.os=="linux") | "\(.os)/\(.architecture)\(if .variant and .variant!="" then "/"+.variant else "" end)"' \
                  | sort | tr '\n' ',' | sed 's/,$//')
              fi
              # Skip versions whose manifest is unavailable.
              [[ -z "$VER_PLATFORMS" ]] && continue
              if [[ -z "$PLATFORMS_INTERSECT" ]]; then
                PLATFORMS_INTERSECT="$VER_PLATFORMS"
              else
                # Keep only platforms present in both sets.
                PLATFORMS_INTERSECT=$(comm -12 \
                  <(echo "$PLATFORMS_INTERSECT" | tr ',' '\n' | sort) \
                  <(echo "$VER_PLATFORMS"       | tr ',' '\n' | sort) \
                  | tr '\n' ',' | sed 's/,$//')
              fi
            done < <(echo "$VERSIONS_OUT" | tr ' ' '\n' | grep -v '^$')

            # If versions were selected but no platforms were detected at all, fail with a clear error.
            if [[ -z "$PLATFORMS_INTERSECT" ]]; then
              echo "::error::Failed to detect any platforms for the selected PHP versions. 'docker manifest inspect' did not return a usable manifest for any candidate image."
              exit 1
            fi

            PLATFORMS_OUT="$PLATFORMS_INTERSECT"

            # Apply optional platforms_filter: keep detected platforms where the
            # detected entry equals or starts with a filter entry (e.g. the filter
            # value "linux/arm64" matches the manifest entry "linux/arm64/v8").
            PLATFORMS_FILTER="${{ inputs.platforms_filter }}"
            if [[ -n "$PLATFORMS_FILTER" ]]; then
              FILTERED_LIST=()
              while IFS= read -r FILTER_PLAT; do
                while IFS= read -r DETECTED_PLAT; do
                  if [[ "$DETECTED_PLAT" == "$FILTER_PLAT" || "$DETECTED_PLAT" == "$FILTER_PLAT/"* ]]; then
                    FILTERED_LIST+=("$DETECTED_PLAT")
                  fi
                done < <(echo "$PLATFORMS_OUT" | tr ',' '\n')
              done < <(echo "$PLATFORMS_FILTER" | tr ',' '\n')
              PLATFORMS_OUT=$(printf '%s\n' "${FILTERED_LIST[@]+"${FILTERED_LIST[@]}"}" \
                | sort -u | tr '\n' ',' | sed 's/,$//')
              if [[ -z "$PLATFORMS_OUT" ]]; then
                echo "::error::No detected platforms matched platforms_filter '${PLATFORMS_FILTER}'. Detected: ${PLATFORMS_INTERSECT}"
                exit 1
              fi
            fi
          fi

          echo "platforms=${PLATFORMS_OUT}" >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    if: ${{ needs.detect.outputs.versions != '' && needs.detect.outputs.latest_php_version != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute GHCR repository (lowercase)
        id: ghcr
        run: echo "repo=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Check GHCR write access
        id: check-ghcr
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          ORG=$(echo "${{ github.repository }}" | cut -d'/' -f1)

          NOTE="The build will still attempt GHCR cache writes with ignore-error=true; errors will be visible in the bake step log but will not abort the build."

          # Use a temp netrc file so credentials are not exposed as command-line arguments.
          # umask 0177 ensures the file is created with 0600 from the start (no race window).
          NETRC=$(umask 0177 && mktemp)
          # Ensure the netrc temp file is removed when this step's shell exits,
          # regardless of which code path is taken.
          trap 'rm -f "${NETRC}"' EXIT
          printf 'machine ghcr.io login %s password %s\n' "${{ github.actor }}" "${GH_TOKEN}" > "${NETRC}"

          # Capture both body and HTTP status from the token endpoint so failures are specific.
          TOKEN_RESP=$(umask 0177 && mktemp)
          TOKEN_HTTP=$(curl -s -o "${TOKEN_RESP}" -w "%{http_code}" --netrc-file "${NETRC}" \
            "https://ghcr.io/token?service=ghcr.io&scope=repository:${REPO_LC}:push" \
            2>/dev/null || echo "000")
          AUTH_JSON=$(cat "${TOKEN_RESP}" 2>/dev/null || true)
          rm -f "${TOKEN_RESP}"

          REG_TOKEN=$(printf '%s' "${AUTH_JSON}" | jq -r '.token // empty' 2>/dev/null || true)

          if [[ -z "${REG_TOKEN}" ]]; then
            case "${TOKEN_HTTP}" in
              401)
                REASON="GITHUB_TOKEN was rejected by the GHCR token endpoint (HTTP 401): the token lacks 'packages: write' permission. Verify that the calling workflow job includes 'permissions: packages: write'."
                echo "::warning title=GHCR cache write likely to fail::${REASON} ${NOTE}"
                echo "writable=false" >> "$GITHUB_OUTPUT"
                cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
          ### ❌ GHCR cache write pre-check: failed

          **Diagnosis:** GITHUB_TOKEN was rejected by the GHCR token endpoint (HTTP 401). The token lacks `packages: write` permission.

          **Fix:** Ensure the calling workflow job declares the following permission:

          ```yaml
          permissions:
            packages: write
          ```
          SUMMARY_EOF
                echo "> ℹ️ ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
                ;;
              403)
                # Probe read-only access: if a pull token succeeds, the credential is valid
                # but write access is blocked by organisation policy; otherwise the token
                # itself cannot reach the package at all.
                PULL_HTTP=$(curl -s -o /dev/null -w "%{http_code}" --netrc-file "${NETRC}" \
                  "https://ghcr.io/token?service=ghcr.io&scope=repository:${REPO_LC}:pull" \
                  2>/dev/null || echo "000")
                if [[ "${PULL_HTTP}" == "200" ]]; then
                  REASON="GITHUB_TOKEN can read from GHCR but a push token was denied (HTTP 403). The organisation's Actions token policy likely restricts package writes."
                  echo "::warning title=GHCR cache write likely to fail::${REASON} ${NOTE}"
                  echo "writable=false" >> "$GITHUB_OUTPUT"
                  cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
          ### ❌ GHCR cache write pre-check: failed

          **Diagnosis:** GITHUB_TOKEN can read from GHCR (pull-scoped token succeeded) but a push-scoped token was denied (HTTP 403). This strongly indicates the **organisation's Actions token policy** restricts GITHUB_TOKEN from writing to packages.

          **Option 1 — Organisation owner: allow workflow write permissions**
          SUMMARY_EOF
                  cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
          1. Open <https://github.com/organizations/${ORG}/settings/actions>
          2. Scroll to **Workflow permissions**
          3. Select **"Read and write permissions"** and save

          See the GitHub docs: [Setting the permissions of the GITHUB\_TOKEN for your organisation](https://docs.github.com/en/organizations/managing-organization-settings/disabling-or-limiting-github-actions-for-your-organization#setting-the-permissions-of-the-github_token-for-your-organization)

          **Option 2 — Repository admin: use a Personal Access Token (no org-owner access needed)**
          SUMMARY_EOF
                  cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
          > **Note:** A classic token is required because [fine-grained tokens do not support GitHub Packages](https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry#authenticating-to-the-container-registry).

          1. Create a [Personal Access Token (classic)](https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens#creating-a-personal-access-token-classic) with the `write:packages` scope at <https://github.com/settings/tokens>
          2. In this repository, go to **Settings → Secrets and variables → Actions**
          3. Add a new repository secret named **`GHCR_TOKEN`** and paste the PAT as the value
          4. Re-run the workflow
          SUMMARY_EOF
                  echo "> ℹ️ ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
                else
                  REASON="GITHUB_TOKEN was denied for both push (HTTP 403) and pull (HTTP ${PULL_HTTP}) scopes. The package ghcr.io/${REPO_LC} may not yet exist, may be private, or the organisation blocks all Actions token access to packages."
                  echo "::warning title=GHCR cache write likely to fail::${REASON} ${NOTE}"
                  echo "writable=false" >> "$GITHUB_OUTPUT"
                  cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
          ### ❌ GHCR cache write pre-check: failed

          **Diagnosis:** GITHUB_TOKEN was denied for both push-scoped (HTTP 403) and pull-scoped tokens. The package may not yet exist, may be private, or the organisation's token policy blocks all access.

          **Steps to investigate:**
          SUMMARY_EOF
                  cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
          1. Check whether the package exists: <https://github.com/orgs/${ORG}/packages>
          2. If the package does not yet exist, it will be created on first push — but write access must be granted first (see options below).
          3. Check the organisation's Actions settings: <https://github.com/organizations/${ORG}/settings/actions> → **Workflow permissions**

          See the GitHub docs: [Setting the permissions of the GITHUB\_TOKEN for your organisation](https://docs.github.com/en/organizations/managing-organization-settings/disabling-or-limiting-github-actions-for-your-organization#setting-the-permissions-of-the-github_token-for-your-organization)

          **To unblock the build — Repository admin: use a Personal Access Token (no org-owner access needed)**

          > **Note:** A classic token is required because [fine-grained tokens do not support GitHub Packages](https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry#authenticating-to-the-container-registry).

          1. Create a [Personal Access Token (classic)](https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens#creating-a-personal-access-token-classic) with the \`write:packages\` scope at <https://github.com/settings/tokens>
          2. In this repository, go to **Settings → Secrets and variables → Actions**
          3. Add a new repository secret named **\`GHCR_TOKEN\`** and paste the PAT as the value
          4. Re-run the workflow
          SUMMARY_EOF
                  echo "> ℹ️ ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
                fi
                ;;
              *)
                REASON="Could not obtain a GHCR push token for ghcr.io/${REPO_LC} (token endpoint returned HTTP ${TOKEN_HTTP})."
                echo "::warning title=GHCR cache write likely to fail::${REASON} ${NOTE}"
                echo "writable=false" >> "$GITHUB_OUTPUT"
                echo "❌ **GHCR cache write pre-check:** failed — ${REASON} ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
                ;;
            esac
            exit 0
          fi

          # Probe write permission: initiate (and immediately abandon) a blob upload.
          # Use a temp curl config file so the bearer token is not a command-line argument.
          CFG=$(umask 0177 && mktemp)
          printf 'header = "Authorization: Bearer %s"\n' "${REG_TOKEN}" > "${CFG}"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -K "${CFG}" \
            "https://ghcr.io/v2/${REPO_LC}/blobs/uploads/")
          rm -f "${CFG}"

          if [[ "${HTTP_STATUS}" == "202" || "${HTTP_STATUS}" == "201" ]]; then
            echo "GHCR write access confirmed for ghcr.io/${REPO_LC}."
            echo "writable=true" >> "$GITHUB_OUTPUT"
            echo "✅ **GHCR cache write pre-check:** passed — intermediate-layer caches will be written to ghcr.io/${REPO_LC}." >> "$GITHUB_STEP_SUMMARY"
          else
            case "${HTTP_STATUS}" in
              401)
                REASON="GITHUB_TOKEN was rejected when initiating a GHCR blob upload (HTTP 401): the token lacks 'packages: write' permission. Verify that the calling workflow job includes 'permissions: packages: write'."
                echo "::warning title=GHCR cache write likely to fail::${REASON} ${NOTE}"
                echo "writable=false" >> "$GITHUB_OUTPUT"
                cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
          ### ❌ GHCR cache write pre-check: failed

          **Diagnosis:** GITHUB_TOKEN was rejected when initiating a GHCR blob upload (HTTP 401). The token lacks `packages: write` permission.

          **Fix:** Ensure the calling workflow job declares the following permission:

          ```yaml
          permissions:
            packages: write
          ```
          SUMMARY_EOF
                echo "> ℹ️ ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
                ;;
              403)
                REASON="GITHUB_TOKEN was forbidden from writing to ghcr.io/${REPO_LC} (HTTP 403). The organisation's Actions token policy or the package's own access settings may block this token."
                echo "::warning title=GHCR cache write likely to fail::${REASON} ${NOTE}"
                echo "writable=false" >> "$GITHUB_OUTPUT"
                cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
          ### ❌ GHCR cache write pre-check: failed

          **Diagnosis:** GITHUB_TOKEN obtained a push-scoped token but the blob upload was still denied (HTTP 403). This can be caused by the **organisation's Actions token policy** or **package-level access restrictions**.

          **Option 1 — Organisation owner: check workflow permissions and package access**
          SUMMARY_EOF
                cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
          1. Check workflow permissions: <https://github.com/organizations/${ORG}/settings/actions> → **Workflow permissions** → select **"Read and write permissions"** and save
          2. If the package already exists, check its access settings: navigate to the package at <https://github.com/orgs/${ORG}/packages>, open its **Settings** tab, and ensure this repository has write access under **Actions access**

          See:
          - [Setting the permissions of the GITHUB\_TOKEN for your organisation](https://docs.github.com/en/organizations/managing-organization-settings/disabling-or-limiting-github-actions-for-your-organization#setting-the-permissions-of-the-github_token-for-your-organization)
          - [Configuring a package's access control and visibility](https://docs.github.com/en/packages/learn-github-packages/configuring-a-packages-access-control-and-visibility)

          **Option 2 — Repository admin: use a Personal Access Token (no org-owner access needed)**

          > **Note:** A classic token is required because [fine-grained tokens do not support GitHub Packages](https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry#authenticating-to-the-container-registry).

          1. Create a [Personal Access Token (classic)](https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens#creating-a-personal-access-token-classic) with the \`write:packages\` scope at <https://github.com/settings/tokens>
          2. In this repository, go to **Settings → Secrets and variables → Actions**
          3. Add a new repository secret named **\`GHCR_TOKEN\`** and paste the PAT as the value
          4. Re-run the workflow
          SUMMARY_EOF
                echo "> ℹ️ ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
                ;;
              *)
                REASON="GITHUB_TOKEN does not have write access to ghcr.io/${REPO_LC} (HTTP ${HTTP_STATUS})."
                echo "::warning title=GHCR cache write likely to fail::${REASON} ${NOTE}"
                echo "writable=false" >> "$GITHUB_OUTPUT"
                echo "❌ **GHCR cache write pre-check:** failed — ${REASON} ${NOTE}" >> "$GITHUB_STEP_SUMMARY"
                ;;
            esac
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push images
        uses: docker/bake-action@v6
        env:
          TAG_SUFFIX:          ${{ needs.detect.outputs.tag_suffix }}
          LATEST_PHP_VERSION:  ${{ needs.detect.outputs.latest_php_version }}
          VERSIONS:            ${{ needs.detect.outputs.versions }}
          VERSIONS_BASE:       ${{ needs.detect.outputs.versions_base }}
          VERSIONS_SECURE:     ${{ needs.detect.outputs.versions_secure }}
          PLATFORMS:           ${{ needs.detect.outputs.platforms }}
          CACHE_FROM_ENABLED:  ${{ inputs.cache_from_enabled }}
          GHCR_REPO:           ${{ steps.ghcr.outputs.repo }}
          GHCR_WRITABLE:       ${{ steps.check-ghcr.outputs.writable }}
        with:
          source: .
          files: docker-bake.hcl
          push:  true
