name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install yamllint
        run: pip install --quiet yamllint

      - name: Run YAML lint
        run: bash tests/lint-yaml.sh

  lint-shell:
    name: Lint Shell
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck

      - name: Run shell lint
        run: bash tests/lint-shell.sh

  lint-dockerfile:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Run Dockerfile lint
        run: bash tests/lint-dockerfile.sh

  build-dockerfiles:
    name: Build and test PHP images
    runs-on: ubuntu-latest
    needs: [lint-yaml, lint-shell, lint-dockerfile]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build PHP images
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash tests/build-dockerfile.sh

      - name: Run PHP functional tests
        run: bash tests/run-dockerfile.sh
