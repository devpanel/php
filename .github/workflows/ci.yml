name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install yamllint
        run: pip install --quiet yamllint

      - name: Run YAML lint
        run: bash tests/lint-yaml.sh

  lint-shell:
    name: Lint Shell
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck

      - name: Run shell lint
        run: bash tests/lint-shell.sh

  lint-dockerfile:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Run Dockerfile lint
        run: bash tests/lint-dockerfile.sh

  build-dockerfiles:
    name: Build and test PHP images
    runs-on: ubuntu-latest
    needs: [lint-yaml, lint-shell, lint-dockerfile]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build PHP images
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CACHE_FROM_ENABLED: "true"
        run: bash tests/build-dockerfile.sh

      - name: Run PHP functional tests
        run: bash tests/run-dockerfile.sh

  verify-extension:
    name: Verify Copilot Chat VSIX
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Download and verify pinned Copilot Chat VSIX
        run: |
          VERSION="$(grep -m1 '^ARG COPILOT_CHAT_PINNED_VERSION=' base/Dockerfile | cut -d= -f2)"
          EXPECTED_SHA="$(grep -m1 '^ARG COPILOT_CHAT_VSIX_SHA256=' base/Dockerfile | cut -d= -f2)"
          VSIX_URL="https://marketplace.visualstudio.com/_apis/public/gallery/publishers/GitHub/vsextensions/copilot-chat/${VERSION}/vspackage"
          echo "Downloading GitHub.copilot-chat ${VERSION} from VS Marketplace"
          curl -fsSL --retry 5 --retry-all-errors --connect-timeout 30 \
            "${VSIX_URL}" -o /tmp/copilot-chat.vsix
          ACTUAL_SHA="$(sha256sum /tmp/copilot-chat.vsix | cut -d' ' -f1)"
          echo "Computed SHA256: ${ACTUAL_SHA}"
          if [ -n "${EXPECTED_SHA}" ]; then
            echo "${EXPECTED_SHA}  /tmp/copilot-chat.vsix" | sha256sum -c -
            echo "SHA256 verified."
          else
            echo "::warning::COPILOT_CHAT_VSIX_SHA256 is not set in base/Dockerfile."
            echo "::warning::Set ARG COPILOT_CHAT_VSIX_SHA256=${ACTUAL_SHA} in base/Dockerfile to enable integrity verification."
          fi

  verify-code-server:
    name: Verify code-server .deb hashes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Download and verify pinned code-server .deb files
        run: |
          VERSION="$(grep -m1 '^ARG CODESERVER_PINNED_HASH_VERSION=' base/Dockerfile | cut -d= -f2)"
          SHA256_AMD64="$(grep -m1 '^ARG CODESERVER_DEB_SHA256_AMD64=' base/Dockerfile | cut -d= -f2)"
          SHA256_ARM64="$(grep -m1 '^ARG CODESERVER_DEB_SHA256_ARM64=' base/Dockerfile | cut -d= -f2)"
          BASE_URL="https://github.com/coder/code-server/releases/download/v${VERSION}"
          for arch in amd64 arm64; do
            DEB="code-server_${VERSION}_${arch}.deb"
            echo "Downloading ${DEB}"
            curl -fsSL --retry 5 --retry-all-errors --connect-timeout 30 \
              "${BASE_URL}/${DEB}" -o "/tmp/${DEB}"
            ACTUAL_SHA="$(sha256sum "/tmp/${DEB}" | cut -d' ' -f1)"
            echo "${arch} SHA256: ${ACTUAL_SHA}"
            case "${arch}" in
              amd64) EXPECTED_SHA="${SHA256_AMD64}" ;;
              arm64) EXPECTED_SHA="${SHA256_ARM64}" ;;
            esac
            ARCH_UPPER="$(echo "${arch}" | tr '[:lower:]' '[:upper:]')"
            if [ -n "${EXPECTED_SHA}" ]; then
              echo "${EXPECTED_SHA}  /tmp/${DEB}" | sha256sum -c -
              echo "${arch} SHA256 verified."
            else
              echo "::warning::CODESERVER_DEB_SHA256_${ARCH_UPPER} is not set in base/Dockerfile."
              echo "::warning::Set ARG CODESERVER_DEB_SHA256_${ARCH_UPPER}=${ACTUAL_SHA} in base/Dockerfile to enable integrity verification."
            fi
          done
