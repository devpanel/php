name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install yamllint
        run: pip install --quiet yamllint

      - name: Run YAML lint
        run: bash tests/lint-yaml.sh

  lint-shell:
    name: Lint Shell
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck

      - name: Run shell lint
        run: bash tests/lint-shell.sh

  lint-dockerfile:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Run Dockerfile lint
        run: bash tests/lint-dockerfile.sh

  build-dockerfiles:
    name: Build and test PHP images
    runs-on: ubuntu-latest
    needs: [lint-yaml, lint-shell, lint-dockerfile]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve artifact versions for download pre-seeding
        id: resolve-versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Detect latest code-server v4 release (mirrors Dockerfile auto-detect logic).
          CS_MAJOR=4
          CS_JSON=$(curl -fsSL --retry 3 --connect-timeout 30 \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            'https://api.github.com/repos/coder/code-server/releases?per_page=100')
          CS_VERSION=$(printf '%s' "$CS_JSON" | jq -r \
            --argjson major "$CS_MAJOR" '
              first(
                .[] |
                select(.draft==false and .prerelease==false) |
                select(.tag_name | test("^v?" + ($major|tostring) + "\\.[0-9]+\\.[0-9]+([-+].*)?$")) |
                .tag_name | ltrimstr("v")
              ) // ""
            ')
          [ -n "$CS_VERSION" ] || { echo "Failed to detect code-server version" >&2; exit 1; }

          # Derive the VS Code version bundled with this code-server release (4.X.Y → 1.X.Y).
          VSCODE_VERSION="$(printf '%s' "$CS_VERSION" | sed 's/^[0-9][0-9]*\./1./')"

          # Detect the latest stable Copilot Chat version compatible with that VS Code.
          CC_JSON=$(curl -fsSL --retry 3 --connect-timeout 30 \
            -X POST \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json;api-version=3.0-preview.1' \
            -d '{"filters":[{"criteria":[{"filterType":7,"value":"GitHub.copilot-chat"}],"pageSize":100}],"flags":17}' \
            'https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery')
          CC_VERSION=$(printf '%s' "$CC_JSON" | jq -r \
            --arg vscode "$VSCODE_VERSION" '
              def vparts: split(".") | map(tonumber? // 0);
              first(
                .results[0].extensions[0].versions[]? |
                select(.version | test("^[0-9]+\\.[0-9]+\\.[0-9]{1,9}$")) |
                (.properties // [] |
                 map(select(.key == "Microsoft.VisualStudio.Code.Engine")) |
                 .[0].value // "") as $engine |
                select($engine != "") |
                ($engine | gsub("^[^0-9]+"; "") | split("-")[0]) as $min_vscode |
                select(($vscode | vparts) >= ($min_vscode | vparts)) |
                .version
              ) // ""
            ')
          [ -n "$CC_VERSION" ] || { echo "Failed to detect Copilot Chat version" >&2; exit 1; }

          echo "cs_version=${CS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "cc_version=${CC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved: code-server=${CS_VERSION}  VS Code=${VSCODE_VERSION}  copilot-chat=${CC_VERSION}"

      - name: Restore pre-seeded downloads from cache
        id: cache-downloads
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/build-downloads
          key: build-downloads-cs-${{ steps.resolve-versions.outputs.cs_version }}-cc-${{ steps.resolve-versions.outputs.cc_version }}

      - name: Pre-seed downloads (cache miss only)
        if: steps.cache-downloads.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$RUNNER_TEMP/build-downloads"
          CS_VERSION="${{ steps.resolve-versions.outputs.cs_version }}"
          CC_VERSION="${{ steps.resolve-versions.outputs.cc_version }}"

          # code-server .deb for both architectures (arm64 needed for cross-platform
          # builds; amd64 used directly by this runner).
          for arch in amd64 arm64; do
            DEB="code-server_${CS_VERSION}_${arch}.deb"
            echo "Downloading ${DEB}"
            curl -fsSL --retry 5 --retry-all-errors --connect-timeout 30 \
              "https://github.com/coder/code-server/releases/download/v${CS_VERSION}/${DEB}" \
              -o "$RUNNER_TEMP/build-downloads/${DEB}"
          done

          # Copilot Chat VSIX (architecture-independent).
          VSIX_URL="https://marketplace.visualstudio.com/_apis/public/gallery/publishers/GitHub/vsextensions/copilot-chat/${CC_VERSION}/vspackage"
          echo "Downloading copilot-chat-${CC_VERSION}.vsix"
          curl -fsSL --compressed --retry 5 --retry-all-errors --connect-timeout 30 \
            "${VSIX_URL}" -o "$RUNNER_TEMP/build-downloads/copilot-chat-${CC_VERSION}.vsix"

      - name: Build PHP images
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CACHE_FROM_ENABLED: true
          DOWNLOADS_DIR: ${{ runner.temp }}/build-downloads
        run: bash tests/build-dockerfile.sh

      - name: Run PHP functional tests
        run: bash tests/run-dockerfile.sh

  verify-extension:
    name: Verify Copilot Chat VSIX
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Get pinned Copilot Chat version
        id: copilot-version
        run: |
          echo "version=$(grep -m1 '^ARG COPILOT_CHAT_PINNED_VERSION=' base/Dockerfile | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Restore Copilot Chat VSIX from cache
        id: cache-vsix
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/copilot-chat.vsix
          key: copilot-chat-vsix-${{ steps.copilot-version.outputs.version }}

      - name: Download Copilot Chat VSIX (cache miss only)
        if: steps.cache-vsix.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ steps.copilot-version.outputs.version }}"
          VSIX_URL="https://marketplace.visualstudio.com/_apis/public/gallery/publishers/GitHub/vsextensions/copilot-chat/${VERSION}/vspackage"
          echo "Downloading GitHub.copilot-chat ${VERSION} from VS Marketplace"
          curl -fsSL --compressed --retry 5 --retry-all-errors --connect-timeout 30 \
            "${VSIX_URL}" -o "$RUNNER_TEMP/copilot-chat.vsix"

      - name: Verify Copilot Chat VSIX
        run: |
          EXPECTED_SHA="$(grep -m1 '^ARG COPILOT_CHAT_VSIX_SHA256=' base/Dockerfile | cut -d= -f2)"
          if ! od -An -tx1 -N4 "$RUNNER_TEMP/copilot-chat.vsix" | tr -d ' \n' | grep -qi '^504b0304'; then
            ACTUAL_MAGIC="$(od -An -tx1 -N8 "$RUNNER_TEMP/copilot-chat.vsix" | tr -d ' \n')"
            echo "Downloaded file is not a valid ZIP (expected magic 504b0304, got: ${ACTUAL_MAGIC})"
            echo "The Marketplace may have returned a rate-limit/error page or gzip-encoded content."
            exit 1
          fi
          ACTUAL_SHA="$(sha256sum "$RUNNER_TEMP/copilot-chat.vsix" | cut -d' ' -f1)"
          echo "Computed SHA256: ${ACTUAL_SHA}"
          if [ -n "${EXPECTED_SHA}" ]; then
            echo "${EXPECTED_SHA}  $RUNNER_TEMP/copilot-chat.vsix" | sha256sum -c -
            echo "SHA256 verified."
          else
            echo "::warning::COPILOT_CHAT_VSIX_SHA256 is not set in base/Dockerfile."
            echo "::warning::Set ARG COPILOT_CHAT_VSIX_SHA256=${ACTUAL_SHA} in base/Dockerfile to enable integrity verification."
          fi

  verify-code-server:
    name: Verify code-server .deb hashes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Get pinned code-server version
        id: cs-version
        run: |
          echo "version=$(grep -m1 '^ARG CODESERVER_PINNED_HASH_VERSION=' base/Dockerfile | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Restore code-server .deb files from cache
        id: cache-debs
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/code-server-debs
          key: code-server-debs-${{ steps.cs-version.outputs.version }}

      - name: Download pinned code-server .deb files (cache miss only)
        if: steps.cache-debs.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$RUNNER_TEMP/code-server-debs"
          VERSION="${{ steps.cs-version.outputs.version }}"
          BASE_URL="https://github.com/coder/code-server/releases/download/v${VERSION}"
          for arch in amd64 arm64; do
            DEB="code-server_${VERSION}_${arch}.deb"
            echo "Downloading ${DEB}"
            curl -fsSL --retry 5 --retry-all-errors --connect-timeout 30 \
              "${BASE_URL}/${DEB}" -o "$RUNNER_TEMP/code-server-debs/${DEB}"
          done

      - name: Verify pinned code-server .deb files
        run: |
          VERSION="${{ steps.cs-version.outputs.version }}"
          SHA256_AMD64="$(grep -m1 '^ARG CODESERVER_DEB_SHA256_AMD64=' base/Dockerfile | cut -d= -f2)"
          SHA256_ARM64="$(grep -m1 '^ARG CODESERVER_DEB_SHA256_ARM64=' base/Dockerfile | cut -d= -f2)"
          for arch in amd64 arm64; do
            DEB="code-server_${VERSION}_${arch}.deb"
            ACTUAL_SHA="$(sha256sum "$RUNNER_TEMP/code-server-debs/${DEB}" | cut -d' ' -f1)"
            echo "${arch} SHA256: ${ACTUAL_SHA}"
            case "${arch}" in
              amd64) EXPECTED_SHA="${SHA256_AMD64}" ;;
              arm64) EXPECTED_SHA="${SHA256_ARM64}" ;;
            esac
            ARCH_UPPER="$(echo "${arch}" | tr '[:lower:]' '[:upper:]')"
            if [ -n "${EXPECTED_SHA}" ]; then
              echo "${EXPECTED_SHA}  $RUNNER_TEMP/code-server-debs/${DEB}" | sha256sum -c -
              echo "${arch} SHA256 verified."
            else
              echo "::warning::CODESERVER_DEB_SHA256_${ARCH_UPPER} is not set in base/Dockerfile."
              echo "::warning::Set ARG CODESERVER_DEB_SHA256_${ARCH_UPPER}=${ACTUAL_SHA} in base/Dockerfile to enable integrity verification."
            fi
          done
