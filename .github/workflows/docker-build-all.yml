name: Build all Docker images

on:
  workflow_dispatch:

jobs:
  detect-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      bake_targets:        ${{ steps.detect.outputs.bake_targets }}
      tag_suffix:          ${{ steps.detect.outputs.tag_suffix }}
      latest_php_version:  ${{ steps.detect.outputs.latest_php_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine tag suffix, latest PHP version, and bake targets
        id: detect
        run: |
          set -euo pipefail

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAG_SUFFIX=""
          else
            TAG_SUFFIX="-rc"
          fi

          TARGETS=()
          LATEST_PHP_VERSION=""

          while IFS= read -r VER; do
            LATEST_PHP_VERSION="$VER"
            KEY="${VER//./}"
            TARGETS+=("php${KEY}-base" "php${KEY}-secure" "php${KEY}-advance")
          done < <(find . -maxdepth 1 -mindepth 1 -type d -name '[0-9]*' \
                     | sed 's|./||' | sort -V)

          echo "tag_suffix=${TAG_SUFFIX}"                   >> "$GITHUB_OUTPUT"
          echo "latest_php_version=${LATEST_PHP_VERSION}"   >> "$GITHUB_OUTPUT"
          echo "bake_targets=${TARGETS[*]}"                 >> "$GITHUB_OUTPUT"

  build:
    needs: detect-versions
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push all images (with GHA cache refresh)
        uses: docker/bake-action@v6
        env:
          TAG_SUFFIX:         ${{ needs.detect-versions.outputs.tag_suffix }}
          LATEST_PHP_VERSION: ${{ needs.detect-versions.outputs.latest_php_version }}
          # CACHE_TYPE is not overridden here — defaults to "gha" in docker-bake.hcl
          # so this run both reads from and writes to the GHA cache, refreshing it.
        with:
          files:   docker-bake.hcl
          targets: ${{ needs.detect-versions.outputs.bake_targets }}
          push:    true
        secrets: |
          github_token=${{ secrets.GITHUB_TOKEN }}
