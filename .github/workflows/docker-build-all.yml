name: Build all Docker images

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      bake_targets:        ${{ steps.detect.outputs.bake_targets }}
      tag_suffix:          ${{ steps.detect.outputs.tag_suffix }}
      latest_php_version:  ${{ steps.detect.outputs.latest_php_version }}
      versions:            ${{ steps.detect.outputs.versions }}
      platforms:           ${{ steps.detect.outputs.platforms }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine tag suffix, latest PHP version, and bake targets
        id: detect
        run: |
          set -euo pipefail

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAG_SUFFIX=""
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            TAG_SUFFIX="-rc"
          else
            BRANCH="${{ github.ref_name }}"
            TAG_SUFFIX="-${BRANCH//\//-}"
          fi

          TARGETS=()
          LATEST_PHP_VERSION=""

          while IFS= read -r VER; do
            LATEST_PHP_VERSION="$VER"
            KEY="${VER//./_}"
            TARGETS+=("php${KEY}-base" "php${KEY}-secure" "php${KEY}-advance")
          done < <(find . -maxdepth 1 -mindepth 1 -type d -name '[0-9]*' \
                     | sed 's|./||' | sort -V)

          echo "tag_suffix=${TAG_SUFFIX}"                   >> "$GITHUB_OUTPUT"
          echo "latest_php_version=${LATEST_PHP_VERSION}"   >> "$GITHUB_OUTPUT"
          echo "bake_targets=${TARGETS[*]}"                 >> "$GITHUB_OUTPUT"
          VERSIONS_LIST=$(find . -maxdepth 1 -mindepth 1 -type d -name '[0-9]*' \
                            | sed 's|./||' | sort -V | tr '\n' ' ' | xargs)
          echo "versions=${VERSIONS_LIST}" >> "$GITHUB_OUTPUT"

          # Determine build platforms from the official PHP base image manifest,
          # filtered to linux/amd64 and linux/arm64.
          PHP_MANIFEST=$(docker manifest inspect "php:${LATEST_PHP_VERSION}-apache" 2>/dev/null || echo "")
          DETECTED=""
          if [[ -n "$PHP_MANIFEST" ]]; then
            DETECTED=$(echo "$PHP_MANIFEST" \
              | jq -r '.manifests[].platform | select(.os=="linux") | "\(.os)/\(.architecture)\(if .variant and .variant!="" then "/"+.variant else "" end)"' \
              | grep -E "^linux/(amd64|arm64)(/|$)" | sort | tr '\n' ',' | sed 's/,$//')
          fi
          echo "platforms=${DETECTED:-linux/amd64,linux/arm64}" >> "$GITHUB_OUTPUT"

  build:
    needs: detect-versions
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push all images (with GHA cache refresh)
        uses: docker/bake-action@v6
        env:
          TAG_SUFFIX:          ${{ needs.detect-versions.outputs.tag_suffix }}
          LATEST_PHP_VERSION:  ${{ needs.detect-versions.outputs.latest_php_version }}
          VERSIONS:            ${{ needs.detect-versions.outputs.versions }}
          PLATFORMS:           ${{ needs.detect-versions.outputs.platforms }}
          CACHE_FROM_ENABLED:  "false"
        with:
          files:   docker-bake.hcl
          targets: ${{ needs.detect-versions.outputs.bake_targets }}
          push:    true
        secrets: |
          github_token=${{ secrets.GITHUB_TOKEN }}
