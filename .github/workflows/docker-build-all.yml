name: Build all Docker images

on:
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # All platforms build in parallel.  Each job pushes images by content digest
  # (no tags) and uploads a digest artifact.  To add a new platform, add it to
  # the matrix include list — no other changes are needed.

  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
          - platform: linux/arm64
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag_suffix:         ${{ steps.build.outputs.tag_suffix }}
      versions:           ${{ steps.build.outputs.versions }}
      versions_base:      ${{ steps.build.outputs.versions_base }}
      versions_secure:    ${{ steps.build.outputs.versions_secure }}
      latest_php_version: ${{ steps.build.outputs.latest_php_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build PHP images (${{ matrix.platform }})
        id: build
        uses: ./.github/actions/build-php-images
        with:
          cache_from_enabled: 'false'
          platforms_filter:   ${{ matrix.platform }}
          push_by_digest:     'true'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
          github_token:       ${{ secrets.GITHUB_TOKEN }}
          ghcr_token:         ${{ secrets.GHCR_TOKEN }}

  # After all platform builds have completed this single job downloads every
  # digest artifact and assembles the final multi-arch manifest tags.

  merge:
    needs: [build]
    if: needs.build.outputs.versions != '' && needs.build.outputs.latest_php_version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create manifest tags from all platform digests
        uses: ./.github/actions/merge-manifests
        with:
          versions:           ${{ needs.build.outputs.versions }}
          versions_base:      ${{ needs.build.outputs.versions_base }}
          versions_secure:    ${{ needs.build.outputs.versions_secure }}
          tag_suffix:         ${{ needs.build.outputs.tag_suffix }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
