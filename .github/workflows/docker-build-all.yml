name: Build all Docker images

on:
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        # amd64: pushes final images directly to Docker Hub under the final tag.
        # arm64: pushes final images to GHCR staging; the merge job then adds
        #        arm64 to the Docker Hub final tag created by the amd64 build.
        platform: [linux/amd64, linux/arm64]
    # All matrix instances detect the same versions (full-rebuild = all dirs),
    # so last-writer-wins for matrix job outputs is safe: every instance sets
    # identical values for tag_suffix, versions, etc.
    outputs:
      tag_suffix:          ${{ steps.build_action.outputs.tag_suffix }}
      versions:            ${{ steps.build_action.outputs.versions }}
      versions_base:       ${{ steps.build_action.outputs.versions_base }}
      versions_secure:     ${{ steps.build_action.outputs.versions_secure }}
      latest_php_version:  ${{ steps.build_action.outputs.latest_php_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build PHP images
        id: build_action
        uses: ./.github/actions/build-php-images
        with:
          cache_from_enabled:  'false'
          platforms_filter:    ${{ matrix.platform }}
          # amd64 pushes final images to Docker Hub; arm64 stages them in GHCR.
          arm64_staging:       ${{ (matrix.platform == 'linux/arm64') && 'true' || 'false' }}
          dockerhub_username:  ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:     ${{ secrets.DOCKERHUB_TOKEN }}
          github_token:        ${{ secrets.GITHUB_TOKEN }}
          ghcr_token:          ${{ secrets.GHCR_TOKEN }}

  merge:
    needs: build
    if: needs.build.outputs.versions != '' && needs.build.outputs.latest_php_version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Merge per-platform manifests
        uses: ./.github/actions/merge-manifests
        with:
          versions:           ${{ needs.build.outputs.versions }}
          versions_base:      ${{ needs.build.outputs.versions_base }}
          versions_secure:    ${{ needs.build.outputs.versions_secure }}
          tag_suffix:         ${{ needs.build.outputs.tag_suffix }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
          github_token:       ${{ secrets.GITHUB_TOKEN }}
          ghcr_token:         ${{ secrets.GHCR_TOKEN }}
