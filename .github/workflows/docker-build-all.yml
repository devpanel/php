name: Build all Docker images

on:
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Each platform builds independently and pushes its images to Docker Hub by
  # content digest (no tags created).  The merge job then creates the final
  # multi-arch manifest tags from the collected digests.
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag_suffix:         ${{ steps.build.outputs.tag_suffix }}
      versions:           ${{ steps.build.outputs.versions }}
      versions_base:      ${{ steps.build.outputs.versions_base }}
      versions_secure:    ${{ steps.build.outputs.versions_secure }}
      latest_php_version: ${{ steps.build.outputs.latest_php_version }}
      digests:            ${{ steps.build.outputs.digests }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build PHP images (amd64)
        id: build
        uses: ./.github/actions/build-php-images
        with:
          cache_from_enabled: 'false'
          platforms_filter:   linux/amd64
          push_by_digest:     'true'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
          github_token:       ${{ secrets.GITHUB_TOKEN }}
          ghcr_token:         ${{ secrets.GHCR_TOKEN }}

  build-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digests: ${{ steps.build.outputs.digests }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build PHP images (arm64)
        id: build
        uses: ./.github/actions/build-php-images
        with:
          cache_from_enabled: 'false'
          platforms_filter:   linux/arm64
          push_by_digest:     'true'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
          github_token:       ${{ secrets.GITHUB_TOKEN }}
          ghcr_token:         ${{ secrets.GHCR_TOKEN }}

  merge:
    needs: [build-amd64, build-arm64]
    if: needs.build-amd64.outputs.versions != '' && needs.build-amd64.outputs.latest_php_version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create multi-arch manifest tags
        uses: ./.github/actions/merge-manifests
        with:
          versions:           ${{ needs.build-amd64.outputs.versions }}
          versions_base:      ${{ needs.build-amd64.outputs.versions_base }}
          versions_secure:    ${{ needs.build-amd64.outputs.versions_secure }}
          tag_suffix:         ${{ needs.build-amd64.outputs.tag_suffix }}
          amd64_digests:      ${{ needs.build-amd64.outputs.digests }}
          arm64_digests:      ${{ needs.build-arm64.outputs.digests }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
