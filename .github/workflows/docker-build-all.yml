name: Build all Docker images

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-versions:
    uses: ./.github/workflows/detect-php-versions.yml
    permissions:
      contents: read

  build:
    needs: detect-versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute GHCR repository (lowercase)
        id: ghcr
        run: echo "repo=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push all images (with GHA cache refresh)
        uses: docker/bake-action@v6
        env:
          TAG_SUFFIX:          ${{ needs.detect-versions.outputs.tag_suffix }}
          LATEST_PHP_VERSION:  ${{ needs.detect-versions.outputs.latest_php_version }}
          VERSIONS:            ${{ needs.detect-versions.outputs.versions }}
          PLATFORMS:           ${{ needs.detect-versions.outputs.platforms }}
          CACHE_FROM_ENABLED:  "false"
          GHCR_REPO:           ${{ steps.ghcr.outputs.repo }}
        with:
          files:        docker-bake.hcl
          source:       .
          push:         true
