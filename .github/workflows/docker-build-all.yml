name: Build all Docker images

on:
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Each matrix item builds its platform, pushes images by content digest (no
  # tags), and uploads a digest artifact.  A shared concurrency group serializes
  # the jobs so that only one runs at a time: when the first platform completes
  # its build it immediately creates the manifest tag from its own digest, then
  # the second platform's job starts, builds, uploads its digest, and re-creates
  # the manifest tag with both digests — producing the full multi-arch manifest.
  #
  # To add a new platform, add it to the matrix include list.  No other changes
  # are needed.

  build-and-merge:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
          - platform: linux/arm64
    # Serialize all matrix items within a run so that each merge step sees all
    # digest artifacts uploaded by the jobs that ran before it.
    concurrency:
      group: merge-${{ github.run_id }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build PHP images (${{ matrix.platform }})
        id: build
        uses: ./.github/actions/build-php-images
        with:
          cache_from_enabled: 'false'
          platforms_filter:   ${{ matrix.platform }}
          push_by_digest:     'true'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
          github_token:       ${{ secrets.GITHUB_TOKEN }}
          ghcr_token:         ${{ secrets.GHCR_TOKEN }}

      - name: Create/update manifest tags (${{ matrix.platform }} available)
        if: steps.build.outputs.versions != '' && steps.build.outputs.latest_php_version != ''
        uses: ./.github/actions/merge-manifests
        with:
          versions:           ${{ steps.build.outputs.versions }}
          versions_base:      ${{ steps.build.outputs.versions_base }}
          versions_secure:    ${{ steps.build.outputs.versions_secure }}
          tag_suffix:         ${{ steps.build.outputs.tag_suffix }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
