name: Build all Docker images

on:
  workflow_dispatch:

jobs:
  detect-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag_suffix:          ${{ steps.vars.outputs.tag_suffix }}
      latest_php_version:  ${{ steps.detect.outputs.latest_php_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine image tag suffix
        id: vars
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tag_suffix=" >> $GITHUB_OUTPUT
          else
            echo "tag_suffix=-rc" >> $GITHUB_OUTPUT
          fi

      - name: Detect latest PHP version
        id: detect
        run: |
          LATEST=$(find . -maxdepth 1 -mindepth 1 -type d -name '[0-9]*' \
                     | sed 's|./||' | sort -V | tail -1)
          echo "latest_php_version=${LATEST}" >> $GITHUB_OUTPUT

  build:
    needs: detect-versions
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push all images (no cache)
        uses: docker/bake-action@v6
        env:
          TAG_SUFFIX:         ${{ needs.detect-versions.outputs.tag_suffix }}
          LATEST_PHP_VERSION: ${{ needs.detect-versions.outputs.latest_php_version }}
          CACHE_TYPE:         ""   # disable GHA cache for full rebuilds
        with:
          files:   docker-bake.hcl
          targets: all
          push:    true
        secrets: |
          github_token=${{ secrets.GITHUB_TOKEN }}
