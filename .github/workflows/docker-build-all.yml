name: Build all Docker images

on:
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # All platforms build in parallel.  Each job pushes images by content digest
  # (no tags) and uploads a digest artifact.  When a job reaches the merge step
  # it enters a shared concurrency group (cancel-in-progress: false) so that
  # only one merge runs at a time — the second job queues and waits until the
  # first completes its merge before starting its own.  Because the group does
  # not cancel running jobs the first job's build and merge proceed without
  # delay; the second job's build runs freely but its merge step waits.
  # The final merge to run sees all digest artifacts and produces the full
  # multi-arch manifest.
  #
  # To add a new platform, add it to the matrix include list.  No other changes
  # are needed.

  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
          - platform: linux/arm64
    concurrency:
      group: merge-${{ github.run_id }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build PHP images (${{ matrix.platform }})
        id: build
        uses: ./.github/actions/build-php-images
        with:
          cache_from_enabled: 'false'
          platforms_filter:   ${{ matrix.platform }}
          push_by_digest:     'true'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
          github_token:       ${{ secrets.GITHUB_TOKEN }}
          ghcr_token:         ${{ secrets.GHCR_TOKEN }}

      - name: Create/update manifest tags (${{ matrix.platform }} complete)
        if: steps.build.outputs.versions != '' && steps.build.outputs.latest_php_version != ''
        uses: ./.github/actions/merge-manifests
        with:
          versions:           ${{ steps.build.outputs.versions }}
          versions_base:      ${{ steps.build.outputs.versions_base }}
          versions_secure:    ${{ steps.build.outputs.versions_secure }}
          tag_suffix:         ${{ steps.build.outputs.tag_suffix }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
