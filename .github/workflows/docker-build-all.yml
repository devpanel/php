name: Build all Docker images

on:
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Each platform builds independently, pushes images by content digest (no
  # tags), and uploads a digest artifact.  As soon as a platform build
  # completes its corresponding merge job fires (see below) and creates or
  # updates the manifest tag using all digest artifacts available at that
  # moment — so the tag is published immediately after the first platform
  # finishes and progressively updated as each subsequent platform completes.
  #
  # To add a new platform, copy one build+merge job pair, change the
  # platforms_filter, and update the job names.  No other changes are needed.

  build-linux-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag_suffix:         ${{ steps.build.outputs.tag_suffix }}
      versions:           ${{ steps.build.outputs.versions }}
      versions_base:      ${{ steps.build.outputs.versions_base }}
      versions_secure:    ${{ steps.build.outputs.versions_secure }}
      latest_php_version: ${{ steps.build.outputs.latest_php_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build PHP images (linux/amd64)
        id: build
        uses: ./.github/actions/build-php-images
        with:
          cache_from_enabled: 'false'
          platforms_filter:   linux/amd64
          push_by_digest:     'true'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
          github_token:       ${{ secrets.GITHUB_TOKEN }}
          ghcr_token:         ${{ secrets.GHCR_TOKEN }}

  build-linux-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag_suffix:         ${{ steps.build.outputs.tag_suffix }}
      versions:           ${{ steps.build.outputs.versions }}
      versions_base:      ${{ steps.build.outputs.versions_base }}
      versions_secure:    ${{ steps.build.outputs.versions_secure }}
      latest_php_version: ${{ steps.build.outputs.latest_php_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build PHP images (linux/arm64)
        id: build
        uses: ./.github/actions/build-php-images
        with:
          cache_from_enabled: 'false'
          platforms_filter:   linux/arm64
          push_by_digest:     'true'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
          github_token:       ${{ secrets.GITHUB_TOKEN }}
          ghcr_token:         ${{ secrets.GHCR_TOKEN }}

  # Each merge job depends only on its own platform's build job so it fires as
  # soon as that platform finishes.  It downloads all digest artifacts that are
  # available at that moment (other platforms may still be building) and creates
  # or overwrites the manifest tag with whatever digests are present.  When the
  # next platform finishes its own merge job runs and overwrites the tag again
  # with the enlarged set of digests.  The final merge job to complete leaves
  # the tag pointing at the full multi-arch manifest.

  merge-linux-amd64:
    needs: [build-linux-amd64]
    if: >-
      needs.build-linux-amd64.outputs.versions != '' &&
      needs.build-linux-amd64.outputs.latest_php_version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create/update manifest tags (linux/amd64 available)
        uses: ./.github/actions/merge-manifests
        with:
          versions:           ${{ needs.build-linux-amd64.outputs.versions }}
          versions_base:      ${{ needs.build-linux-amd64.outputs.versions_base }}
          versions_secure:    ${{ needs.build-linux-amd64.outputs.versions_secure }}
          tag_suffix:         ${{ needs.build-linux-amd64.outputs.tag_suffix }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}

  merge-linux-arm64:
    needs: [build-linux-arm64]
    if: >-
      needs.build-linux-arm64.outputs.versions != '' &&
      needs.build-linux-arm64.outputs.latest_php_version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create/update manifest tags (linux/arm64 available)
        uses: ./.github/actions/merge-manifests
        with:
          versions:           ${{ needs.build-linux-arm64.outputs.versions }}
          versions_base:      ${{ needs.build-linux-arm64.outputs.versions_base }}
          versions_secure:    ${{ needs.build-linux-arm64.outputs.versions_secure }}
          tag_suffix:         ${{ needs.build-linux-arm64.outputs.tag_suffix }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
