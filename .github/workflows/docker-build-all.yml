name: Build all Docker images

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build-php-images.yml
    permissions:
      contents: read
      packages: write
    with:
      cache_from_enabled: false
      platforms_filter: linux/amd64,linux/arm64
    secrets: inherit
