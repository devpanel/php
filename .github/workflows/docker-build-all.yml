name: Build all Docker images

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      tag_suffix: ${{ steps.vars.outputs.tag_suffix }}
    steps:
      - name: Determine image tag suffix
        id: vars
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tag_suffix=" >> $GITHUB_OUTPUT
          else
            echo "tag_suffix=-rc" >> $GITHUB_OUTPUT
          fi

  # ── PHP 7.4 ──────────────────────────────────────────────────────────────

  build-php74-base:
    permissions: {}
    needs: setup
    uses: ./.github/workflows/build-image.yml
    with:
      php_version: "7.4"
      image_type: base
      image_tag: ${{ github.repository }}:7.4-base${{ needs.setup.outputs.tag_suffix }}
      artifact_prefix: php74-base
      use_cache: false
    secrets: inherit

  build-php74-secure:
    permissions: {}
    needs: [setup, build-php74-base]
    uses: ./.github/workflows/build-image.yml
    with:
      php_version: "7.4"
      image_type: secure
      image_tag: ${{ github.repository }}:7.4-secure${{ needs.setup.outputs.tag_suffix }}
      base_image: ${{ github.repository }}:7.4-base${{ needs.setup.outputs.tag_suffix }}
      artifact_prefix: php74-secure
      use_cache: false
    secrets: inherit

  build-php74-advance:
    permissions: {}
    needs: [setup, build-php74-secure]
    uses: ./.github/workflows/build-image.yml
    with:
      php_version: "7.4"
      image_type: advance
      image_tag: ${{ github.repository }}:7.4-advance${{ needs.setup.outputs.tag_suffix }}
      base_image: ${{ github.repository }}:7.4-secure${{ needs.setup.outputs.tag_suffix }}
      artifact_prefix: php74-advance
      use_cache: false
    secrets: inherit

  # ── PHP 8.0 ──────────────────────────────────────────────────────────────

