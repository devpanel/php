name: Build all Docker images

on:
  workflow_dispatch:

jobs:
  detect-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      tag_suffix: ${{ steps.vars.outputs.tag_suffix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine image tag suffix
        id: vars
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tag_suffix=" >> $GITHUB_OUTPUT
          else
            echo "tag_suffix=-rc" >> $GITHUB_OUTPUT
          fi

      - name: Discover PHP version directories
        id: detect
        run: |
          # Build a JSON array of all version directories (names starting with a
          # digit), sorted semantically. Non-numeric directories are ignored.
          MATRIX=$(find . -maxdepth 1 -mindepth 1 -type d -name '[0-9]*' \
            | sed 's|./||' | sort -V | jq -R . | jq -sc .)
          echo "matrix=${MATRIX}" >> $GITHUB_OUTPUT

  build:
    needs: detect-versions
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.detect-versions.outputs.matrix) }}
    permissions: {}
    uses: ./.github/workflows/build-php-version.yml
    with:
      php_version: ${{ matrix.version }}
      tag_suffix: ${{ needs.detect-versions.outputs.tag_suffix }}
      use_cache: false
    secrets: inherit
