name: Build all Docker images

on:
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      platforms: ${{ steps.platforms.outputs.platforms }}
    steps:
      # The platforms list is the single source of truth for which architectures
      # are built.  Add an entry here to get a new build job AND a new merge job
      # automatically — no other workflow changes are required.
      - name: Set build platforms
        id: platforms
        run: echo 'platforms=["linux/amd64","linux/arm64"]' >> "$GITHUB_OUTPUT"

  # One build job per platform.  Each instance pushes its images to Docker Hub
  # by content digest (no tags created) and uploads a digest artifact so the
  # merge jobs can assemble the final multi-arch manifest tags.
  build:
    needs: [prepare]
    strategy:
      matrix:
        platform: ${{ fromJson(needs.prepare.outputs.platforms) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      # All matrix instances detect identical values; last-writer-wins is safe.
      tag_suffix:         ${{ steps.build.outputs.tag_suffix }}
      versions:           ${{ steps.build.outputs.versions }}
      versions_base:      ${{ steps.build.outputs.versions_base }}
      versions_secure:    ${{ steps.build.outputs.versions_secure }}
      latest_php_version: ${{ steps.build.outputs.latest_php_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build PHP images (${{ matrix.platform }})
        id: build
        uses: ./.github/actions/build-php-images
        with:
          cache_from_enabled: 'false'
          platforms_filter:   ${{ matrix.platform }}
          push_by_digest:     'true'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
          github_token:       ${{ secrets.GITHUB_TOKEN }}
          ghcr_token:         ${{ secrets.GHCR_TOKEN }}

  # One merge job per platform.  All instances run after every build completes
  # so that each merge job has access to all platform digest artifacts and can
  # create the complete multi-arch manifest in one shot.  If a build fails for
  # one platform its digest will simply be absent and the manifest is created
  # from whatever platforms succeeded.
  merge:
    needs: [prepare, build]
    if: needs.build.outputs.versions != '' && needs.build.outputs.latest_php_version != ''
    strategy:
      matrix:
        platform: ${{ fromJson(needs.prepare.outputs.platforms) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create multi-arch manifest tags (${{ matrix.platform }})
        uses: ./.github/actions/merge-manifests
        with:
          versions:           ${{ needs.build.outputs.versions }}
          versions_base:      ${{ needs.build.outputs.versions_base }}
          versions_secure:    ${{ needs.build.outputs.versions_secure }}
          tag_suffix:         ${{ needs.build.outputs.tag_suffix }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
