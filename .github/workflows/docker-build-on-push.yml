name: Build changed Docker images on push

on:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-php-versions.yml
    permissions:
      contents: read
    with:
      filter_changed: true
      before_sha: ${{ github.event.before }}
      after_sha: ${{ github.sha }}

  build:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.versions != '' && needs.detect-changes.outputs.latest_php_version != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute GHCR repository (lowercase)
        id: ghcr
        run: echo "repo=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (with GHA cache)
        uses: docker/bake-action@v6
        env:
          TAG_SUFFIX:         ${{ needs.detect-changes.outputs.tag_suffix }}
          LATEST_PHP_VERSION: ${{ needs.detect-changes.outputs.latest_php_version }}
          VERSIONS:           ${{ needs.detect-changes.outputs.versions }}
          PLATFORMS:          ${{ needs.detect-changes.outputs.platforms }}
          GHCR_REPO:          ${{ steps.ghcr.outputs.repo }}
        with:
          files:        docker-bake.hcl
          source:       .
          push:         true
