name: Build changed Docker images on push

on:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    uses: ./.github/workflows/reusable/detect-php-versions.yml
    permissions:
      contents: read
    with:
      filter_changed: true
      before_sha: ${{ github.event.before }}
      after_sha: ${{ github.sha }}

  build:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.versions != '' && needs.detect-changes.outputs.latest_php_version != '' }}
    uses: ./.github/workflows/reusable/build-images.yml
    permissions:
      contents: read
      packages: write
    with:
      tag_suffix:         ${{ needs.detect-changes.outputs.tag_suffix }}
      latest_php_version: ${{ needs.detect-changes.outputs.latest_php_version }}
      versions:           ${{ needs.detect-changes.outputs.versions }}
      platforms:          ${{ needs.detect-changes.outputs.platforms }}
    secrets: inherit
