name: Build changed Docker images

on:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag_suffix: ${{ steps.vars.outputs.tag_suffix }}
      php74-base: ${{ steps.changes.outputs.php74-base }}
      php74-secure: ${{ steps.changes.outputs.php74-secure }}
      php74-advance: ${{ steps.changes.outputs.php74-advance }}
      php80-base: ${{ steps.changes.outputs.php80-base }}
      php80-secure: ${{ steps.changes.outputs.php80-secure }}
      php80-advance: ${{ steps.changes.outputs.php80-advance }}
      php81-base: ${{ steps.changes.outputs.php81-base }}
      php81-secure: ${{ steps.changes.outputs.php81-secure }}
      php81-advance: ${{ steps.changes.outputs.php81-advance }}
      php82-base: ${{ steps.changes.outputs.php82-base }}
      php82-secure: ${{ steps.changes.outputs.php82-secure }}
      php82-advance: ${{ steps.changes.outputs.php82-advance }}
      php83-base: ${{ steps.changes.outputs.php83-base }}
      php83-secure: ${{ steps.changes.outputs.php83-secure }}
      php83-advance: ${{ steps.changes.outputs.php83-advance }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine image tag suffix
        id: vars
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tag_suffix=" >> $GITHUB_OUTPUT
          else
            echo "tag_suffix=-rc" >> $GITHUB_OUTPUT
          fi

      - name: Detect changed paths
        id: changes
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          declare -A VERSIONS=(["74"]="7.4" ["80"]="8.0" ["81"]="8.1" ["82"]="8.2" ["83"]="8.3")
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            for V in 74 80 81 82 83; do
              for T in base secure advance; do
                echo "php${V}-${T}=true" >> $GITHUB_OUTPUT
              done
            done
          else
            for V in 74 80 81 82 83; do
              VER="${VERSIONS[$V]}"
              for T in base secure advance; do
                CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" -- "${VER}/${T}/" 2>/dev/null || true)
                if [[ -n "$CHANGED" ]]; then
                  echo "php${V}-${T}=true" >> $GITHUB_OUTPUT
                else
                  echo "php${V}-${T}=false" >> $GITHUB_OUTPUT
                fi
              done
            done
          fi

  # ── PHP 7.4 ──────────────────────────────────────────────────────────────

  build-php74-base:
    permissions: {}
    needs: detect-changes
    if: needs.detect-changes.outputs.php74-base == 'true'
    uses: ./.github/workflows/build-image.yml
    with:
      php_version: "7.4"
      image_type: base
      image_tag: ${{ github.repository }}:7.4-base${{ needs.detect-changes.outputs.tag_suffix }}
      artifact_prefix: php74-base
      use_cache: true
    secrets: inherit

  build-php74-secure:
    permissions: {}
    needs: [detect-changes, build-php74-base]
    if: always() && needs.build-php74-base.result != 'failure' && needs.build-php74-base.result != 'cancelled' && (needs.detect-changes.outputs.php74-secure == 'true' || needs.build-php74-base.result == 'success')
    uses: ./.github/workflows/build-image.yml
    with:
      php_version: "7.4"
      image_type: secure
      image_tag: ${{ github.repository }}:7.4-secure${{ needs.detect-changes.outputs.tag_suffix }}
      base_image: ${{ github.repository }}:7.4-base${{ needs.detect-changes.outputs.tag_suffix }}
      artifact_prefix: php74-secure
      use_cache: true
    secrets: inherit

  build-php74-advance:
    permissions: {}
    needs: [detect-changes, build-php74-secure]
    if: always() && needs.build-php74-secure.result != 'failure' && needs.build-php74-secure.result != 'cancelled' && (needs.detect-changes.outputs.php74-advance == 'true' || needs.build-php74-secure.result == 'success')
    uses: ./.github/workflows/build-image.yml
    with:
      php_version: "7.4"
      image_type: advance
      image_tag: ${{ github.repository }}:7.4-advance${{ needs.detect-changes.outputs.tag_suffix }}
      base_image: ${{ github.repository }}:7.4-secure${{ needs.detect-changes.outputs.tag_suffix }}
      artifact_prefix: php74-advance
      use_cache: true
    secrets: inherit

  # ── PHP 8.0 ──────────────────────────────────────────────────────────────

  build-php80-base:
