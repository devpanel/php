name: Build changed Docker images

on:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag_suffix: ${{ steps.vars.outputs.tag_suffix }}
      matrix: ${{ steps.detect.outputs.matrix }}
      latest_php_version: ${{ steps.detect.outputs.latest_php_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine image tag suffix
        id: vars
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tag_suffix=" >> $GITHUB_OUTPUT
          else
            echo "tag_suffix=-rc" >> $GITHUB_OUTPUT
          fi

      - name: Detect versions and changed paths
        id: detect
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          # Detect changes to shared Dockerfiles; a change there affects all
          # versions that use the shared file.
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            SECURE_DF_CHANGED=1
            ADVANCE_DF_CHANGED=1
          else
            SECURE_DF_CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" -- "secure/Dockerfile" 2>/dev/null | wc -l)
            ADVANCE_DF_CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" -- "advance/Dockerfile" 2>/dev/null | wc -l)
          fi

          VERSIONS_TO_BUILD=()
          LATEST_PHP_VERSION=""

          # Iterate only over directories whose names start with a digit
          # (i.e. PHP version directories such as 7.4, 8.0, 8.1 …).
          while IFS= read -r VER; do
            KEY="${VER//./}"
            LATEST_PHP_VERSION="$VER"  # sort -V ensures last iteration is highest

            if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              BASE=true; SECURE=true; ADVANCE=true
            else
              N_BASE=$(git diff --name-only "$BEFORE" "$AFTER" -- "${VER}/base/" 2>/dev/null | wc -l)
              N_SECURE=$(git diff --name-only "$BEFORE" "$AFTER" -- "${VER}/secure/" 2>/dev/null | wc -l)
              N_ADVANCE=$(git diff --name-only "$BEFORE" "$AFTER" -- "${VER}/advance/" 2>/dev/null | wc -l)

              [[ $N_BASE   -gt 0 ]]                                    && BASE=true   || BASE=false
              [[ $N_SECURE -gt 0 || $SECURE_DF_CHANGED  -gt 0 ]]      && SECURE=true || SECURE=false
              [[ $N_ADVANCE -gt 0 || $ADVANCE_DF_CHANGED -gt 0 ]]     && ADVANCE=true || ADVANCE=false
            fi

            echo "php${KEY}_base=${BASE}"     >> $GITHUB_OUTPUT
            echo "php${KEY}_secure=${SECURE}" >> $GITHUB_OUTPUT
            echo "php${KEY}_advance=${ADVANCE}" >> $GITHUB_OUTPUT

            if [[ "$BASE" == "true" || "$SECURE" == "true" || "$ADVANCE" == "true" ]]; then
              VERSIONS_TO_BUILD+=("$VER")
            fi
          done < <(find . -maxdepth 1 -mindepth 1 -type d -name '[0-9]*' | sed 's|./||' | sort -V)

          # Build the matrix JSON array for downstream jobs.
          if [[ ${#VERSIONS_TO_BUILD[@]} -gt 0 ]]; then
            MATRIX=$(printf '%s\n' "${VERSIONS_TO_BUILD[@]}" | jq -R . | jq -sc .)
          else
            MATRIX="[]"
          fi
          echo "matrix=${MATRIX}" >> $GITHUB_OUTPUT
          echo "latest_php_version=${LATEST_PHP_VERSION}" >> $GITHUB_OUTPUT

  build:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    permissions: {}
    uses: ./.github/workflows/reusable/build-php-version.yml
    with:
      php_version: ${{ matrix.version }}
      tag_suffix: ${{ needs.detect-changes.outputs.tag_suffix }}
      base_changed: ${{ needs.detect-changes.outputs[format('php{0}_base', replace(matrix.version, '.', ''))] == 'true' }}
      secure_changed: ${{ needs.detect-changes.outputs[format('php{0}_secure', replace(matrix.version, '.', ''))] == 'true' }}
      advance_changed: ${{ needs.detect-changes.outputs[format('php{0}_advance', replace(matrix.version, '.', ''))] == 'true' }}
      use_cache: true
      latest_php_version: ${{ needs.detect-changes.outputs.latest_php_version }}
    secrets: inherit
