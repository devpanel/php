name: Build changed Docker images on push

on:
  push:
    branches:
      - main
      - develop

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

env:
  # Comma-separated list of platforms to build.  Override via the
  # PLATFORMS repository variable (Settings → Variables → Actions).
  PLATFORMS: ${{ vars.PLATFORMS || 'linux/amd64,linux/arm64' }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      before_sha: ${{ steps.effective_sha.outputs.before_sha }}
    steps:
      - name: Compute effective before_sha
        id: effective_sha
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # If this run cancelled a previous push workflow, that workflow may
          # have been mid-build and its changes would be lost.  To guarantee
          # no commits are skipped, use the head_sha of the last *successful*
          # run on this branch as the effective before_sha.  This covers every
          # commit since the last known-good build, regardless of how many
          # prior runs were cancelled in the interim.
          #
          # We query every workflow that calls the shared reusable build
          # workflow (on-push and workflow_dispatch/all) so that a successful
          # full-rebuild dispatch is not ignored when computing the diff range.
          # Fetch the last 10 from each so we have enough candidates to find
          # the closest reachable ancestor even when recent runs share SHAs.
          CANDIDATES=$({
            gh api \
              "repos/${{ github.repository }}/actions/workflows/docker-build-on-push.yml/runs?branch=${{ github.ref_name }}&status=success&per_page=10" \
              --jq '.workflow_runs[].head_sha // empty'
            gh api \
              "repos/${{ github.repository }}/actions/workflows/docker-build-all.yml/runs?branch=${{ github.ref_name }}&status=success&per_page=10" \
              --jq '.workflow_runs[].head_sha // empty'
          } | (grep . || true) | sort -u)

          # Among all candidates, pick the closest reachable ancestor of the
          # current commit — the one with the smallest ahead_by distance.
          # This is more correct than using timestamps because it is based on
          # the actual git ancestry of the branch rather than wall-clock time.
          LAST_SUCCESS_SHA=""
          BEST_AHEAD=""
          while IFS= read -r SHA; do
            [[ -z "$SHA" || "$SHA" == "${{ github.sha }}" ]] && continue
            COMPARE=$(gh api \
              "repos/${{ github.repository }}/compare/${SHA}...${{ github.sha }}" \
              --jq '{status: .status, ahead_by: .ahead_by}' 2>/dev/null || true)
            STATUS=$(printf '%s' "$COMPARE" | jq -r '.status // ""')
            AHEAD=$(printf '%s' "$COMPARE" | jq -r '.ahead_by // empty')
            if [[ "$STATUS" == "ahead" || "$STATUS" == "identical" ]] && [[ "$AHEAD" =~ ^[0-9]+$ ]]; then
              if [[ -z "$BEST_AHEAD" || "$AHEAD" -lt "$BEST_AHEAD" ]]; then
                BEST_AHEAD="$AHEAD"
                LAST_SUCCESS_SHA="$SHA"
              fi
            fi
          done <<< "$CANDIDATES"

          echo "before_sha=$LAST_SUCCESS_SHA" >> "$GITHUB_OUTPUT"

  # ── Detect which versions changed and which platforms to target ─────────────
  # Runs after prepare so that before_sha is available, and its outputs drive
  # both the per-platform build matrix and the merge job.
  detect:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      versions:           ${{ steps.detect.outputs.versions }}
      versions_base:      ${{ steps.detect.outputs.versions_base }}
      versions_secure:    ${{ steps.detect.outputs.versions_secure }}
      latest_php_version: ${{ steps.detect.outputs.latest_php_version }}
      tag_suffix:         ${{ steps.tag-suffix.outputs.tag_suffix }}
      before_sha:         ${{ needs.prepare.outputs.before_sha }}
      # Total number of distinct platforms — used by each merge job to know
      # when all per-platform digest artifacts have been collected.
      total_platforms:    ${{ steps.detect.outputs.total_platforms }}
      # JSON array of {version, stage} objects — one entry per Docker Hub
      # image that needs a manifest merge.  The downstream single merge job
      # consumes the full array and passes it to the merge-manifests action,
      # which iterates over entries internally to merge each image's tag.
      merge_matrix:       ${{ steps.detect.outputs.merge_matrix }}
      # JSON array of {version, platform, versions_base, versions_secure}
      # objects — one entry per PHP-version × platform combination.  Each
      # entry becomes one parallel build job that builds one version on one
      # platform and uploads per-image digest artifacts immediately.
      build_matrix:       ${{ steps.detect.outputs.build_matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ needs.prepare.outputs.before_sha != '' && '0' || '1' }}

      - name: Compute tag suffix
        id: tag-suffix
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "tag_suffix=" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == "refs/heads/develop" ]]; then
            echo "tag_suffix=-rc" >> "$GITHUB_OUTPUT"
          else
            sanitized_ref="$(printf '%s' "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_.-]/-/g')"
            echo "tag_suffix=-${sanitized_ref}" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Detect versions
        id: detect
        uses: ./.github/actions/detect-versions
        with:
          before_sha:      ${{ needs.prepare.outputs.before_sha }}
          after_sha:       ${{ github.sha }}
          platforms_filter: ${{ env.PLATFORMS }}

  # ── Per-version-platform builds (run in parallel) ──────────────────────────
  # One job per PHP version × platform pair.  Each job builds all stages
  # (base / secure / advance) for that single version on that single platform,
  # then uploads one digest artifact per stage immediately after the bake
  # step completes.  The merge job picks up those artifacts as they arrive and
  # assembles the tagged multi-arch manifests.
  build:
    needs: detect
    if: needs.detect.outputs.versions != '' && needs.detect.outputs.latest_php_version != ''
    name: build (${{ matrix.version }}, ${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.build_matrix) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions:  write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ needs.detect.outputs.before_sha != '' && '0' || '1' }}

      - name: Build PHP images
        uses: ./.github/actions/build-php-images
        with:
          version:            ${{ matrix.version }}
          versions_base:      ${{ matrix.versions_base }}
          versions_secure:    ${{ matrix.versions_secure }}
          tag_suffix:         ${{ needs.detect.outputs.tag_suffix }}
          platform:           ${{ matrix.platform }}
          repo:               ${{ vars.DOCKERHUB_REPO || 'devpanel/php' }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
          github_token:       ${{ secrets.GITHUB_TOKEN }}
          ghcr_token:         ${{ secrets.GHCR_TOKEN }}

  # ── Single manifest merge job ────────────────────────────────────────────────
  # One job handles all Docker Hub images (every version × stage combination).
  # It starts as soon as detect finishes and runs in parallel with every build
  # job.
  #
  # The job polls for "digests-*" artifacts from the build jobs.  Whenever one
  # or more new platform digests arrive in the same polling cycle they are
  # batched into a single "docker buildx imagetools create" call per image,
  # preserving any platform still missing from the current batch via the
  # previously published Docker Hub manifest.
  #
  # Using a single job (rather than a per-image matrix) avoids saturating the
  # Docker Hub pull rate limit with many concurrent "imagetools inspect" calls
  # and reduces the number of runners consumed during the build.
  merge:
    needs: detect
    if: needs.detect.outputs.versions != '' && needs.detect.outputs.latest_php_version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions:  read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Poll and merge platform manifests
        uses: ./.github/actions/merge-manifests
        with:
          merge_matrix:        ${{ needs.detect.outputs.merge_matrix }}
          repo:                ${{ vars.DOCKERHUB_REPO || 'devpanel/php' }}
          tag_suffix:          ${{ needs.detect.outputs.tag_suffix }}
          total_platforms:     ${{ needs.detect.outputs.total_platforms }}
          github_token:        ${{ secrets.GITHUB_TOKEN }}
          run_id:              ${{ github.run_id }}
          repository:          ${{ github.repository }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
