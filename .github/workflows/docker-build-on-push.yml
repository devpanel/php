      image_tag: ${{ github.repository }}:8.2-secure${{ needs.detect-changes.outputs.tag_suffix }}
      base_image: ${{ github.repository }}:8.2-base${{ needs.detect-changes.outputs.tag_suffix }}
      artifact_prefix: php82-secure
