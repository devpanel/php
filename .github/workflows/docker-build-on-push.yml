    if: always() && needs.build-php81-secure.result != 'failure' && needs.build-php81-secure.result != 'cancelled' && (needs.detect-changes.outputs.php81-advance == 'true' || needs.build-php81-secure.result == 'success')
    uses: ./.github/workflows/build-image.yml
