      base_image: ${{ github.repository }}:8.1-secure${{ needs.detect-changes.outputs.tag_suffix }}
      artifact_prefix: php81-advance
      use_cache: true
    secrets: inherit

  # ── PHP 8.2 ──────────────────────────────────────────────────────────────

  build-php82-base:
    permissions: {}
    needs: detect-changes
    if: needs.detect-changes.outputs.php82-base == 'true'
    uses: ./.github/workflows/build-image.yml
    with:
      php_version: "8.2"
      image_type: base
      image_tag: ${{ github.repository }}:8.2-base${{ needs.detect-changes.outputs.tag_suffix }}
      artifact_prefix: php82-base
      use_cache: true
    secrets: inherit

  build-php82-secure:
    permissions: {}
    needs: [detect-changes, build-php82-base]
    if: always() && needs.build-php82-base.result != 'failure' && needs.build-php82-base.result != 'cancelled' && (needs.detect-changes.outputs.php82-secure == 'true' || needs.build-php82-base.result == 'success')
    uses: ./.github/workflows/build-image.yml
    with:
      php_version: "8.2"
