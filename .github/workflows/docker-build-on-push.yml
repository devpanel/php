    needs: [detect-changes, build-php82-secure]
    if: always() && needs.build-php82-secure.result != 'failure' && needs.build-php82-secure.result != 'cancelled' && (needs.detect-changes.outputs.php82-advance == 'true' || needs.build-php82-secure.result == 'success')
