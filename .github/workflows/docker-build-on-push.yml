name: Build changed Docker images on push

on:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build-php-images.yml
    permissions:
      contents: read
      packages: write
    with:
      before_sha: ${{ github.event.before }}
      after_sha: ${{ github.sha }}
    secrets: inherit
