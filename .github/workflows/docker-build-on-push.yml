name: Build changed Docker images on push

on:
  push:
    branches:
      - main
      - develop

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      before_sha: ${{ steps.effective_sha.outputs.before_sha }}
    steps:
      - name: Compute effective before_sha
        id: effective_sha
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # If this run cancelled a previous push workflow, that workflow may
          # have been mid-build and its changes would be lost.  To guarantee
          # no commits are skipped, use the head_sha of the last *successful*
          # run on this branch as the effective before_sha.  This covers every
          # commit since the last known-good build, regardless of how many
          # prior runs were cancelled in the interim.
          #
          # We query every workflow that calls the shared reusable build
          # workflow (on-push and workflow_dispatch/all) so that a successful
          # full-rebuild dispatch is not ignored when computing the diff range.
          # Fetch the last 10 from each so we have enough candidates to find
          # the closest reachable ancestor even when recent runs share SHAs.
          CANDIDATES=$({
            gh api \
              "repos/${{ github.repository }}/actions/workflows/docker-build-on-push.yml/runs?branch=${{ github.ref_name }}&status=success&per_page=10" \
              --jq '.workflow_runs[].head_sha // empty'
            gh api \
              "repos/${{ github.repository }}/actions/workflows/docker-build-all.yml/runs?branch=${{ github.ref_name }}&status=success&per_page=10" \
              --jq '.workflow_runs[].head_sha // empty'
          } | grep . | sort -u)

          # Among all candidates, pick the closest reachable ancestor of the
          # current commit — the one with the smallest ahead_by distance.
          # This is more correct than using timestamps because it is based on
          # the actual git ancestry of the branch rather than wall-clock time.
          LAST_SUCCESS_SHA=""
          BEST_AHEAD=""
          while IFS= read -r SHA; do
            [[ -z "$SHA" || "$SHA" == "${{ github.sha }}" ]] && continue
            COMPARE=$(gh api \
              "repos/${{ github.repository }}/compare/${SHA}...${{ github.sha }}" \
              --jq '{status: .status, ahead_by: .ahead_by}' 2>/dev/null || true)
            STATUS=$(printf '%s' "$COMPARE" | jq -r '.status // ""')
            AHEAD=$(printf '%s' "$COMPARE" | jq -r '.ahead_by // empty')
            if [[ "$STATUS" == "ahead" || "$STATUS" == "identical" ]] && [[ "$AHEAD" =~ ^[0-9]+$ ]]; then
              if [[ -z "$BEST_AHEAD" || "$AHEAD" -lt "$BEST_AHEAD" ]]; then
                BEST_AHEAD="$AHEAD"
                LAST_SUCCESS_SHA="$SHA"
              fi
            fi
          done <<< "$CANDIDATES"

          BEFORE_SHA=""
          if [[ -n "$LAST_SUCCESS_SHA" ]]; then
            BEFORE_SHA="$LAST_SUCCESS_SHA"
          else
            # No prior successful run found whose commit is reachable from the
            # current commit (e.g. first run ever, or after a force-push).
            # Fall back to the push event's own before SHA.
            BEFORE_SHA="${{ github.event.before }}"
          fi

          echo "before_sha=$BEFORE_SHA" >> "$GITHUB_OUTPUT"

  # Each platform builds independently, pushes images by content digest (no
  # tags), and uploads a digest artifact.  As soon as a platform build
  # completes its corresponding merge job fires (see below) and creates or
  # updates the manifest tag using all digest artifacts available at that
  # moment — so the tag is published immediately after the first platform
  # finishes and progressively updated as each subsequent platform completes.
  #
  # To add a new platform, copy one build+merge job pair, change the
  # platforms_filter, and update the job names.  No other changes are needed.

  build-linux-amd64:
    needs: [prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag_suffix:         ${{ steps.build.outputs.tag_suffix }}
      versions:           ${{ steps.build.outputs.versions }}
      versions_base:      ${{ steps.build.outputs.versions_base }}
      versions_secure:    ${{ steps.build.outputs.versions_secure }}
      latest_php_version: ${{ steps.build.outputs.latest_php_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Full history is needed when before_sha/after_sha are provided so
          # that git diff can compare before_sha..after_sha.
          fetch-depth: ${{ needs.prepare.outputs.before_sha != '' && '0' || '1' }}

      - name: Build PHP images (linux/amd64)
        id: build
        uses: ./.github/actions/build-php-images
        with:
          before_sha:         ${{ needs.prepare.outputs.before_sha }}
          after_sha:          ${{ github.sha }}
          platforms_filter:   linux/amd64
          push_by_digest:     'true'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
          github_token:       ${{ secrets.GITHUB_TOKEN }}
          ghcr_token:         ${{ secrets.GHCR_TOKEN }}

  build-linux-arm64:
    needs: [prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag_suffix:         ${{ steps.build.outputs.tag_suffix }}
      versions:           ${{ steps.build.outputs.versions }}
      versions_base:      ${{ steps.build.outputs.versions_base }}
      versions_secure:    ${{ steps.build.outputs.versions_secure }}
      latest_php_version: ${{ steps.build.outputs.latest_php_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ needs.prepare.outputs.before_sha != '' && '0' || '1' }}

      - name: Build PHP images (linux/arm64)
        id: build
        uses: ./.github/actions/build-php-images
        with:
          before_sha:         ${{ needs.prepare.outputs.before_sha }}
          after_sha:          ${{ github.sha }}
          platforms_filter:   linux/arm64
          push_by_digest:     'true'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
          github_token:       ${{ secrets.GITHUB_TOKEN }}
          ghcr_token:         ${{ secrets.GHCR_TOKEN }}

  # Each merge job depends only on its own platform's build job so it fires as
  # soon as that platform finishes.  It downloads all digest artifacts that are
  # available at that moment (other platforms may still be building) and creates
  # or overwrites the manifest tag with whatever digests are present.  When the
  # next platform finishes its own merge job runs and overwrites the tag again
  # with the enlarged set of digests.  The final merge job to complete leaves
  # the tag pointing at the full multi-arch manifest.

  merge-linux-amd64:
    needs: [build-linux-amd64]
    if: >-
      needs.build-linux-amd64.outputs.versions != '' &&
      needs.build-linux-amd64.outputs.latest_php_version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create/update manifest tags (linux/amd64 available)
        uses: ./.github/actions/merge-manifests
        with:
          versions:           ${{ needs.build-linux-amd64.outputs.versions }}
          versions_base:      ${{ needs.build-linux-amd64.outputs.versions_base }}
          versions_secure:    ${{ needs.build-linux-amd64.outputs.versions_secure }}
          tag_suffix:         ${{ needs.build-linux-amd64.outputs.tag_suffix }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}

  merge-linux-arm64:
    needs: [build-linux-arm64]
    if: >-
      needs.build-linux-arm64.outputs.versions != '' &&
      needs.build-linux-arm64.outputs.latest_php_version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create/update manifest tags (linux/arm64 available)
        uses: ./.github/actions/merge-manifests
        with:
          versions:           ${{ needs.build-linux-arm64.outputs.versions }}
          versions_base:      ${{ needs.build-linux-arm64.outputs.versions_base }}
          versions_secure:    ${{ needs.build-linux-arm64.outputs.versions_secure }}
          tag_suffix:         ${{ needs.build-linux-arm64.outputs.tag_suffix }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
