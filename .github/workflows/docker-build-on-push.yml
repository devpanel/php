    uses: ./.github/workflows/build-image.yml
    with:
      php_version: "8.1"
      image_type: secure
      image_tag: ${{ github.repository }}:8.1-secure${{ needs.detect-changes.outputs.tag_suffix }}
      base_image: ${{ github.repository }}:8.1-base${{ needs.detect-changes.outputs.tag_suffix }}
      artifact_prefix: php81-secure
      use_cache: true
    secrets: inherit

  build-php81-advance:
