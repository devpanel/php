name: Build changed Docker images on push

on:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build-php-images.yml
    permissions:
      contents: read
      packages: write
    with:
      filter_changed: true
      before_sha: ${{ github.event.before }}
      after_sha: ${{ github.sha }}
      platforms_filter: linux/amd64,linux/arm64
    secrets: inherit
