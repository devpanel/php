name: Build and push Docker image

on:
  workflow_call:
    inputs:
      php_version:
        description: PHP version (e.g. 7.4, 8.2)
        required: true
        type: string
      image_type:
        description: "Image type: base, secure, or advance"
        required: true
        type: string
      image_tag:
        description: Full Docker image tag to push (e.g. devpanel/php:8.2-base-rc)
        required: true
        type: string
      base_image:
        description: Base Docker image for dependent builds (required for secure and advance)
        required: false
        type: string
        default: ""
      use_cache:
        description: Whether to use GitHub Actions cache
        required: false
        type: boolean
        default: true
      artifact_prefix:
        description: Unique prefix for artifact names within the workflow run (e.g. php74-base)
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Prepare variables
        id: prep
        run: |
          platform="${{ matrix.platform }}"
          echo "platform_safe=${platform//\//-}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base image by digest
        id: build-base
        if: inputs.image_type == 'base'
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile
          context: "{{defaultContext}}:${{ inputs.php_version }}/base"
          # Intentionally empty: Dockerfile resolves latest patch within CODESERVER_MAJOR_VERSION
          # code-server is mandatory; build fails if version cannot be resolved
          build-args: |
            CODESERVER_VERSION=
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          platforms: ${{ matrix.platform }}
          cache-from: ${{ inputs.use_cache && format('type=gha,scope={0}-{1}', inputs.artifact_prefix, matrix.platform) || '' }}
          cache-to: ${{ inputs.use_cache && format('type=gha,scope={0}-{1},mode=max', inputs.artifact_prefix, matrix.platform) || '' }}
          outputs: type=image,name=${{ github.repository }},push-by-digest=true,name-canonical=true,push=true

      - name: Build and push dependent image by digest
        id: build-dependent
        if: inputs.image_type != 'base'
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile
          context: "{{defaultContext}}:${{ inputs.php_version }}/${{ inputs.image_type }}"
          build-args: |
            BASE_IMAGE=${{ inputs.base_image }}
          platforms: ${{ matrix.platform }}
          cache-from: ${{ inputs.use_cache && format('type=gha,scope={0}-{1}', inputs.artifact_prefix, matrix.platform) || '' }}
          cache-to: ${{ inputs.use_cache && format('type=gha,scope={0}-{1},mode=max', inputs.artifact_prefix, matrix.platform) || '' }}
          outputs: type=image,name=${{ github.repository }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          if [[ "${{ inputs.image_type }}" == "base" ]]; then
            digest="${{ steps.build-base.outputs.digest }}"
          else
            digest="${{ steps.build-dependent.outputs.digest }}"
          fi
          echo "$digest" > ${{ runner.temp }}/digests/${{ steps.prep.outputs.platform_safe }}.digest

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ inputs.artifact_prefix }}-${{ steps.prep.outputs.platform_safe }}
          path: ${{ runner.temp }}/digests/
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions: {}
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ inputs.artifact_prefix }}-*
          merge-multiple: true

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            -t ${{ inputs.image_tag }} \
            $(for f in *.digest; do echo "${{ github.repository }}@$(cat $f)"; done)
