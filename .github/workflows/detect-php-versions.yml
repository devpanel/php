name: Detect PHP versions

# Reusable workflow: determines the tag suffix, latest PHP version, version
# list, and target platforms.
#
# When filter_changed is true (used by the on-push workflow), only the PHP
# versions whose source files changed between before_sha and after_sha are
# included in the output.  When filter_changed is false (used by the
# workflow_dispatch workflow), every versioned directory is included.

on:
  workflow_call:
    inputs:
      filter_changed:
        description: 'Only output versions whose files changed since before_sha'
        type: boolean
        default: false
      before_sha:
        description: 'Commit SHA before the push (required when filter_changed is true)'
        type: string
        default: ''
      after_sha:
        description: 'Commit SHA after the push (required when filter_changed is true)'
        type: string
        default: ''
    outputs:
      tag_suffix:
        value: ${{ jobs.detect.outputs.tag_suffix }}
      latest_php_version:
        value: ${{ jobs.detect.outputs.latest_php_version }}
      versions:
        value: ${{ jobs.detect.outputs.versions }}
      platforms:
        value: ${{ jobs.detect.outputs.platforms }}

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag_suffix:          ${{ steps.detect.outputs.tag_suffix }}
      latest_php_version:  ${{ steps.detect.outputs.latest_php_version }}
      versions:            ${{ steps.detect.outputs.versions }}
      platforms:           ${{ steps.detect.outputs.platforms }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history is needed when filter_changed is true so that
          # git diff can compare before_sha..after_sha.
          fetch-depth: ${{ inputs.filter_changed && '0' || '1' }}

      - name: Detect versions
        id: detect
        run: |
          set -euo pipefail

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAG_SUFFIX=""
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            TAG_SUFFIX="-rc"
          else
            BRANCH="${{ github.ref_name }}"
            TAG_SUFFIX="-${BRANCH//\//-}"
          fi

          # Collect all versioned directories (numeric names), sorted by version.
          LATEST_PHP_VERSION=""
          while IFS= read -r VER; do
            LATEST_PHP_VERSION="$VER"
          done < <(find . -maxdepth 1 -mindepth 1 -type d -name '[0-9]*' \
                     | sed 's|./||' | sort -V)

          if [[ "${{ inputs.filter_changed }}" == "true" ]]; then
            BEFORE="${{ inputs.before_sha }}"
            AFTER="${{ inputs.after_sha }}"

            # On a brand-new branch push the before SHA is all zeros.
            IS_NEW_BRANCH=false
            if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              IS_NEW_BRANCH=true
            fi

            # Returns 1 if any file under the given path changed, else 0.
            path_changed() {
              if $IS_NEW_BRANCH; then echo 1; return; fi
              git diff --name-only "$BEFORE" "$AFTER" -- "$1" 2>/dev/null | wc -l
            }

            # Common-directory changes affect ALL versions.
            BASE_COMMON=$(path_changed "base/")
            SECURE_COMMON=$(path_changed "secure/")
            ADVANCE_COMMON=$(path_changed "advance/")
            BAKE_CHANGED=$(path_changed "docker-bake.hcl")

            CHANGED_VERSIONS=()
            ALL_VERSIONS_CHANGED=false

            if [[ $BASE_COMMON -gt 0 || $SECURE_COMMON -gt 0 || $ADVANCE_COMMON -gt 0 || $BAKE_CHANGED -gt 0 ]]; then
              ALL_VERSIONS_CHANGED=true
            fi

            while IFS= read -r VER; do
              if $ALL_VERSIONS_CHANGED; then
                CHANGED_VERSIONS+=("$VER")
              else
                BASE_VER=$(path_changed "${VER}/base/")
                SECURE_VER=$(path_changed "${VER}/secure/")
                if [[ $BASE_VER -gt 0 || $SECURE_VER -gt 0 ]]; then
                  CHANGED_VERSIONS+=("$VER")
                fi
              fi
            done < <(find . -maxdepth 1 -mindepth 1 -type d -name '[0-9]*' \
                       | sed 's|./||' | sort -V)

            VERSIONS_OUT=$(printf '%s\n' "${CHANGED_VERSIONS[@]+"${CHANGED_VERSIONS[@]}"}" \
                          | awk '!seen[$0]++' | tr '\n' ' ' | xargs)
          else
            VERSIONS_OUT=$(find . -maxdepth 1 -mindepth 1 -type d -name '[0-9]*' \
                            | sed 's|./||' | sort -V | tr '\n' ' ' | xargs)
          fi

          echo "tag_suffix=${TAG_SUFFIX}"                   >> "$GITHUB_OUTPUT"
          echo "latest_php_version=${LATEST_PHP_VERSION}"   >> "$GITHUB_OUTPUT"
          echo "versions=${VERSIONS_OUT}"                   >> "$GITHUB_OUTPUT"

          # Determine build platforms from the official PHP base image manifest,
          # filtered to linux/amd64 and linux/arm64.
          PHP_MANIFEST=$(docker manifest inspect "php:${LATEST_PHP_VERSION}-apache" 2>/dev/null || echo "")
          DETECTED=""
          if [[ -n "$PHP_MANIFEST" ]]; then
            DETECTED=$(echo "$PHP_MANIFEST" \
              | jq -r '.manifests[].platform | select(.os=="linux") | "\(.os)/\(.architecture)\(if .variant and .variant!="" then "/"+.variant else "" end)"' \
              | grep -E "^linux/(amd64|arm64)(/|$)" | sort | tr '\n' ',' | sed 's/,$//')
          fi
          echo "platforms=${DETECTED:-linux/amd64,linux/arm64}" >> "$GITHUB_OUTPUT"
