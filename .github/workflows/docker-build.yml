name: Build Docker images

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      platforms:
        description: >
          Comma-separated list of platforms to build
          (e.g. "linux/amd64,linux/arm64").
          Leave empty to use the PLATFORMS repository variable,
          falling back to "linux/amd64,linux/arm64".
      all_versions:
        description: >
          Build all PHP versions regardless of what changed.
          When false, only versions affected by commits since the last
          successful build are rebuilt.
        type: boolean
        default: true
      no_cache:
        description: >
          Disable Docker layer cache and force a fresh download of all build
          artefacts (code-server, Copilot Chat).
          When false, the cache is used as normal.
        type: boolean
        default: true

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Find the effective per-platform before SHAs ────────────────────────────
  # For a push event, or a manual dispatch with all_versions disabled, find
  # the per-platform head SHA of the last *successful* build run on this
  # branch so that commits covered by cancelled runs are not skipped.
  #
  # When all_versions is requested (workflow_dispatch with all_versions=true)
  # the job is skipped entirely; the empty before_shas ({}) causes the detect
  # job to build every version rather than diff against a previous commit.
  prepare:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.all_versions != true
    permissions:
      actions: read
      checks: read
      contents: read
    outputs:
      before_shas: ${{ steps.effective_sha.outputs.before_shas }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Normalize platform keys for per-platform before_shas
        id: plat-keys
        shell: bash
        env:
          RAW_PLATFORMS: ${{ inputs.platforms || vars.PLATFORMS || 'linux/amd64,linux/arm64' }}
        run: |
          set -euo pipefail
          # Convert "linux/amd64,linux/arm64" (or with default variant suffixes)
          # to space-separated platform keys matching build-done artifact names:
          #   linux/amd64,linux/arm64        → "linux-amd64 linux-arm64"
          #   linux/arm64/v8,linux/amd64/v1  → "linux-arm64 linux-amd64"
          result=""
          IFS=',' read -ra plats <<< "${RAW_PLATFORMS}"
          for p in "${plats[@]}"; do
            p="${p// /}"   # trim any surrounding whitespace
            case "${p}" in
              */arm64/v8) p="${p%/v8}" ;;
              */amd64/v1) p="${p%/v1}" ;;
            esac
            k="${p//\//-}"
            result="${result:+${result} }${k}"
          done
          echo "platform_keys=${result}" >> "$GITHUB_OUTPUT"

      - name: Compute effective before_shas
        id: effective_sha
        uses: ./.github/actions/effective-before-sha
        with:
          # Include the numeric IDs of the previous (now-removed) build
          # workflows so that their historical successful runs can still be
          # considered when computing the before SHA for this repository.
          # Using numeric IDs for the removed workflows can help retain
          # access to their run history after the workflow files are deleted,
          # and effective-before-sha tolerates missing workflows by ignoring
          # 404 responses.  These legacy IDs can be removed once
          # docker-build.yml has its own successful runs to use as a baseline.
          #   242168596 = docker-build-on-push.yml (removed)
          #   242173818 = docker-build-all.yml (removed)
          workflow_files: |
            242168596
            242173818
            docker-build.yml
          ref_name: ${{ github.ref_name }}
          repository: ${{ github.repository }}
          github_token: ${{ github.token }}
          event_name: ${{ github.event_name }}
          platforms: ${{ steps.plat-keys.outputs.platform_keys }}

  # ── Detect which versions changed and which platforms to target ─────────────
  # Runs after prepare so that before_shas is available, and its outputs drive
  # both the per-platform build matrix and the merge job.
  #
  # When before_shas is empty {} (all_versions build or brand-new branch), the
  # detect-versions action builds every version in the repository.
  detect:
    needs: prepare
    if: always() && (needs.prepare.result == 'success' || needs.prepare.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write
    outputs:
      versions: ${{ steps.detect.outputs.versions }}
      versions_base: ${{ steps.detect.outputs.versions_base }}
      versions_secure: ${{ steps.detect.outputs.versions_secure }}
      tag_suffix: ${{ steps.detect.outputs.tag_suffix }}
      # JSON array of {version, stage, expected_platforms} objects — one entry
      # per Docker Hub image that needs a manifest merge.  expected_platforms
      # is the number of build-matrix entries that will produce a digest
      # artifact for that (version, stage), used as the per-image completion
      # threshold.  The downstream single merge job consumes the full array
      # and passes it to the merge-manifests action, which iterates over
      # entries internally to merge each image's tag.
      merge_matrix: ${{ steps.detect.outputs.merge_matrix }}
      # JSON array of {version, platform, versions_base, versions_secure}
      # objects — one entry per PHP-version × platform combination.  Each
      # entry becomes one parallel build job that builds one version on one
      # platform and uploads per-image digest artifacts immediately.
      build_matrix: ${{ steps.detect.outputs.build_matrix }}
      # Total number of build matrix jobs (versions × platforms).
      build_matrix_length: ${{ steps.detect.outputs.build_matrix_length }}
      # Whether GHCR is writable with the current token.  Set once here in the
      # detect job and passed to every build job via the build matrix so that
      # each job uses GHCR as primary (writable) or GHA as primary (not writable).
      ghcr_writable: ${{ steps.detect.outputs.ghcr_writable }}
      # Which GHCR credential was used: "github_token" or "ghcr_token".
      # Used by build and merge jobs to determine which single credential to
      # pass for GHCR authentication (only ghcr_token is passed when the PAT
      # was required; github_token is used via the job's GITHUB_TOKEN otherwise).
      ghcr_cred_source: ${{ steps.detect.outputs.ghcr_cred_source }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ (needs.prepare.outputs.before_shas || '{}') != '{}' && '0' || '1' }}

      - name: Detect versions
        id: detect
        uses: ./.github/actions/detect-versions
        with:
          before_shas: ${{ needs.prepare.outputs.before_shas || '{}' }}
          after_sha: ${{ github.sha }}
          platforms_filter: ${{ inputs.platforms || vars.PLATFORMS || 'linux/amd64,linux/arm64' }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          ghcr_token: ${{ secrets.GHCR_TOKEN }}
          ghcr_user: ${{ vars.GHCR_USER }}

      # Pre-seed is run here in the detect job (once, with ALL PHP versions in
      # the repo) rather than inside each parallel build job.  See the comment
      # in the build job below for the full rationale.
      - name: Pre-seed build downloads
        id: preseed
        if: steps.detect.outputs.versions != ''
        uses: ./.github/actions/preseed-downloads
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          versions: ${{ steps.detect.outputs.all_versions }}
          # Force a fresh download when no_cache is requested via workflow_dispatch
          # so that subsequent runs pick up refreshed artifacts.
          refresh_cache: ${{ github.event_name == 'workflow_dispatch' && inputs.no_cache == true && 'true' || 'false' }}

      - name: Upload preseed bake overrides
        if: steps.detect.outputs.versions != ''
        uses: actions/upload-artifact@v7
        with:
          name: preseed-bake-overrides
          path: ${{ steps.preseed.outputs.bake_overrides_file }}
          retention-days: 1

      # Upload the flat pre-downloaded/ directory (code-server .deb files and
      # Copilot Chat VSIX) as a workflow artifact so build jobs can download it
      # directly.  Using an artifact (rather than the GHA preseed cache) is
      # more reliable because artifacts are guaranteed to persist for the
      # lifetime of the workflow run; the GHA cache can be evicted mid-run
      # and a cache miss would silently produce an empty pre-downloaded/ dir.
      - name: Upload preseed pre-downloaded artifacts
        if: steps.detect.outputs.versions != ''
        uses: actions/upload-artifact@v7
        with:
          name: preseed-pre-downloaded
          path: ${{ steps.preseed.outputs.downloads_dir }}/pre-downloaded/
          retention-days: 1

  # ── Per-version-platform builds (run in parallel) ──────────────────────────
  # One job per PHP version × platform pair.  Each job builds all stages
  # (base / secure / advance) for that single version on that single platform,
  # then uploads one digest artifact per stage immediately after the bake
  # step completes.  The merge job picks up those artifacts as they arrive and
  # assembles the tagged multi-arch manifests.
  #
  # Caching:
  #   - Push events always use GHCR layer cache (cache_from_enabled: true).
  #   - workflow_dispatch with no_cache=true disables the cache so every layer
  #     is rebuilt from scratch, matching the former "build all" behaviour.
  #   - workflow_dispatch with no_cache=false uses the cache as normal.
  build:
    needs: detect
    if: needs.detect.outputs.versions != ''
    name: build (${{ matrix.version }}, ${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.build_matrix) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Download the pre-seeded code-server .deb and Copilot Chat VSIX files
      # that the detect job assembled and uploaded.  Using a workflow artifact
      # (not the GHA preseed cache) guarantees these files are present for the
      # lifetime of the run; a cache miss would silently produce an empty
      # pre-downloaded/ directory and fail the Docker build.
      - name: Download preseed pre-downloaded artifacts
        uses: actions/download-artifact@v8
        with:
          name: preseed-pre-downloaded
          path: ${{ runner.temp }}/build-downloads/pre-downloaded

      # Download the bake-overrides JSON generated by the detect job's preseed run.
      - name: Download preseed bake overrides
        uses: actions/download-artifact@v8
        with:
          name: preseed-bake-overrides
          path: ${{ runner.temp }}

      - name: Build PHP images
        uses: ./.github/actions/build-php-images
        with:
          cache_from_enabled: ${{ (github.event_name == 'push' || inputs.no_cache != true) && 'true' || 'false' }}
          version: ${{ matrix.version }}
          versions_base: ${{ matrix.versions_base }}
          versions_secure: ${{ matrix.versions_secure }}
          tag_suffix: ${{ needs.detect.outputs.tag_suffix }}
          platform: ${{ matrix.platform }}
          repo: ${{ vars.DOCKERHUB_REPO || 'devpanel/php' }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          ghcr_token: ${{ needs.detect.outputs.ghcr_cred_source == 'ghcr_token' && secrets.GHCR_TOKEN || '' }}
          ghcr_user: ${{ vars.GHCR_USER }}
          ghcr_writable: ${{ needs.detect.outputs.ghcr_writable }}
          downloads_dir: ${{ runner.temp }}/build-downloads
          bake_overrides_file: ${{ runner.temp }}/preseed-bake-overrides.json

  # ── Single manifest merge job ────────────────────────────────────────────────
  # One job handles all Docker Hub images (every version × stage combination).
  # It starts as soon as detect finishes and runs in parallel with every build
  # job.
  #
  # The job polls for "digests-*" artifacts from the build jobs.  Whenever one
  # or more new platform digests arrive in the same polling cycle they are
  # batched into a single "docker buildx imagetools create" call per image,
  # preserving any platform still missing from the current batch via the
  # previously published Docker Hub manifest.
  #
  # Using a single job (rather than a per-image matrix) avoids saturating the
  # Docker Hub pull rate limit with many concurrent "imagetools inspect" calls
  # and reduces the number of runners consumed during the build.
  merge:
    needs: detect
    if: needs.detect.outputs.versions != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Poll and merge platform manifests
        uses: ./.github/actions/merge-manifests
        with:
          merge_matrix: ${{ needs.detect.outputs.merge_matrix }}
          repo: ${{ vars.DOCKERHUB_REPO || 'devpanel/php' }}
          tag_suffix: ${{ needs.detect.outputs.tag_suffix }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ github.run_id }}
          repository: ${{ github.repository }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          ghcr_writable: ${{ needs.detect.outputs.ghcr_writable }}
          ghcr_token: ${{ needs.detect.outputs.ghcr_cred_source == 'ghcr_token' && secrets.GHCR_TOKEN || '' }}
          ghcr_user: ${{ vars.GHCR_USER }}
